# shared/conventions.yaml — cross-language single source of truth
#
# Owner spec: docs/spec/shared-conventions-codified/spec.md (D-1 locks this file as canonical)
# This file is the canonical B1 source for generated Go and TypeScript shared types.
# Generator:    backend/cmd/codegen/conventions/main.go (consumed via `make codegen-conventions`)
# Validator:    scripts/lint/conventions_yaml.py (run by `make lint`)
#
# Naming contract (shared-conventions-codified D-1 / D-5):
#   enum values        → lower_snake_case (TS union literal, Go const value)
#   error codes        → UPPER_SNAKE_CASE (TS const map key+value, Go const)
#   JSON fields        → camelCase
#   Go type names      → PascalCase
#   Go const naming    → <TypeName><Value>, e.g. PracticeGoalBaseline
#
# Counting note: the enum catalogue uses 15 source sections (5.1..5.11,
# 5.13..5.16). PrivacyRequest has parallel field domains, so the catalogue
# below contains 16 enum entries grouped by `sourceSection`.

version: 1.1
schemaVersion: 1

# UUIDv7: all business primary keys are UUIDv7 strings. The sample below lets Go
# and TS round-trip tests pin against a fixed value.
sampleUuidV7: "0195f2d0-4a44-7fc2-8f77-1f9c4ce1ae9e"
uuidV7Regex: "^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"

# Front-end browser-only temp prefix; backend idx.RequireServerID() rejects it.
tmpIdPrefix: "tmp_"

# Cursor pagination defaults.
pagination:
  defaultPageSize: 20
  maxPageSize: 100

# Idempotency-Key TTL: 24 hours.
# Wire format is implementation-detail and lives in code; only the TTL is contractual.
idempotency:
  ttlSeconds: 86400

# Documented error codes (§3.2 plus spec-authorized extensions). The catalogue
# is intentionally minimal — domains add codes via spec revision. D-5 locks
# UPPER_SNAKE_CASE; codegen keeps the list in lockstep on Go and TS sides.
errors:
  - code: AUTH_UNAUTHORIZED
    message: "authentication required or invalid"
    retryable: false
  - code: TARGET_IMPORT_FAILED
    message: "failed to import target job"
    retryable: true
  - code: TARGET_JOB_NOT_FOUND
    message: "target job not found"
    retryable: false
  - code: TARGET_IMPORT_SOURCE_INVALID
    message: "target import source is invalid or unreachable per policy"
    retryable: false
  - code: TARGET_IMPORT_SOURCE_UNAVAILABLE
    message: "target import source is temporarily unavailable"
    retryable: true
  - code: TARGET_INVALID_STATE_TRANSITION
    message: "target job state transition is not allowed"
    retryable: false
  - code: PRACTICE_SESSION_CONFLICT
    message: "practice session is in conflicting state"
    retryable: false
  - code: PRACTICE_PLAN_NOT_FOUND
    message: "practice plan not found"
    retryable: false
  - code: PRACTICE_SESSION_NOT_FOUND
    message: "practice session not found"
    retryable: false
  - code: REPORT_NOT_FOUND
    message: "feedback report not found or not accessible"
    retryable: false
  - code: REPORT_NOT_READY
    message: "report is not ready yet"
    retryable: true
  - code: REPORT_CONTEXT_TOO_LARGE
    message: "report context exceeds supported generation size"
    retryable: false
  - code: RESUME_EXPORT_NOT_AVAILABLE
    message: "resume version export is not available in P0"
    retryable: false
  - code: VALIDATION_FAILED
    message: "request validation failed"
    retryable: false
  - code: RESOURCE_NOT_FOUND
    message: "requested resource not found or not accessible"
    retryable: false
  - code: IDEMPOTENCY_KEY_MISMATCH
    message: "idempotency key was reused with a different request body"
    retryable: false
  - code: RATE_LIMITED
    message: "rate limit exceeded"
    retryable: true
  # Authorized by ai-provider-and-model-routing v1.5. These codes are shared so
  # A3, B2, C-domain handlers, and generated clients do not invent local strings.
  - code: AI_PROVIDER_TIMEOUT
    message: "AI provider request timed out"
    retryable: true
  - code: AI_OUTPUT_INVALID
    message: "AI output failed schema validation"
    retryable: false
  - code: AI_FALLBACK_EXHAUSTED
    message: "AI fallback chain exhausted"
    retryable: true
  - code: AI_UNSUPPORTED_CAPABILITY
    message: "AI capability is not supported"
    retryable: false
  - code: AI_PROVIDER_CONFIG_INVALID
    message: "AI provider registry or model profile configuration is invalid"
    retryable: false
  - code: AI_PROVIDER_SECRET_MISSING
    message: "AI provider secret is missing"
    retryable: false

# Async Job statuses.
jobStatuses:
  - queued
  - running
  - succeeded
  - failed
  - cancelled
  - dead

# Enum catalogue. Entries are ordered by sourceSection then field domain.
enums:
  - name: TargetJobStatus
    sourceSection: "5.1"
    jsonField: status
    values:
      - draft
      - preparing
      - applied
      - interviewing
      - offer
      - rejected
      - archived

  - name: TargetJobParseStatus
    sourceSection: "5.2"
    jsonField: parseStatus
    values:
      - queued
      - processing
      - ready
      - failed

  - name: PracticeGoal
    sourceSection: "5.4"
    jsonField: goal
    values:
      - baseline
      - retry_current_round
      - next_round

  - name: InterviewerRole
    sourceSection: "5.5"
    jsonField: interviewerRole
    values:
      - generalist
      - hr
      - hiring_manager
      - technical_manager
      - peer

  - name: SessionStatus
    sourceSection: "5.6"
    jsonField: sessionStatus
    values:
      - queued
      - running
      - waiting_user_input
      - completing
      - completed
      - failed
      - cancelled

  - name: ReportStatus
    sourceSection: "5.7"
    jsonField: reportStatus
    values:
      - queued
      - generating
      - ready
      - failed

  - name: ReadinessTier
    sourceSection: "5.8"
    jsonField: readinessTier
    values:
      - not_ready
      - needs_practice
      - basically_ready
      - well_prepared

  - name: DimensionStatus
    sourceSection: "5.9"
    jsonField: dimensionStatus
    values:
      - strong
      - meets_bar
      - needs_work

  - name: Confidence
    sourceSection: "5.10"
    jsonField: confidence
    values:
      - high
      - medium
      - low

  # §5.13 covers two parallel enum domains for privacy requests; both share the
  # same source section but are distinct generated types in Go and TS.
  - name: PrivacyRequestType
    sourceSection: "5.13"
    jsonField: privacyRequestType
    values:
      - export
      - delete

  - name: PrivacyRequestStatus
    sourceSection: "5.13"
    jsonField: privacyRequestStatus
    values:
      - queued
      - processing
      - completed
      - failed
      - cancelled

# Wire structures (§3.1, §3.2). `optional: true` means generator emits Go pointer /
# omitempty and TS optional `?` field. `nullable: true` means JSON null is a valid
# value (TS uses `T | null`, Go keeps non-pointer with explicit null tagging).
structures:
  PageInfo:
    fields:
      - name: nextCursor
        type: string
        nullable: true
      - name: pageSize
        type: int
      - name: hasMore
        type: bool

  ApiError:
    fields:
      - name: code
        type: string
      - name: message
        type: string
      - name: requestId
        type: string
      - name: retryable
        type: bool
      - name: details
        type: object
        optional: true

# AI shared vocabulary (ADR-Q6 / shared-conventions-codified D-8). These are
# wire-level snake_case field names consumed by A3 AICallMeta runtime, B4 typed
# columns, F1 logs/metrics, and B2 GenerationProvenance. B1 owns the names and
# generated helpers only; runtime fill, storage, and provider config stay outside
# this file.
aiVocabulary:
  capabilities:
    - chat
    - stt
    - tts
    - realtime
    - judge
  providerRegistryFields:
    - name: name
    - name: protocol
    - name: base_url_env
    - name: api_key_env
    - name: capabilities
    - name: version
  modelProfileFields:
    - name: name
    - name: capability
    - name: status
    - name: unsupported_reason
    - name: default
    - name: provider_ref
    - name: model
    - name: params
    - name: fallback
    - name: when
    - name: timeout_ms
    - name: context_window_tokens
    - name: max_tokens
    - name: rate_limit
    - name: route
    - name: version
    - name: privacy_policy
  fields:
    - name: model_profile_name
    - name: model_profile_version
    - name: provider
    - name: capability
    - name: model_family
    - name: model_id
    - name: fallback_chain
    - name: route
    - name: validation_status
    - name: output_schema_version
    - name: prompt_version
    - name: rubric_version
    - name: language
    - name: feature_key
    - name: feature_flag
    - name: data_source_version
    - name: from_provider
    - name: from_model_family
    - name: to_provider
    - name: to_model_family
    - name: tool_invocations
    - name: partial_meta_reason
