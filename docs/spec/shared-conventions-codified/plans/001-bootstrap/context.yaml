apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: shared-conventions-codified
  name: 001-bootstrap
  sequence: 1
  specVersion:
    from: 1.24
    to: 1.27
spec:
  defaultTarget: backend
  discovery:
    aliases:
      - shared-conventions-codified
      - 001-bootstrap
      - shared-conventions
      - cross-language-types
    keywords:
      - shared conventions
      - cross-language types
      - error codes
      - enum codegen
      - api error ownership
      - uuidv7
      - idempotency key
      - go module
      - pnpm workspace
      - typescript toolchain
      - current enum catalog
      - 22 error codes
      - ai shared vocabulary
      - practice mode assisted strict
      - question review status
      - local quality gate
      - codegen check
  targets:
    backend:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      discovery:
        packages:
          - shared/conventions.yaml
          - go.work
          - backend/go.mod
          - backend/cmd/codegen/conventions
          - backend/internal/shared/types
          - backend/internal/shared/errors
          - backend/internal/shared/idx
          - frontend/package.json
          - frontend/src/lib/conventions
          - frontend/src/lib/ids
          - pnpm-workspace.yaml
          - scripts/lint/conventions_yaml.py
          - scripts/lint/error_codes.py
          - Makefile
        uiRoutes: []
        apiNames: []
