apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: backend-review
  name: 001-report-generation-baseline
  sequence: 1
  specVersion:
    from: 1.4
    to: 1.5
spec:
  baseBranch: main
  branch: practice-conversation-simplification
  defaultTarget: backend
  discovery:
    aliases: [conversation report, session-level evidence]
    keywords: [dimensionAssessments, retryFocusCompetencyCodes, no QuestionAssessment, practice_messages]
  targets:
    backend:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      testPlan: ./test-plan.md
      testChecklist: ./test-checklist.md
      bddPlan: ./bdd-plan.md
      bddChecklist: ./bdd-checklist.md
      discovery:
        packages:
          - backend/internal/api/reports
          - backend/internal/review
          - backend/internal/store/review
          - config/prompts/report.generate
          - config/rubrics/report.generate
          - openapi/fixtures/Reports
          - migrations
        apiNames: [getFeedbackReport, listTargetJobReports]
