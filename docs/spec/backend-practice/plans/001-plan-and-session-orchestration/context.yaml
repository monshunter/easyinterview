apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: backend-practice
  name: 001-plan-and-session-orchestration
  sequence: 1
  specVersion:
    from: 1.21
    to: 1.22
spec:
  baseBranch: main
  branch: practice-conversation-simplification
  defaultTarget: backend
  discovery:
    aliases:
      - practice conversation
      - practice messages
      - session opening message
    keywords:
      - PracticeMessage
      - sendPracticeMessage
      - practice.session.chat
      - practice_messages
      - no PracticeTurn
  targets:
    backend:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      testPlan: ./test-plan.md
      testChecklist: ./test-checklist.md
      bddPlan: ./bdd-plan.md
      bddChecklist: ./bdd-checklist.md
      discovery:
        packages:
          - backend/internal/api/practice
          - backend/internal/practice
          - backend/internal/store/practice
          - openapi
          - migrations
          - shared
          - config/prompts
          - config/rubrics
        apiNames:
          - createPracticePlan
          - getPracticePlan
          - startPracticeSession
          - getPracticeSession
          - sendPracticeMessage
