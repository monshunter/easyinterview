apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: backend-practice
  name: 004-report-derived-practice-plans
  sequence: 4
  specVersion:
    from: 1.9
    to: 1.14
spec:
  defaultTarget: backend
  discovery:
    aliases:
      - backend-practice
      - backend-practice/004
      - 004-report-derived-practice-plans
      - report-derived-practice
    keywords:
      - practice
      - derived plan
      - retry_current_round
      - next_round
      - report-derived practice
      - sourceReportId
      - source_report_id
      - createPracticePlan
      - getPracticePlan
      - startPracticeSession
      - mode assisted strict
      - 004-report-derived-practice-plans
  targets:
    backend:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      testPlan: ./test-plan.md
      testChecklist: ./test-checklist.md
      bddPlan: ./bdd-plan.md
      bddChecklist: ./bdd-checklist.md
      discovery:
        packages:
          - backend/internal/api/practice
          - backend/internal/practice
          - backend/internal/store/practice
          - backend/cmd/api
          - migrations
          - openapi/fixtures/PracticePlans
          - openapi/fixtures/PracticeSessions
          - openapi
          - test/scenarios/e2e/p0-070-practice-derived-plan-create-read-replay
          - test/scenarios/e2e/p0-072-practice-derived-source-isolation-privacy
          - scripts/lint
        apiNames:
          - createPracticePlan
          - getPracticePlan
          - startPracticeSession
