apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: backend-practice
  name: 002-event-loop-and-completion
  sequence: 2
  specVersion:
    from: 1.21
    to: 1.22
spec:
  baseBranch: main
  branch: practice-conversation-simplification
  defaultTarget: backend
  discovery:
    aliases: [practice conversation loop, send practice message]
    keywords: [sendPracticeMessage, clientMessageId, replyToMessageId, practice_messages, completePracticeSession]
  targets:
    backend:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      testPlan: ./test-plan.md
      testChecklist: ./test-checklist.md
      bddPlan: ./bdd-plan.md
      bddChecklist: ./bdd-checklist.md
      discovery:
        packages:
          - backend/internal/api/practice
          - backend/internal/practice
          - backend/internal/store/practice
          - frontend/src/app/screens/practice
          - openapi/fixtures/PracticeSessions
          - test/scenarios/e2e
        apiNames: [sendPracticeMessage, completePracticeSession]
