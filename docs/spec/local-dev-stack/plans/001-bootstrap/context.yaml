apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: local-dev-stack
  name: 001-bootstrap
  sequence: 1
  specVersion:
    from: null
    to: 1.23
spec:
  defaultTarget: repo
  discovery:
    aliases:
      - local-dev-stack
      - 001-bootstrap
      - dev-stack
      - dev-up
      - dev-doctor
    keywords:
      - docker compose
      - postgres
      - redis
      - minio
      - mailpit
      - local email
      - email code
      - smtp
      - EMAIL_PROVIDER
      - EMAIL_SMTP_HOST
      - EMAIL_SMTP_PORT
      - EMAIL_FROM_ADDRESS
      - EMAIL_VERIFY_BASE_URL
      - application components
      - external dependencies
      - host-run backend
      - host-run frontend
      - backend
      - frontend
      - worker
      - make dev-up
      - make dev-doctor
      - make dev-reset
      - make dev-logs
      - metrics endpoint
      - container logs
      - ai provider
      - AI_PROVIDER_BASE_URL
      - AI_PROVIDER_API_KEY
      - SESSION_COOKIE_SECRET
      - AUTH_CHALLENGE_TOKEN_PEPPER
      - VITE_EI_API_MODE
      - VITE_EI_API_BASE_URL
      - single env source
      - deploy/dev-stack/.env
      - named volumes
      - PGDATA
      - /var/lib/postgresql
      - health check
      - dev environment
      - local runner
      - scenario environment lifecycle
      - test/scenarios/env-setup.sh
      - test/scenarios/env-verify.sh
      - test/scenarios/env-cleanup.sh
      - test/scenarios/env-redeploy.sh
      - scenario-env-setup
      - scenario-env-redeploy
      - scenario-env-reset-redeploy
      - one-click reset redeploy
      - clean data rebuild redeploy
      - developer debug handoff
      - service endpoints
      - local dev logs
      - .test-output/local-dev
      - APP_LISTEN_ADDR
      - API_HOST_PORT
      - loopback backend
      - bridge listener
      - first-login resume 500
      - no kind
      - no k8s
  targets:
    repo:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      discovery:
        packages:
          - deploy/dev-stack
          - deploy/dev-stack/init
          - deploy/dev-stack/scripts
          - deploy/dev-stack/scripts/check-postgres-volume-layout.sh
          - Makefile
          - backend/internal/auth
          - backend/cmd/api
          - backend/internal/platform/config
          - config
          - test/scenarios/e2e/p0-100-real-provider-full-funnel-hybrid
          - test/scenarios
          - test/scenarios/env-setup.sh
          - test/scenarios/env-status.sh
          - test/scenarios/env-verify.sh
          - test/scenarios/env-cleanup.sh
          - test/scenarios/env-redeploy.sh
          - test/scenarios/_shared/scripts/local-dev-runtime.sh
          - .agent-skills/scenario-env
          - .agent-skills/scenario-redeploy
        uiRoutes: []
        apiNames: []
