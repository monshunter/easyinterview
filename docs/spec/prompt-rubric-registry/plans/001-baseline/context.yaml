apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: prompt-rubric-registry
  name: 001-baseline
  sequence: 1
  supersedes: []
  specVersion:
    from: 2.0
    to: 2.1
spec:
  defaultTarget: backend
  discovery:
    aliases:
      - prompt-rubric-registry
      - prompt-rubric
      - F3-baseline
      - 001-baseline
    keywords:
      - prompt registry
      - rubric registry
      - Resolve
      - ResolveActive
      - template_hash
      - feature_key
      - feature_flag
      - data_source_version
      - ai_task_runs typed provenance
      - B1 B4 A3 provenance remediation
      - model_profile_name
      - lint-prompts
      - lint-rubrics
      - lint-prompts-hardcode
      - lint-ai-profile-coverage
      - prompt_versions
      - rubric_versions
      - ai_task_runs
      - LLM Judge
      - NotImplementedJudge
      - GenerationProvenance
      - StaticPromptRegistry retire
      - language fallback multi
  targets:
    backend:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      references:
        - ../../../ai-provider-and-model-routing/spec.md
        - ../../../backend-practice/spec.md
        - ../../../backend-targetjob/spec.md
        - ../../../db-migrations-baseline/spec.md
        - ../../../engineering-roadmap/decisions/ADR-Q6-ai-provider-and-model-routing.md
        - ../../../engineering-roadmap/spec.md
        - ../../../observability-stack/spec.md
        - ../../../secrets-and-config/spec.md
        - ../../../shared-conventions-codified/spec.md
      discovery:
        packages:
          - backend/internal/ai/registry
          - backend/internal/ai/aiclient
          - backend/internal/shared/ai
          - backend/internal/targetjob
          - backend/cmd/api
          - shared/conventions.yaml
          - config/prompts
          - config/rubrics
          - scripts/lint
          - migrations
        uiRoutes: []
        apiNames:
          - importTargetJob
          - getTargetJob
