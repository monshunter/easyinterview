apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: harness-simplification
  name: 001-full-migration
  sequence: 1
  specVersion:
    from: null
    to: 1.0
spec:
  defaultTarget: tooling
  discovery:
    aliases:
      - harness-simplification
      - lightweight-context
    keywords:
      - context.yaml
      - generated index
      - progressive context
      - skill consolidation
  targets:
    tooling:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      discovery:
        packages:
          - .agent-skills
          - docs/spec
          - scripts
