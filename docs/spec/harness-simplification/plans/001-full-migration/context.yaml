apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: harness-simplification
  name: 001-full-migration
  sequence: 1
  specVersion:
    from: 1.0
    to: 1.8
spec:
  defaultTarget: tooling
  discovery:
    aliases:
      - harness-simplification
      - lightweight-context
    keywords:
      - agent workflow
      - independent skills
      - progressive convergence
      - risk evidence economy
      - capability sourcing
      - project arch
      - init arch
      - docs test scenario env
  targets:
    tooling:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      discovery:
        packages:
          - AGENTS.md
          - .agent-skills
          - docs
          - scripts
