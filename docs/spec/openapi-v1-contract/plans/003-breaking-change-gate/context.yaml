apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: openapi-v1-contract
  name: 003-breaking-change-gate
  sequence: 3
  specVersion:
    from: 1.35
    to: 1.35
spec:
  defaultTarget: contract
  discovery:
    aliases:
      - openapi-v1-contract
      - 003-breaking-change-gate
      - openapi-diff
      - additive-only
      - v1-freeze
      - 35 operations
      - 10 tags
      - breaking-change-linter
      - baseline-snapshot
    keywords:
      - openapi-diff
      - additive only
      - breaking change
      - baseline yaml
      - v1.0.0 freeze
      - privacy export whitelist
      - 501 to 202
      - ADR template
      - baseline README
      - diff wrapper script
      - local quality gate
      - B2 freeze handoff
  targets:
    contract:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      discovery:
        packages:
          - openapi/baseline
          - openapi
          - scripts/lint
          - docs/spec/openapi-v1-contract/decisions
          - Makefile
        uiRoutes: []
        apiNames: []
