      - hybrid UAT
      - MANUAL_REQUIRED
      - real provider
      - real AI LLM
      - DeepSeek
      - AI_PROVIDER_API_KEY
      - AI_PROVIDER_BASE_URL
      - VITE_EI_API_MODE=real
      - deploy/dev-stack/.env
      - single local env source
      - APP_ENV=dev
      - no mock data
      - mailpit
      - email code
      - local mailbox
      - shell python scenario helper
