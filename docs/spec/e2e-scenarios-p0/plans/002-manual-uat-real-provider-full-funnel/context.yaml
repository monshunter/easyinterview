          - deploy/dev-stack
          - backend/cmd/api
          - backend/internal/auth
          - backend/internal/ai/aiclient
          - frontend/src/api
          - frontend/src/app
        uiRoutes:
          - home
          - parse
          - workspace
          - practice
          - generating
          - report
        apiNames:
          - startAuthEmailChallenge
          - verifyAuthEmailChallenge
          - registerResume
          - importTargetJob
          - getTargetJob
          - createPracticePlan
          - startPracticeSession
          - appendSessionEvent
          - completePracticeSession
          - getFeedbackReport
          - getJob
