apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: e2e-scenarios-p0
  name: 001-full-funnel-happy-journey
  sequence: 1
  specVersion:
    from: 1.9
    to: 2.0
spec:
  defaultTarget: scenario
  discovery:
    aliases:
      - e2e-scenarios-p0
      - e2e-scenarios-p0/001
      - current-conversation-funnel
    keywords:
      - continuous conversation
      - sendPracticeMessage
      - practice messages
      - conversation report
      - disabled voice
      - E2E.P0.098
      - E2E.P0.099
      - real browser evidence
      - PostgreSQL array
  targets:
    scenario:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      bddPlan: ./bdd-plan.md
      bddChecklist: ./bdd-checklist.md
      discovery:
        apiNames:
          - createPracticePlan
          - startPracticeSession
          - sendPracticeMessage
          - completePracticeSession
          - getFeedbackReport
