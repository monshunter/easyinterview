apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: frontend-workspace-and-practice
  name: 002-practice-text-event-loop
  sequence: 2
  specVersion:
    from: 1.33
    to: 1.34
spec:
  baseBranch: main
  branch: practice-conversation-simplification
  defaultTarget: frontend
  discovery:
    aliases: [practice continuous chat, full width conversation]
    keywords: [PracticeScreen, PracticeMessage, sendPracticeMessage, disabled phone, no SessionMap, no QuestionCard]
  targets:
    frontend:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      testPlan: ./test-plan.md
      testChecklist: ./test-checklist.md
      bddPlan: ./bdd-plan.md
      bddChecklist: ./bdd-checklist.md
      discovery:
        packages:
          - ui-design/src/screen-practice.jsx
          - frontend/src/app/screens/practice
          - frontend/src/app/interview-context
          - frontend/src/app/i18n/locales
          - frontend/tests/pixel-parity
          - test/scenarios/e2e
        uiRoutes: [practice, generating]
        apiNames: [getPracticeSession, sendPracticeMessage, completePracticeSession, getTargetJob]
