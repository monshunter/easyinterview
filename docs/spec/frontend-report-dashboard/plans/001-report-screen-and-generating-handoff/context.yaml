apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: frontend-report-dashboard
  name: 001-report-screen-and-generating-handoff
  sequence: 1
  specVersion:
    from: 1.10
    to: 1.11
spec:
  baseBranch: main
  branch: practice-conversation-simplification
  defaultTarget: frontend
  discovery:
    aliases: [conversation report dashboard, session evidence report]
    keywords: [dimensionAssessments, retryFocusCompetencyCodes, four tabs, no QuestionsTab]
  targets:
    frontend:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      testPlan: ./test-plan.md
      testChecklist: ./test-checklist.md
      bddPlan: ./bdd-plan.md
      bddChecklist: ./bdd-checklist.md
      discovery:
        packages:
          - ui-design/src/screen-report.jsx
          - ui-design/src/screens-p0-complete.jsx
          - frontend/src/app/screens/report
          - frontend/src/app/screens/generating
          - frontend/src/app/i18n/locales
          - frontend/tests/pixel-parity
          - test/scenarios/e2e
        uiRoutes: [generating, report]
        apiNames: [getFeedbackReport, createPracticePlan, startPracticeSession]
