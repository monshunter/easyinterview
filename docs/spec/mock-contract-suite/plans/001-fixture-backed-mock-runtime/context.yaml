          - logout
          - createUploadPresign
          - listResumes
          - registerResume
          - getResume
          - getResumeSource
          - updateResume
          - duplicateResume
          - archiveResume
          - exportResume
          - importTargetJob
          - listTargetJobs
          - getTargetJob
