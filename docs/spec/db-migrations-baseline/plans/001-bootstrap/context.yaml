apiVersion: plancontext.agent.dev/v1alpha1
kind: PlanContext
metadata:
  subspec: db-migrations-baseline
  name: 001-bootstrap
  sequence: 1
  supersedes: []
  specVersion:
    from: null
    to: 1.6
spec:
  defaultTarget: backend
  discovery:
    aliases:
      - db-migrations-baseline
      - 001-bootstrap
      - migrations-baseline
      - migrate-check
    keywords:
      - golang-migrate
      - schema migrations
      - schema backfills
      - pgvector
      - outbox retry columns
      - ai task runs
      - privacy deletion matrix
      - no mistake entries
      - question issue count
      - enum source lint
  targets:
    backend:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      discovery:
        packages:
          - migrations
          - migrations/backfill
          - backend/cmd/migrate
          - backend/internal/migrations
          - scripts/lint
          - Makefile
        uiRoutes: []
        apiNames: []
