  discovery:
    aliases:
      - db-migrations-baseline
      - 001-bootstrap
      - migrations-baseline
      - migrate-check
    keywords:
      - golang-migrate
      - schema migrations
      - schema backfills
      - postgres
      - outbox retry columns
      - ai task runs
      - privacy deletion matrix
      - no mistake entries
      - question issue count
      - enum source lint
      - practice plan round identity
      - round sequence
      - legacy round backfill
      - 000018 grounded report context
      - generation_context
      - no report product retry column
      - no llm attempt count column
      - action scoped retry stays outside database
      - focus_dimension_codes
      - REPORT_STORAGE_V18_PASS
  targets:
    backend:
      plan: ./plan.md
      checklist: ./checklist.md
      spec: ../../spec.md
      references:
        - ../../../backend-review/spec.md
        - ../../../backend-review/plans/001-report-generation-baseline/plan.md
      discovery:
        packages:
          - migrations
          - backend/cmd/migrate
          - backend/internal/migrations
          - scripts/lint
          - Makefile
        uiRoutes: []
        apiNames: []
