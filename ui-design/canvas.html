<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>EasyInterview · 设计画板</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Inter", system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
  const ART_W = 1280, ART_H = 860, FRAME_W = 420;
  const UI_VERSION = "20260502-voice-debrief-conv";
  const FRAME_H = Math.round(ART_H * FRAME_W / ART_W);
  const Screen = ({ route, jobId = "tj-1", mode, sessionId, dark, lang = "zh", theme, customAccent, fontPreset, role, practiceMode, debriefInputMode, debriefVoiceState }) => {
    const params = new URLSearchParams();
    params.set("route", route); params.set("nochrome", "0"); params.set("lang", lang);
    if (jobId) params.set("jobId", jobId);
    if (jobId) params.set("targetJobId", jobId);
    if (jobId) params.set("planId", `plan-${jobId}`);
    if (jobId) params.set("jdId", `jd-${jobId}`);
    params.set("resumeVersionId", "frontend-v3");
    params.set("roundId", "round-manager");
    params.set("roundName", lang === "en" ? "Manager round" : "经理面");
    if (sessionId || ["practice", "voice", "generating", "report"].includes(route)) params.set("sessionId", sessionId || "session-24");
    if (mode) params.set("mode", mode);
    if (dark) params.set("dark", "1");
    if (theme) params.set("theme", theme);
    if (customAccent) params.set("customAccent", `${customAccent.h},${customAccent.c}`);
    if (fontPreset) params.set("fontPreset", fontPreset);
    if (role) params.set("role", role);
    if (practiceMode) params.set("practiceMode", practiceMode);
    if (debriefInputMode) params.set("debriefInputMode", debriefInputMode);
    if (debriefVoiceState) params.set("debriefVoiceState", debriefVoiceState);
    return (
      <div style={{ width: FRAME_W, height: FRAME_H, background: dark ? "#16130e" : "#fdfcf8", overflow: "hidden" }}>
        <iframe src={"index.html?v=" + UI_VERSION + "#" + params.toString()} loading="lazy"
          style={{ border: "none", width: ART_W, height: ART_H, transform: `scale(${FRAME_W / ART_W})`, transformOrigin: "top left", pointerEvents: "none" }} />
      </div>
    );
  };
  const PracticeScreen = (props) => <Screen route="practice" {...props} />;
  const App = () => (
    <DesignCanvas>
      <DCSection id="flow" title="EasyInterview · 核心用户闭环" subtitle="从一份 JD 到下一轮更强的准备">
        <DCArtboard id="home" label="01 · 首页（JD 导入）" width={FRAME_W} height={FRAME_H}><Screen route="home" /></DCArtboard>
        <DCArtboard id="ws" label="02 · 模拟面试规划" width={FRAME_W} height={FRAME_H}><Screen route="workspace" /></DCArtboard>
        <DCArtboard id="practice" label="03 · 模拟面试进行中" width={FRAME_W} height={FRAME_H}><PracticeScreen mode="core" /></DCArtboard>
        <DCArtboard id="report" label="04 · 证据化报告仪表盘" width={FRAME_W} height={FRAME_H}><Screen route="report" /></DCArtboard>
      </DCSection>
      <DCSection id="jd-match" title="JD 智能匹配 · 联网搜索代理" subtitle="按用户画像扫描市场">
        <DCArtboard id="jdm-recommend" label="为你推荐 · 匹配评分" width={FRAME_W} height={FRAME_H}><Screen route="jd_match" /></DCArtboard>
        <DCArtboard id="jdm-recommend-dark" label="为你推荐 · 暗色" width={FRAME_W} height={FRAME_H}><Screen route="jd_match" dark /></DCArtboard>
        <DCArtboard id="jdm-en" label="Recommended · English" width={FRAME_W} height={FRAME_H}><Screen route="jd_match" lang="en" /></DCArtboard>
        <DCArtboard id="company-intel" label="公司情报 · Company Intel" width={FRAME_W} height={FRAME_H}><Screen route="company_intel" /></DCArtboard>
      </DCSection>
      <DCSection id="auth" title="账户体系 · 登录 / 注册 / 验证 / 重置" subtitle="M0 入口">
        <DCArtboard id="auth-login" label="登录 · 邮箱密码" width={FRAME_W} height={FRAME_H}><Screen route="auth_login" /></DCArtboard>
        <DCArtboard id="auth-register" label="注册 · 创建账户" width={FRAME_W} height={FRAME_H}><Screen route="auth_register" /></DCArtboard>
        <DCArtboard id="auth-verify" label="邮箱验证 · 6 位验证码" width={FRAME_W} height={FRAME_H}><Screen route="auth_verify" /></DCArtboard>
        <DCArtboard id="auth-reset" label="重置密码 · 60s 倒计时" width={FRAME_W} height={FRAME_H}><Screen route="auth_reset" /></DCArtboard>
        <DCArtboard id="auth-logout" label="退出登录 · 二次确认" width={FRAME_W} height={FRAME_H}><Screen route="auth_logout" /></DCArtboard>
      </DCSection>
      <DCSection id="profile" title="用户画像 · Profile" subtitle="设置入口的下一层">
        <DCArtboard id="profile-zh" label="用户画像 · 中文" width={FRAME_W} height={FRAME_H}><Screen route="profile" /></DCArtboard>
        <DCArtboard id="profile-en" label="User profile · English" width={FRAME_W} height={FRAME_H}><Screen route="profile" lang="en" /></DCArtboard>
        <DCArtboard id="profile-dark" label="用户画像 · 暗色" width={FRAME_W} height={FRAME_H}><Screen route="profile" dark /></DCArtboard>
      </DCSection>
      <DCSection id="p0-complete" title="P0 补齐 · 入口 / 异步 / 隐私">
        <DCArtboard id="parse" label="JD 解析 · loading → 预览" width={FRAME_W} height={FRAME_H}><Screen route="parse" /></DCArtboard>
        <DCArtboard id="generating" label="报告生成中 · 异步观察流" width={FRAME_W} height={FRAME_H}><Screen route="generating" /></DCArtboard>
        <DCArtboard id="settings" label="设置 · 隐私 / 导出 / 删除" width={FRAME_W} height={FRAME_H}><Screen route="settings" /></DCArtboard>
      </DCSection>
      <DCSection id="voice" title="语音模式 · 统一 Session 骨架" subtitle="同一题目地图 / 顶部控制 / 语音表达层反馈">
        <DCArtboard id="voice-light" label="语音面试 · 统一骨架" width={FRAME_W} height={FRAME_H}><Screen route="practice" mode="voice" /></DCArtboard>
        <DCArtboard id="voice-dark" label="语音面试 · 统一骨架 · 暗色" width={FRAME_W} height={FRAME_H}><Screen route="practice" mode="voice" dark /></DCArtboard>
      </DCSection>
      <DCSection id="p1-coaching" title="P1 · Session 练习方式" subtitle="严格模拟（提示隐藏）vs 带提示练习 · 外层框架 switch 开关">
        <DCArtboard id="practice-assisted" label="带提示练习（默认）" width={FRAME_W} height={FRAME_H}><Screen route="practice" practiceMode="assisted" /></DCArtboard>
        <DCArtboard id="practice-strict" label="严格模拟 · 提示与经历隐藏" width={FRAME_W} height={FRAME_H}><Screen route="practice" practiceMode="strict" /></DCArtboard>
        <DCArtboard id="practice-strict-voice" label="严格模拟 · 语音模式" width={FRAME_W} height={FRAME_H}><Screen route="practice" mode="voice" practiceMode="strict" /></DCArtboard>
      </DCSection>
      <DCSection id="p1-depth" title="P1 深度 · 复盘 / 简历">
        <DCArtboard id="debrief" label="复盘 · 文本引导（默认）" width={FRAME_W} height={FRAME_H}><Screen route="debrief" /></DCArtboard>
        <DCArtboard id="resume-versions" label="简历多版本 · bullet diff" width={FRAME_W} height={FRAME_H}><Screen route="resume_versions" /></DCArtboard>
      </DCSection>
      <DCSection id="p1-voice-debrief" title="P1 · 复盘语音模式" subtitle="AI 持续监听 + 双向语音对话 · 无需手动点录 · [空格] 暂停 · 实时提取卡片">
        <DCArtboard id="debrief-voice-intro" label="语音复盘 · 开始引导" width={FRAME_W} height={FRAME_H}><Screen route="debrief" debriefInputMode="voice" /></DCArtboard>
        <DCArtboard id="debrief-voice-chat" label="语音复盘 · 连续对话进行中" width={FRAME_W} height={FRAME_H}><Screen route="debrief" debriefInputMode="voice" debriefVoiceState="chat" /></DCArtboard>
        <DCArtboard id="debrief-voice-review" label="语音复盘 · 待确认卡片" width={FRAME_W} height={FRAME_H}><Screen route="debrief" debriefInputMode="voice" debriefVoiceState="review" /></DCArtboard>
      </DCSection>
      <DCSection id="theme-palette" title="主题色板 · 4 个预定义主题" subtitle="主题与暗/浅色正交">
        <DCArtboard id="theme-warm" label="Warm · 暖陶（默认）" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="warm" /></DCArtboard>
        <DCArtboard id="theme-forest" label="Forest · 苔林" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="forest" /></DCArtboard>
        <DCArtboard id="theme-ocean" label="Ocean · 深海" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="ocean" /></DCArtboard>
        <DCArtboard id="theme-plum" label="Plum · 梅子" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="plum" /></DCArtboard>
      </DCSection>
      <DCSection id="theme-dark" title="主题色板 · 暗色矩阵">
        <DCArtboard id="theme-warm-dark" label="Warm · 暗色" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="warm" dark /></DCArtboard>
        <DCArtboard id="theme-ocean-dark" label="Ocean · 暗色" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="ocean" dark /></DCArtboard>
        <DCArtboard id="theme-plum-dark" label="Plum · 暗色" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="plum" dark /></DCArtboard>
      </DCSection>
      <DCSection id="custom-accent" title="自定义 accent · 任意色相 × 任意饱和度" subtitle="OKLch 取色器">
        <DCArtboard id="custom-orange" label="Custom · 橙金 (h=50)" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="warm" customAccent={{ h: 50, c: 0.18 }} /></DCArtboard>
        <DCArtboard id="custom-teal" label="Custom · 青苔 (h=180)" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="forest" customAccent={{ h: 180, c: 0.14 }} /></DCArtboard>
        <DCArtboard id="custom-violet" label="Custom · 紫罗兰 (h=290)" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="ocean" customAccent={{ h: 290, c: 0.20 }} /></DCArtboard>
      </DCSection>
      <DCSection id="font-presets" title="字体预设 · 编辑级 / 现代 / 杂志">
        <DCArtboard id="font-editorial" label="编辑级 · Noto Serif SC + Inter" width={FRAME_W} height={FRAME_H}><Screen route="report" fontPreset="editorial" /></DCArtboard>
        <DCArtboard id="font-modern" label="现代 · Source Serif Pro + Geist" width={FRAME_W} height={FRAME_H}><Screen route="report" fontPreset="modern" /></DCArtboard>
        <DCArtboard id="font-magazine" label="杂志 · Cormorant + IBM Plex Sans" width={FRAME_W} height={FRAME_H}><Screen route="report" fontPreset="magazine" /></DCArtboard>
      </DCSection>
      <DCSection id="roles" title="面试官角色 · 综合 / HR / 用人经理">
        <DCArtboard id="general" label="综合面试官" width={FRAME_W} height={FRAME_H}><PracticeScreen role="general" /></DCArtboard>
        <DCArtboard id="hr" label="HR / 初筛" width={FRAME_W} height={FRAME_H}><PracticeScreen role="hr" /></DCArtboard>
        <DCArtboard id="manager" label="用人经理" width={FRAME_W} height={FRAME_H}><PracticeScreen role="manager" /></DCArtboard>
      </DCSection>
      <DCPostIt top={-28} left={60} rotate={-3} width={220}>提示：点击任一画板右上角 ⤢ 展开 → 可按 ← → 翻页、Esc 退出。</DCPostIt>
      <DCPostIt top={330} right={60} rotate={2.5} width={210}>所有画板都是真实 iframe（loading=lazy）。Tweaks 改完主题、字体、accent，这里会同步更新。</DCPostIt>
    </DesignCanvas>
  );
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
