<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>EasyInterview · 设计画板</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Inter", system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
  const ART_W = 1280, ART_H = 860, FRAME_W = 420;
  const UI_VERSION = "20260612-ocean-default";
  const FRAME_H = Math.round(ART_H * FRAME_W / ART_W);
  const Screen = ({ route, jobId = "tj-1", mode, sessionId, dark, lang = "zh", theme, customAccent, fontPreset }) => {
    const params = new URLSearchParams();
    params.set("route", route); params.set("nochrome", "0"); params.set("lang", lang);
    if (jobId) params.set("jobId", jobId);
    if (jobId) params.set("targetJobId", jobId);
    if (jobId) params.set("planId", `plan-${jobId}`);
    if (jobId) params.set("jdId", `jd-${jobId}`);
    params.set("resumeId", "frontend-v3");
    params.set("roundId", "round-manager");
    params.set("roundName", lang === "en" ? "Manager round" : "经理面");
    if (sessionId || ["practice", "generating", "report"].includes(route)) params.set("sessionId", sessionId || "session-24");
    if (mode) params.set("mode", mode);
    if (dark) params.set("dark", "1");
    if (theme) params.set("theme", theme);
    if (customAccent) params.set("customAccent", `${customAccent.h},${customAccent.c}`);
    if (fontPreset) params.set("fontPreset", fontPreset);
    return (
      <div style={{ width: FRAME_W, height: FRAME_H, background: dark ? "#16130e" : "#fdfcf8", overflow: "hidden" }}>
        <iframe src={"index.html?v=" + UI_VERSION + "#" + params.toString()} loading="lazy"
          style={{ border: "none", width: ART_W, height: ART_H, transform: `scale(${FRAME_W / ART_W})`, transformOrigin: "top left", pointerEvents: "none" }} />
      </div>
    );
  };
  const PracticeScreen = (props) => <Screen route="practice" {...props} />;
  const App = () => (
    <DesignCanvas>
      <DCSection id="flow" title="EasyInterview · 核心用户闭环" subtitle="从一份 JD 到下一轮更强的准备">
        <DCArtboard id="home" label="01 · 首页（JD 导入）" width={FRAME_W} height={FRAME_H}><Screen route="home" /></DCArtboard>
        <DCArtboard id="ws" label="02 · 模拟面试规划" width={FRAME_W} height={FRAME_H}><Screen route="workspace" /></DCArtboard>
        <DCArtboard id="practice" label="03 · 模拟面试进行中" width={FRAME_W} height={FRAME_H}><PracticeScreen mode="text" /></DCArtboard>
        <DCArtboard id="report" label="04 · 证据化报告仪表盘" width={FRAME_W} height={FRAME_H}><Screen route="report" /></DCArtboard>
      </DCSection>
      <DCSection id="auth" title="账户体系 · 登录 / 验证 / 首次资料补全" subtitle="M0 入口">
        <DCArtboard id="auth-login" label="登录 · 邮箱验证码" width={FRAME_W} height={FRAME_H}><Screen route="auth_login" /></DCArtboard>
        <DCArtboard id="auth-verify" label="邮箱验证 · 6 位验证码" width={FRAME_W} height={FRAME_H}><Screen route="auth_verify" /></DCArtboard>
        <DCArtboard id="auth-profile-setup" label="首次资料补全 · 显示姓名" width={FRAME_W} height={FRAME_H}><Screen route="auth_profile_setup" /></DCArtboard>
        <DCArtboard id="auth-logout" label="退出登录 · 二次确认" width={FRAME_W} height={FRAME_H}><Screen route="auth_logout" /></DCArtboard>
      </DCSection>
      <DCSection id="p0-complete" title="P0 补齐 · 入口 / 异步 / 隐私">
        <DCArtboard id="parse" label="JD 解析 · loading → 预览" width={FRAME_W} height={FRAME_H}><Screen route="parse" /></DCArtboard>
        <DCArtboard id="generating" label="报告生成中 · 异步观察流" width={FRAME_W} height={FRAME_H}><Screen route="generating" /></DCArtboard>
        <DCArtboard id="settings" label="设置 · 隐私 / 导出 / 删除" width={FRAME_W} height={FRAME_H}><Screen route="settings" /></DCArtboard>
      </DCSection>
      <DCSection id="phone" title="电话模式 · 统一 Session 骨架" subtitle="同一题目地图 / 顶部控制 / 可选字幕">
        <DCArtboard id="phone-light" label="电话模式 · 统一骨架" width={FRAME_W} height={FRAME_H}><Screen route="practice" mode="phone" /></DCArtboard>
        <DCArtboard id="phone-dark" label="电话模式 · 统一骨架 · 暗色" width={FRAME_W} height={FRAME_H}><Screen route="practice" mode="phone" dark /></DCArtboard>
      </DCSection>
      <DCSection id="practice-session" title="Session 练习方式" subtitle="文本 / 电话共享同一套面试会话">
        <DCArtboard id="practice-text" label="文本面试 · 可选提示" width={FRAME_W} height={FRAME_H}><Screen route="practice" mode="text" /></DCArtboard>
        <DCArtboard id="practice-phone" label="电话模式 · 可选字幕" width={FRAME_W} height={FRAME_H}><Screen route="practice" mode="phone" /></DCArtboard>
      </DCSection>
      <DCSection id="resume-workshop" title="简历工坊 · 简历资产" subtitle="简历列表、预览、改写与导出">
        <DCArtboard id="resume-versions" label="简历工坊 · 平铺列表" width={FRAME_W} height={FRAME_H}><Screen route="resume_versions" /></DCArtboard>
      </DCSection>
      <DCSection id="theme-palette" title="主题色板 · 2 个预定义主题" subtitle="主题与暗/浅色正交 · 默认深海 · 可自定义 accent">
        <DCArtboard id="theme-ocean" label="Ocean · 深海（默认）" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="ocean" /></DCArtboard>
        <DCArtboard id="theme-plum" label="Plum · 梅子" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="plum" /></DCArtboard>
      </DCSection>
      <DCSection id="theme-dark" title="主题色板 · 暗色矩阵">
        <DCArtboard id="theme-ocean-dark" label="Ocean · 暗色" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="ocean" dark /></DCArtboard>
        <DCArtboard id="theme-plum-dark" label="Plum · 暗色" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="plum" dark /></DCArtboard>
      </DCSection>
      <DCSection id="custom-accent" title="自定义 accent · 任意色相 × 任意饱和度" subtitle="OKLch 取色器">
        <DCArtboard id="custom-orange" label="Custom · 橙金 (h=50)" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="ocean" customAccent={{ h: 50, c: 0.18 }} /></DCArtboard>
        <DCArtboard id="custom-teal" label="Custom · 青绿 (h=180)" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="ocean" customAccent={{ h: 180, c: 0.14 }} /></DCArtboard>
        <DCArtboard id="custom-violet" label="Custom · 紫罗兰 (h=290)" width={FRAME_W} height={FRAME_H}><Screen route="workspace" theme="ocean" customAccent={{ h: 290, c: 0.20 }} /></DCArtboard>
      </DCSection>
      <DCSection id="font-presets" title="字体预设 · 编辑级 / 现代 / 杂志">
        <DCArtboard id="font-editorial" label="编辑级 · Noto Serif SC + Inter" width={FRAME_W} height={FRAME_H}><Screen route="report" fontPreset="editorial" /></DCArtboard>
        <DCArtboard id="font-modern" label="现代 · Source Serif Pro + Geist" width={FRAME_W} height={FRAME_H}><Screen route="report" fontPreset="modern" /></DCArtboard>
        <DCArtboard id="font-magazine" label="杂志 · Cormorant + IBM Plex Sans" width={FRAME_W} height={FRAME_H}><Screen route="report" fontPreset="magazine" /></DCArtboard>
      </DCSection>
      <DCPostIt top={-28} left={60} rotate={-3} width={220}>提示：点击任一画板右上角 ⤢ 展开 → 可按 ← → 翻页、Esc 退出。</DCPostIt>
      <DCPostIt top={330} right={60} rotate={2.5} width={210}>所有画板都是真实 iframe（loading=lazy）。Tweaks 改完主题、字体、accent，这里会同步更新。</DCPostIt>
    </DesignCanvas>
  );
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
