# easyinterview local dev stack — minimal default profile.
#
# Owned by docs/spec/local-dev-stack/plans/001-bootstrap.
# Default services: Postgres, Redis, MinIO + bucket-init, Mailpit.
# OTel Collector / Grafana / Loki / Prometheus / AI provider are intentionally
# absent (spec D-1..D-9). Project components (backend, frontend)
# are appended here once their owning child plans land a local runtime entry.

name: easyinterview-dev

x-backend-environment: &backend-environment
  APP_ENV: dev
  APP_LISTEN_ADDR: ":8080"
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATABASE_URL: postgres://${POSTGRES_USER:-easyinterview}:${POSTGRES_PASSWORD:-dev}@postgres-dev:5432/${POSTGRES_DB:-easyinterview}?sslmode=disable
  REDIS_URL: redis://redis-dev:6379/0
  OBJECT_STORAGE_ENDPOINT: http://minio.localhost:${MINIO_API_HOST_PORT:-9000}
  OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-easyinterview-dev}
  OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-dev-access-key}
  OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-dev-secret-key}
  SESSION_COOKIE_SECRET: ${SESSION_COOKIE_SECRET:-}
  AUTH_CHALLENGE_TOKEN_PEPPER: ${AUTH_CHALLENGE_TOKEN_PEPPER:-}
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mailpit}
  EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-mailpit-dev}
  EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-1025}
  EMAIL_SMTP_USERNAME: ${EMAIL_SMTP_USERNAME:-}
  EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
  EMAIL_SMTP_TLS_MODE: ${EMAIL_SMTP_TLS_MODE:-none}
  EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@easyinterview.local}
  EMAIL_VERIFY_BASE_URL: http://127.0.0.1:${FULL_CONTAINER_FRONTEND_HOST_PORT:-10800}/auth/verify
  AI_PROVIDER_REGISTRY_PATH: /app/config/ai-providers.yaml
  AI_PROVIDER_BASE_URL: ${AI_PROVIDER_BASE_URL:-}
  AI_PROVIDER_API_KEY: ${AI_PROVIDER_API_KEY:-}
  AI_MODEL_PROFILE_PATH: /app/config/ai-profiles.yaml
  AI_DEBUG_PRINT_RAW_OUTPUT: ${AI_DEBUG_PRINT_RAW_OUTPUT:-true}
  FEATURE_FLAG_SOURCE: ${FEATURE_FLAG_SOURCE:-file}
  FEATURE_FLAG_FILE_PATH: /app/config/feature-flags.yaml

services:
  postgres-dev:
    image: postgres:18-alpine
    container_name: easyinterview-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-easyinterview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: ${POSTGRES_DB:-easyinterview}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - easyinterview-pg-data:/var/lib/postgresql
    networks:
      - easyinterview-dev
    labels:
      easyinterview.dev-stack.role: dependency
      easyinterview.dev-stack.service: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easyinterview} -d ${POSTGRES_DB:-easyinterview}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis-dev:
    image: redis:7-alpine
    container_name: easyinterview-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - easyinterview-redis-data:/data
    networks:
      - easyinterview-dev
    labels:
      easyinterview.dev-stack.role: dependency
      easyinterview.dev-stack.service: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  minio-dev:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: easyinterview-minio-dev
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-dev-access-key}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-dev-secret-key}
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - easyinterview-minio-data:/data
    networks:
      - easyinterview-dev
    labels:
      easyinterview.dev-stack.role: dependency
      easyinterview.dev-stack.service: minio
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  mailpit-dev:
    image: axllent/mailpit:v1.30.0
    container_name: easyinterview-mailpit-dev
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_HOST_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_HOST_PORT:-1025}:1025"
    networks:
      - easyinterview-dev
    labels:
      easyinterview.dev-stack.role: dependency
      easyinterview.dev-stack.service: mailpit
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8025/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: easyinterview-minio-init
    depends_on:
      minio-dev:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-dev-access-key}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-dev-secret-key}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-easyinterview-dev}
    entrypoint: ["/bin/sh", "/usr/local/bin/create-buckets.sh"]
    volumes:
      - ./init/minio/create-buckets.sh:/usr/local/bin/create-buckets.sh:ro
    networks:
      - easyinterview-dev
    labels:
      easyinterview.dev-stack.role: init
      easyinterview.dev-stack.service: minio-init
    restart: "no"

  migrate-dev:
    profiles: ["full-container"]
    build:
      context: ../..
      dockerfile: deploy/dev-stack/Dockerfile.backend
    image: easyinterview-backend-dev:local
    container_name: easyinterview-migrate-dev
    command:
      - /usr/local/bin/easyinterview-migrate
      - --migrations-dir
      - /app/migrations
      - --backfill-manifest
      - /app/migrations/backfill/manifest.yaml
      - up
    environment: *backend-environment
    depends_on:
      postgres-dev:
        condition: service_healthy
    networks:
      - easyinterview-dev
    labels:
      easyinterview.dev-stack.role: init
      easyinterview.dev-stack.service: migrate
    restart: "no"

  backend-dev:
    profiles: ["full-container"]
    build:
      context: ../..
      dockerfile: deploy/dev-stack/Dockerfile.backend
    image: easyinterview-backend-dev:local
    container_name: easyinterview-backend-dev
    command: ["/usr/local/bin/easyinterview-api", "-config-dir", "/app/config"]
    environment: *backend-environment
    extra_hosts:
      - "minio.localhost:host-gateway"
    ports:
      - "127.0.0.1:${FULL_CONTAINER_API_HOST_PORT:-10801}:8080"
    depends_on:
      migrate-dev:
        condition: service_completed_successfully
      redis-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit-dev:
        condition: service_healthy
    networks:
      - easyinterview-dev
    labels:
      easyinterview.dev-stack.role: app
      easyinterview.dev-stack.service: backend
      easyinterview.dev-stack.healthz: /api/v1/runtime-config
      easyinterview.dev-stack.host-port: "${FULL_CONTAINER_API_HOST_PORT:-10801}"
      easyinterview.dev-stack.aiclient: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/api/v1/runtime-config || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  frontend-dev:
    profiles: ["full-container"]
    build:
      context: ../..
      dockerfile: deploy/dev-stack/Dockerfile.frontend
      args:
        VITE_EI_API_MODE: real
        VITE_EI_API_BASE_URL: /api/v1
    image: easyinterview-frontend-dev:local
    container_name: easyinterview-frontend-dev
    ports:
      - "127.0.0.1:${FULL_CONTAINER_FRONTEND_HOST_PORT:-10800}:8080"
    depends_on:
      backend-dev:
        condition: service_healthy
    networks:
      - easyinterview-dev
    labels:
      easyinterview.dev-stack.role: app
      easyinterview.dev-stack.service: frontend
      easyinterview.dev-stack.healthz: /
      easyinterview.dev-stack.host-port: "${FULL_CONTAINER_FRONTEND_HOST_PORT:-10800}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

volumes:
  easyinterview-pg-data:
    name: easyinterview-pg-data
  easyinterview-redis-data:
    name: easyinterview-redis-data
  easyinterview-minio-data:
    name: easyinterview-minio-data

networks:
  easyinterview-dev:
    name: easyinterview-dev
    driver: bridge
