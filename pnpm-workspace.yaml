# pnpm workspace topology — owned by docs/spec/shared-conventions-codified (D-3).
# Additional TS packages are added by their owning subspec; the path list is the
# only declarative gate on which directories pnpm treats as workspace packages.
packages:
  - frontend
allowBuilds:
  '@playwright/browser-chromium': true
  '@swc/core': true
  better-sqlite3: true
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
