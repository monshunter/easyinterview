      - label
      - query
      - createdAt
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          description: Candidate-supplied label; never logged or surfaced in URLs.
        query:
          type: string
        filters:
          oneOf:
          - $ref: '#/components/schemas/SearchJobsFilters'
          - type: 'null'
        newJobsCount:
