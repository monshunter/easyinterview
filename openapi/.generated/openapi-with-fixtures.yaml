        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/TargetJob'
    CreatePracticePlanRequest:
      type: object
      required:
      - goal
      additionalProperties: false
      properties:
        targetJobId:
          type: string
          format: uuid
        goal:
          $ref: '#/components/schemas/PracticeGoal'
        interviewerPersona:
          $ref: '#/components/schemas/InterviewerRole'
        difficulty:
          type: string
          enum:
          - easy
          - standard
          - stretch
        language:
          type: string
        timeBudgetMinutes:
          type: integer
          format: int32
          minimum: 1
        resumeId:
          type: string
          format: uuid
        roundId:
          type: string
          pattern: ^round-[1-9][0-9]{0,9}-(hr|technical|manager|cross_functional|culture|final|other)$
          description: Optional client round intention. The server validates it against the TargetJob progress projection
            and derives roundSequence.
        sourceReportId:
          type: string
          format: uuid
          description: Required only for retry_current_round and next_round; forbidden for baseline.
      oneOf:
      - title: baseline
        required:
        - targetJobId
        - goal
        - interviewerPersona
        - difficulty
        - language
        - timeBudgetMinutes
        - resumeId
        additionalProperties: false
        properties:
          targetJobId:
            type: string
            format: uuid
          goal:
            const: baseline
          interviewerPersona:
            $ref: '#/components/schemas/InterviewerRole'
          difficulty:
            type: string
            enum:
            - easy
            - standard
            - stretch
          language:
            type: string
          timeBudgetMinutes:
            type: integer
            format: int32
            minimum: 1
          resumeId:
            type: string
            format: uuid
          roundId:
            type: string
            pattern: ^round-[1-9][0-9]{0,9}-(hr|technical|manager|cross_functional|culture|final|other)$
        not:
          required:
          - sourceReportId
      - title: report-derived
        required:
        - goal
        - sourceReportId
        additionalProperties: false
        properties:
          goal:
            type: string
            enum:
            - retry_current_round
            - next_round
          sourceReportId:
            type: string
            format: uuid
    PracticePlan:
      type: object
      required:
      - id
      - targetJobId
      - goal
      - interviewerPersona
      - difficulty
      - language
      - timeBudgetMinutes
      - resumeId
      - status
      - createdAt
      dependentRequired:
        roundId:
        - roundSequence
        roundSequence:
        - roundId
      properties:
        id:
          type: string
          format: uuid
        targetJobId:
          type: string
          format: uuid
        goal:
          $ref: '#/components/schemas/PracticeGoal'
        interviewerPersona:
          $ref: '#/components/schemas/InterviewerRole'
        difficulty:
          type: string
          enum:
          - easy
          - standard
          - stretch
        language:
          type: string
        timeBudgetMinutes:
          type: integer
          format: int32
          minimum: 1
        resumeId:
          type: string
          format: uuid
        roundId:
          description: Stable logical round key. New plans return roundId and roundSequence together; legacy plans may omit
            both or return null.
          oneOf:
          - type: string
            pattern: ^round-[1-9][0-9]{0,9}-(hr|technical|manager|cross_functional|culture|final|other)$
          - type: 'null'
        roundSequence:
          description: One-based structured round sequence. New plans return roundId and roundSequence together; legacy plans
            may omit both or return null.
          oneOf:
          - type: integer
            format: int32
            minimum: 1
            maximum: 2147483647
          - type: 'null'
        sourceReportId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum:
          - draft
          - ready
          - archived
        createdAt:
          type: string
          format: date-time
    StartPracticeSessionRequest:
