components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: ei_session
      description: 'First-party session cookie minted by `GET /api/v1/auth/email/verify`.

        ADR-Q1 locks the cookie attributes (HttpOnly, SameSite=Lax, Secure, ~30d

        sliding renewal). Cookie value is opaque; the server-side `sessions`

        table is the source of truth. `Authorization: Bearer` is **not** an

        accepted P0 scheme — adding it requires a revision of ADR-Q1 and this

        spec.

        '
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: 'Idempotency key per `00-shared-conventions §3.4` (24h TTL). Required by

        side-effect endpoints listed in spec D-6, except `POST /auth/email/start`

        (rate-limited per ADR-Q1) and `POST /practice/sessions/{sessionId}/events`

        (uses `clientEventId` instead).

        '
      schema:
        type: string
        format: uuid
    XRequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Client-supplied correlation id; the server echoes it back via the X-Request-ID response header and `error.requestId`.
      schema:
        type: string
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C Trace Context header.
      schema:
        type: string
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: 'UI-locale hint per `00-shared-conventions §3.5`. Affects display defaults only;

        does **not** override persisted business fields such as `targetLanguage`.

        '
      schema:
        type: string
    XClientVersion:
      name: X-Client-Version
      in: header
      required: false
      description: Client build version reported by the frontend shell.
      schema:
        type: string
  headers:
    XRequestID:
      description: Server-confirmed correlation id; matches `error.requestId` on error responses.
      schema:
        type: string
  responses:
    ApiErrorResponse:
      description: Error envelope per `ApiError` schema.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
  schemas:
    ApiErrorCode:
      type: string
      description: 'Documented error codes (`00-shared-conventions §3.2`). Synced from

        `shared/conventions.yaml#errors[].code`; B1 owns the literal set.

        `PRIVACY_EXPORT_NOT_AVAILABLE` is the P0 example required by spec D-12

        and is included here so the OpenAPI contract is self-contained for the

        `POST /api/v1/privacy/exports` 501 response.

        '
      enum:
      - AUTH_UNAUTHORIZED
      - TARGET_IMPORT_FAILED
      - PRACTICE_SESSION_CONFLICT
      - REPORT_NOT_READY
      - VALIDATION_FAILED
      - RATE_LIMITED
      - AI_PROVIDER_TIMEOUT
      - AI_OUTPUT_INVALID
      - AI_FALLBACK_EXHAUSTED
      - PRIVACY_EXPORT_NOT_AVAILABLE
    ApiError:
      type: object
      required:
      - code
      - message
      - requestId
      - retryable
      description: 'Canonical error object per B1 `structures.ApiError`. B2 wraps it in

        `ApiErrorResponse` for the wire body `{error: ...}`.

        '
      properties:
        code:
          $ref: '#/components/schemas/ApiErrorCode'
        message:
          type: string
          description: Human-readable summary; safe to surface to operators (no secrets, per A4 redaction rules).
        requestId:
          type: string
          description: Request correlation id; equals the X-Request-ID response header for the same request.
        retryable:
          type: boolean
          description: Hint to the client whether retry is safe (per `00-shared-conventions §3.2`).
        details:
          type: object
          description: Optional structured diagnostic. Must not contain provider, prompt, or secret material per A4 redaction
            rules.
          additionalProperties: true
    ApiErrorResponse:
      type: object
      required:
      - error
      description: Wire error response envelope per `00-shared-conventions §3.2`.
      properties:
        error:
          $ref: '#/components/schemas/ApiError'
    PageInfo:
      type: object
      required:
      - pageSize
      - hasMore
      description: Cursor pagination envelope per spec D-5. Mirrors B1 `structures.PageInfo`.
      properties:
        nextCursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; `null` on the last page.
        pageSize:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
        hasMore:
          type: boolean
    JobStatus:
      type: string
      description: Synced from `shared/conventions.yaml#jobStatuses` (00-shared-conventions §4.1).
      enum:
      - queued
      - running
      - succeeded
      - failed
      - cancelled
      - dead
    TargetJobStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[TargetJobStatus]` (00-shared-conventions §5.1).
      enum:
