          - type: integer
            format: int32
            minimum: 0
          - type: 'null'
        lastRunAt:
          oneOf:
          - type: string
            format: date-time
          - type: 'null'
        createdAt:
          type: string
          format: date-time
    SavedSearchesResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SavedSearch'
    CreateSavedSearchRequest:
      type: object
      required:
      - label
      - query
      properties:
        label:
          type: string
        query:
          type: string
        filters:
          oneOf:
          - $ref: '#/components/schemas/SearchJobsFilters'
          - type: 'null'
    MarketSignalTone:
      type: string
      description: Tone token driving the market-signal card colour.
      enum:
      - ok
      - warn
      - muted
    MarketSignal:
      type: object
      required:
