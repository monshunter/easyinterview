      properties:
        contentBase64:
          type: string
          format: byte
          description: Base64 encoded short audio payload for immediate STT processing.
        contentType:
          type: string
          enum:
          - audio/webm
          - audio/wav
          - audio/mpeg
        durationMs:
          type: integer
          format: int32
          minimum: 1
          maximum: 60000
        byteLength:
          type: integer
          format: int32
          minimum: 1
          description: Optional decoded byte length for request sanity checks.
