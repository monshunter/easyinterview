    CreatePracticeVoiceTurnRequest:
      type: object
      required:
      - clientVoiceTurnId
      - audio
      - language
      description: 'Client-submitted audio turn for the cascaded STT -> chat -> TTS practice

        voice MVP. Audio is a small request payload for immediate processing,

        not a persisted file object.

        '
      properties:
        clientVoiceTurnId:
          type: string
          format: uuid
          description: Client-generated voice turn id used with Idempotency-Key replay.
        audio:
          $ref: '#/components/schemas/PracticeVoiceAudioInput'
        language:
          type: string
          description: BCP 47 language hint for STT and TTS profiles.
    PracticeVoiceAudioInput:
      type: object
      required:
      - contentBase64
      - contentType
      - durationMs
      properties:
        contentBase64:
          type: string
          format: byte
          description: Base64 encoded short audio payload for immediate STT processing.
        contentType:
          type: string
          enum:
          - audio/webm
          - audio/wav
          - audio/mpeg
        durationMs:
          type: integer
          format: int32
          minimum: 1
          maximum: 60000
        byteLength:
          type: integer
          format: int32
          minimum: 1
          description: Optional decoded byte length for request sanity checks.
    PracticeVoiceTurnResult:
      type: object
      required:
      - voiceTurnId
      - userTranscriptFinal
      - assistantTextDraft
      - ttsChunks
      - providerMetaSummary
      - session
      - ttsError
      properties:
        voiceTurnId:
          type: string
          format: uuid
        userTranscriptFinal:
          type: string
        assistantTextDraft:
          type: string
        ttsChunks:
          type: array
          items:
            $ref: '#/components/schemas/PracticeVoiceTTSChunk'
        providerMetaSummary:
          $ref: '#/components/schemas/PracticeVoiceProviderMetaSummary'
        session:
          $ref: '#/components/schemas/PracticeSession'
        ttsError:
          oneOf:
          - $ref: '#/components/schemas/PracticeVoiceTTSError'
          - type: 'null'
    PracticeVoiceTTSChunk:
      type: object
      required:
      - chunkId
      - sequence
      - contentType
      - durationMs
      - byteLength
      - textHash
      - audioRef
      description: 'TTS playback metadata. HTTP responses must return a browser-playable

        `data:audio/...;base64,...` value or a checked-in resolver URL. Persisted

        session event summaries must rewrite it to an opaque `voice-turn://...`

        reference and must not store audio bytes or provider secrets.

        '
      properties:
        chunkId:
          type: string
        sequence:
          type: integer
          format: int32
          minimum: 0
        contentType:
          type: string
          enum:
          - audio/mpeg
          - audio/wav
          - audio/ogg
        durationMs:
          type: integer
          format: int32
          minimum: 0
        byteLength:
          type: integer
          format: int32
          minimum: 0
        textHash:
          type: string
          description: Hash of synthesized text, never the text itself.
        audioRef:
          type: string
          description: Browser-playable data URL or resolver URL for the frontend player.
    PracticeVoiceProviderMetaSummary:
      type: object
      required:
      - sttProfile
      - chatProfile
      - ttsProfile
      - sttProvider
      - chatProvider
      - ttsProvider
      description: Provider-neutral profile summary for UI/debug display; no secrets or raw prompts.
      properties:
        sttProfile:
          type: string
        chatProfile:
          type: string
        ttsProfile:
          type: string
        sttProvider:
          type: string
        chatProvider:
          type: string
        ttsProvider:
          type: string
        sttLatencyMs:
          type: integer
          format: int32
          minimum: 0
        chatLatencyMs:
          type: integer
          format: int32
          minimum: 0
        ttsLatencyMs:
          type: integer
          format: int32
          minimum: 0
    PracticeVoiceTTSError:
