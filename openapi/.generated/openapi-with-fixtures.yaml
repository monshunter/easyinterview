          type: string
        chatProvider:
          type: string
        ttsProvider:
          type: string
        sttLatencyMs:
          type: integer
          format: int32
          minimum: 0
        chatLatencyMs:
          type: integer
          format: int32
          minimum: 0
        ttsLatencyMs:
          type: integer
          format: int32
          minimum: 0
