      - createdAt
      - updatedAt
      description: 'Real-interview debrief. P0 keeps the real-interview reconstruction and

        review surface focused on questions, risks and next practice signals.

        Full follow-up suggestions and thank-you drafts are P1 optional/hidden

        fields and must not be required for P0 clients. Spec §4.6: when

        `status == completed`, must carry `GenerationProvenance`.

        '
      properties:
        id:
          type: string
          format: uuid
        targetJobId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/DebriefStatus'
        roundType:
          $ref: '#/components/schemas/DebriefRoundType'
        interviewerRole:
          oneOf:
          - $ref: '#/components/schemas/InterviewerRole'
          - type: 'null'
        questions:
          type: array
          items:
            $ref: '#/components/schemas/DebriefQuestion'
        riskItems:
          type: array
          items:
            $ref: '#/components/schemas/DebriefRiskItem'
        nextRoundChecklist:
          type: array
          description: P1 optional/hidden full follow-up suggestions; not required for P0.
          items:
            $ref: '#/components/schemas/DebriefNextRoundChecklistItem'
        thankYouDraft:
          description: P1 optional/hidden thank-you draft; not required for P0.
          oneOf:
          - type: string
          - type: 'null'
        provenance:
          oneOf:
          - $ref: '#/components/schemas/GenerationProvenance'
          - type: 'null'
          description: Required once `status == completed` per spec §4.6.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DebriefWithJob:
      type: object
      required:
      - debriefId
      - job
      properties:
        debriefId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'
    SuggestedDebriefQuestion:
      type: object
      required:
      - questionText
      - whyLikelyAsked
      - source
      properties:
        stage:
          oneOf:
          - type: string
          - type: 'null'
        questionText:
          type: string
        whyLikelyAsked:
          type: string
        source:
          $ref: '#/components/schemas/DebriefQuestionSource'
    SuggestDebriefQuestionsRequest:
      type: object
      required:
      - targetJobId
      - language
      properties:
        targetJobId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        resumeVersionId:
          type: string
          format: uuid
        language:
          type: string
        count:
          type: integer
          format: int32
          minimum: 1
          maximum: 10
          default: 6
    SuggestDebriefQuestionsResponse:
      type: object
      required:
      - suggestions
      properties:
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/SuggestedDebriefQuestion'
    Job:
      type: object
      required:
      - id
      - jobType
      - status
      - resourceType
      - resourceId
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          format: uuid
        jobType:
          $ref: '#/components/schemas/JobType'
        status:
          $ref: '#/components/schemas/JobStatus'
        resourceType:
          $ref: '#/components/schemas/ResourceType'
        resourceId:
          type: string
          format: uuid
        errorCode:
          oneOf:
          - $ref: '#/components/schemas/ApiErrorCode'
          - type: 'null'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PrivacyRequest:
      type: object
      required:
      - id
      - type
      - status
      - requestedAt
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/PrivacyRequestType'
        status:
          $ref: '#/components/schemas/PrivacyRequestStatus'
        requestedAt:
          type: string
          format: date-time
        completedAt:
          oneOf:
          - type: string
            format: date-time
          - type: 'null'
        artifactUrl:
          oneOf:
          - type: string
            format: uri
          - type: 'null'
          description: Object-storage download URL; null until status == completed.
    PrivacyRequestWithJob:
      type: object
      required:
      - privacyRequestId
      - job
      properties:
        privacyRequestId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'
    JobMatchProfileSourceCounts:
      type: object
      required:
      - resumes
      - jds
      - mocks
      - debriefs
      description: 'Aggregated counts of inputs that fed the JD-match profile snapshot.

        Driven by the backend JD-match runtime.

        '
      properties:
        resumes:
          type: integer
          format: int32
          minimum: 0
        jds:
          type: integer
          format: int32
          minimum: 0
        mocks:
          type: integer
          format: int32
          minimum: 0
        debriefs:
          type: integer
          format: int32
          minimum: 0
    JobMatchProfile:
      type: object
      required:
      - displayName
      - skills
      - sources
      description: 'Candidate profile snapshot used by the JD-match agent. Returned by

        `getJobMatchProfile`. Aggregated server-side; the frontend never derives

        the snapshot from individual resumes.

        '
      properties:
        displayName:
          type: string
          description: Candidate display name; never the raw email.
        avatarUrl:
          oneOf:
          - type: string
            format: uri
          - type: 'null'
        headline:
          oneOf:
          - type: string
          - type: 'null'
        yearsOfExperience:
          oneOf:
          - type: integer
            format: int32
            minimum: 0
          - type: 'null'
        locationText:
          oneOf:
          - type: string
          - type: 'null'
        compensationText:
          oneOf:
          - type: string
          - type: 'null'
        skills:
          type: array
          items:
            type: string
        sources:
          $ref: '#/components/schemas/JobMatchProfileSourceCounts'
    JobMatchAgentStatus:
      type: string
      description: 'Agent scan status. `idle` = no scan running; `scanning` = scan in

        progress; `error` = last scan failed and operator action is needed.

        '
      enum:
      - idle
      - scanning
      - error
    AgentScanStatus:
      type: object
      required:
      - status
      description: 'Background JD-match agent status returned by `getAgentScanStatus`.

        Frontend reads only on JD-match entry and tab returns; no SSE/WebSocket

        per plan D-10.

        '
      properties:
        status:
          $ref: '#/components/schemas/JobMatchAgentStatus'
        lastScanAt:
          oneOf:
          - type: string
            format: date-time
          - type: 'null'
        nextScanAt:
          oneOf:
          - type: string
            format: date-time
          - type: 'null'
        message:
          oneOf:
          - type: string
          - type: 'null'
          description: Optional human-readable hint (only used when status == error).
    JobMatchFitFooter:
      type: object
      required:
      - must
      - total
      - plus
      - totalPlus
      description: 'Mirrors `ui-design/src/screen-jd-match.jsx::JobMatchCard` fit footer:

        "must X/Y · plus X/Y". Backend-only computed.

        '
      properties:
        must:
          type: integer
          format: int32
          minimum: 0
        total:
          type: integer
          format: int32
          minimum: 0
        plus:
          type: integer
          format: int32
          minimum: 0
        totalPlus:
          type: integer
          format: int32
          minimum: 0
    JobMatchRecommendation:
      type: object
      required:
      - id
      - title
      - company
      - location
      - score
      - fit
      - reasons
      - risks
      - highlights
      - posted
      - seen
      - saved
      - provenance
      description: 'AI-generated JD-match recommendation per spec §4.6. `score`, `reasons`,

        `risks`, `highlights`, `interviewHypotheses`, and `networkNote` are all

        backend-derived; the frontend never computes them. `provenance` is

        required and follows the GenerationProvenance contract.

        '
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        company:
          type: string
        companyTag:
          oneOf:
          - type: string
          - type: 'null'
        level:
          oneOf:
          - type: string
          - type: 'null'
        location:
          type: string
        comp:
          oneOf:
          - type: string
          - type: 'null'
        posted:
          type: string
          description: Backend-rendered relative time (e.g., "2 days ago" / "2 天前").
        score:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        fit:
          $ref: '#/components/schemas/JobMatchFitFooter'
        reasons:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        seen:
          type: boolean
        saved:
          type: boolean
        sourceUrl:
          oneOf:
          - type: string
            format: uri
          - type: 'null'
        sourceLabel:
          oneOf:
          - type: string
          - type: 'null'
          description: Display label for the source (e.g., "linkedin.com/jobs/123").
        networkNote:
          oneOf:
          - type: string
          - type: 'null'
        similarInterviewers:
          oneOf:
          - type: integer
            format: int32
            minimum: 0
          - type: 'null'
        interviewHypotheses:
          type: array
          items:
            type: string
        provenance:
          $ref: '#/components/schemas/GenerationProvenance'
    PaginatedJobMatchRecommendation:
      allOf:
      - $ref: '#/components/schemas/PaginatedEnvelope'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/JobMatchRecommendation'
    AddToWatchlistRequest:
      type: object
      required:
      - jobMatchId
      properties:
        jobMatchId:
          type: string
          format: uuid
    WatchlistItemTone:
      type: string
      description: Visual tone driving watchlist row colour per ui-design tone tokens.
      enum:
      - ok
      - warn
      - muted
    WatchlistItem:
      type: object
      required:
      - id
      - linkedJobMatchId
      - title
      - company
      - tone
      - addedAt
      description: 'A single watchlist row. `linkedJobMatchId` powers the chevron handoff to

        the Recommended tab; the frontend must read it from the schema rather

        than string-matching ids.

        '
      properties:
        id:
          type: string
          format: uuid
        linkedJobMatchId:
          type: string
          format: uuid
        label:
          oneOf:
          - type: string
          - type: 'null'
          description: Optional candidate-supplied label; never logged.
        title:
          type: string
        company:
          type: string
        tone:
          $ref: '#/components/schemas/WatchlistItemTone'
        addedAt:
          type: string
          format: date-time
        change:
          oneOf:
          - type: string
          - type: 'null'
          description: Backend-rendered change signal (e.g., "JD updated · check diff").
    WatchlistResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistItem'
    MarkNotRelevantReason:
      type: string
      description: 'Reason enum for `markJobNotRelevant`. ui-design does not surface a

        reason picker, so the frontend transmits `not_relevant` by default and

        backend mapping treats unknown values as `other` per spec §4.4

        additive-only.

        '
      enum:
      - not_relevant
      - wrong_level
      - wrong_location
      - wrong_compensation
      - other
    MarkNotRelevantRequest:
      type: object
      required:
      - reason
      properties:
        reason:
          $ref: '#/components/schemas/MarkNotRelevantReason'
        freeNote:
          oneOf:
          - type: string
          - type: 'null'
          description: Optional candidate note; never logged or surfaced in URLs.
    MarkNotRelevantResult:
      type: object
      required:
      - jobMatchId
      - dismissedAt
      properties:
        jobMatchId:
          type: string
          format: uuid
        dismissedAt:
          type: string
          format: date-time
    SearchJobsFilters:
      type: object
      description: 'Optional structured search filters. Backend may ignore unknown keys per

        additive-only rules; frontend currently exposes only client-side chip

        filters for the result list (see plan §3.7).

        '
      properties:
        location:
          oneOf:
          - type: string
          - type: 'null'
        remote:
          oneOf:
          - type: boolean
          - type: 'null'
        minScore:
          oneOf:
          - type: integer
            format: int32
            minimum: 0
            maximum: 100
          - type: 'null'
    SearchJobsRequest:
      type: object
      required:
      - query
      properties:
        query:
          type: string
          description: Natural-language candidate query; never logged or persisted in URL/localStorage.
        filters:
          oneOf:
          - $ref: '#/components/schemas/SearchJobsFilters'
          - type: 'null'
        profileSnapshotId:
          oneOf:
          - type: string
            format: uuid
          - type: 'null'
          description: Optional snapshot id; the actual profile is fetched server-side.
    SearchJobsResponse:
      type: object
      required:
      - searchRunId
      - items
      properties:
        searchRunId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobMatchRecommendation'
    SavedSearch:
      type: object
