        k:
          type: string
        v:
          type: string
        d:
          oneOf:
          - type: string
          - type: 'null'
        tone:
          $ref: '#/components/schemas/MarketSignalTone'
    MarketSignalsResponse:
      type: object
      required:
      - signals
      properties:
        signals:
