    FeedbackReport:
      type: object
      required:
      - id
      - sessionId
      - targetJobId
      - status
      - errorCode
      - summary
      - context
      - preparednessLevel
      - highlights
      - issues
      - nextActions
      - dimensionAssessments
      - retryFocusDimensionCodes
      - provenance
      - createdAt
      - updatedAt
      additionalProperties: false
      allOf:
      - if:
          required:
          - status
          properties:
            status:
              const: ready
        then:
          properties:
            summary:
              type: string
              minLength: 1
              maxLength: 360
            preparednessLevel:
              $ref: '#/components/schemas/ReadinessTier'
            dimensionAssessments:
              type: array
              minItems: 1
            nextActions:
              type: array
              minItems: 1
            provenance:
              $ref: '#/components/schemas/GenerationProvenance'
        else:
          properties:
            summary:
              type: 'null'
            preparednessLevel:
              type: 'null'
            dimensionAssessments:
              type: array
              maxItems: 0
            highlights:
              type: array
              maxItems: 0
            issues:
              type: array
              maxItems: 0
            nextActions:
              type: array
              maxItems: 0
            retryFocusDimensionCodes:
              type: array
              maxItems: 0
            provenance:
              type: 'null'
      - if:
          required:
          - status
          properties:
            status:
              const: failed
        then:
          properties:
            errorCode:
              $ref: '#/components/schemas/ApiErrorCode'
        else:
          properties:
            errorCode:
              type: 'null'
      description: 'Evidence-based feedback report. AI-generated; `provenance` is required

        once `status == ready` per spec §4.6. Queued or generating reports

        still return 200 with status metadata (per `B2 openapi-v1-contract §11.1`).

        '
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        targetJobId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ReportStatus'
        errorCode:
          oneOf:
          - $ref: '#/components/schemas/ApiErrorCode'
          - type: 'null'
          description: 'Populated only when `status == failed`. Carries the B1 error code

            (typically the `AI_*` family) so clients can render a failure state.

            '
        summary:
          oneOf:
          - type: string
            minLength: 1
            maxLength: 360
          - type: 'null'
          description: Final report summary; non-empty only when status is ready.
        context:
          $ref: '#/components/schemas/ReportContextSnapshot'
        preparednessLevel:
          oneOf:
          - $ref: '#/components/schemas/ReadinessTier'
          - type: 'null'
        highlights:
          type: array
          maxItems: 4
          items:
            $ref: '#/components/schemas/ReportHighlight'
        issues:
          type: array
          maxItems: 4
          items:
            $ref: '#/components/schemas/ReportIssue'
        nextActions:
          type: array
          maxItems: 2
          items:
            $ref: '#/components/schemas/ReportNextAction'
        dimensionAssessments:
          type: array
          maxItems: 6
          items:
            $ref: '#/components/schemas/DimensionAssessment'
        retryFocusDimensionCodes:
          type: array
          maxItems: 6
          uniqueItems: true
          items:
            type: string
        provenance:
          oneOf:
          - $ref: '#/components/schemas/GenerationProvenance'
          - type: 'null'
          description: Required once `status == ready` per spec §4.6.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
