    ResumeTailorRunWithJob:
      type: object
      required:
      - tailorRunId
      - job
      properties:
        tailorRunId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'
    Job:
      type: object
      required:
      - id
      - jobType
      - status
      - resourceType
      - resourceId
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          format: uuid
        jobType:
          $ref: '#/components/schemas/JobType'
        status:
          $ref: '#/components/schemas/JobStatus'
        resourceType:
          $ref: '#/components/schemas/ResourceType'
        resourceId:
          type: string
          format: uuid
        errorCode:
          oneOf:
          - $ref: '#/components/schemas/ApiErrorCode'
          - type: 'null'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PrivacyRequest:
      type: object
      required:
      - id
      - type
      - status
      - requestedAt
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/PrivacyRequestType'
        status:
          $ref: '#/components/schemas/PrivacyRequestStatus'
        requestedAt:
          type: string
          format: date-time
        completedAt:
          oneOf:
          - type: string
            format: date-time
          - type: 'null'
