      description: 'First-party session cookie minted by `GET /api/v1/auth/email/verify`.

        ADR-Q1 locks the cookie attributes (HttpOnly, SameSite=Lax, Secure, ~30d

        sliding renewal). Cookie value is opaque; the server-side `sessions`

        table is the source of truth. `Authorization: Bearer` is **not** an

        accepted P0 scheme — adding it requires a revision of ADR-Q1 and this

        spec.

        '
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: 'Idempotency key per `B1 shared-conventions-codified §3.4` (24h TTL). Required by

        side-effect endpoints listed in spec D-6, except `POST /auth/email/start`

        (rate-limited per ADR-Q1) and `POST /practice/sessions/{sessionId}/events`

        (uses `clientEventId` instead).

        '
      schema:
        type: string
        format: uuid
    XRequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Client-supplied correlation id; the server echoes it back via the X-Request-ID response header and `error.requestId`.
      schema:
        type: string
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C Trace Context header.
      schema:
        type: string
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: 'UI-locale hint per `B1 shared-conventions-codified §3.5`. Affects display defaults only;

        does **not** override persisted business fields such as `targetLanguage`.

        '
      schema:
        type: string
    XClientVersion:
      name: X-Client-Version
      in: header
      required: false
      description: Client build version reported by the frontend shell.
      schema:
        type: string
  headers:
    XRequestID:
      description: Server-confirmed correlation id; matches `error.requestId` on error responses.
      schema:
        type: string
  responses:
    ApiErrorResponse:
      description: Error envelope per `ApiError` schema.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
  schemas:
    ApiErrorCode:
      type: string
      description: 'Documented error codes synced from

        `shared/conventions.yaml#errors[].code`; B1 owns the literal set.

        P0 export exceptions such as `PRIVACY_EXPORT_NOT_AVAILABLE` and

        `RESUME_EXPORT_NOT_AVAILABLE` are included here so the OpenAPI

        contract is self-contained for 501 export responses.

        '
      enum:
      - AUTH_UNAUTHORIZED
      - TARGET_IMPORT_FAILED
      - TARGET_JOB_NOT_FOUND
      - TARGET_IMPORT_SOURCE_INVALID
      - TARGET_IMPORT_SOURCE_UNAVAILABLE
      - TARGET_INVALID_STATE_TRANSITION
      - PRACTICE_SESSION_CONFLICT
      - PRACTICE_PLAN_NOT_FOUND
      - PRACTICE_SESSION_NOT_FOUND
      - REPORT_NOT_FOUND
      - REPORT_NOT_READY
      - DEBRIEF_NOT_FOUND
      - RESUME_EXPORT_NOT_AVAILABLE
      - RESUME_STRUCTURED_MASTER_ALREADY_EXISTS
      - VALIDATION_FAILED
      - RESOURCE_NOT_FOUND
      - IDEMPOTENCY_KEY_MISMATCH
      - RATE_LIMITED
      - AI_PROVIDER_TIMEOUT
      - AI_OUTPUT_INVALID
      - AI_FALLBACK_EXHAUSTED
      - AI_UNSUPPORTED_CAPABILITY
      - AI_PROVIDER_CONFIG_INVALID
      - AI_PROVIDER_SECRET_MISSING
      - PRIVACY_EXPORT_NOT_AVAILABLE
    ApiError:
      type: object
      required:
      - code
      - message
      - requestId
      - retryable
      description: 'Canonical error object per B1 `structures.ApiError`. B2 wraps it in

        `ApiErrorResponse` for the wire body `{error: ...}`.

        '
      properties:
        code:
          $ref: '#/components/schemas/ApiErrorCode'
        message:
          type: string
          description: Human-readable summary; safe to surface to operators (no secrets, per A4 redaction rules).
        requestId:
          type: string
          description: Request correlation id; equals the X-Request-ID response header for the same request.
        retryable:
          type: boolean
          description: Hint to the client whether retry is safe, as defined by B1 shared-conventions-codified.
        details:
          type: object
          description: Optional structured diagnostic. Must not contain provider, prompt, or secret material per A4 redaction
            rules.
          additionalProperties: true
    ApiErrorResponse:
      type: object
      required:
      - error
      description: Wire error response envelope defined by B1 shared-conventions-codified.
      properties:
        error:
          $ref: '#/components/schemas/ApiError'
    PageInfo:
      type: object
      required:
      - pageSize
      - hasMore
      description: Cursor pagination envelope per spec D-5. Mirrors B1 `structures.PageInfo`.
      properties:
        nextCursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; `null` on the last page.
        pageSize:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
        hasMore:
          type: boolean
    JobStatus:
      type: string
      description: Synced from `shared/conventions.yaml#jobStatuses`.
