      name: ei_session
      description: 'First-party session cookie minted by `GET /api/v1/auth/email/verify`.

        ADR-Q1 locks the cookie attributes (HttpOnly, SameSite=Lax, Secure, ~30d

        sliding renewal). Cookie value is opaque; the server-side `sessions`

        table is the source of truth. `Authorization: Bearer` is **not** an

        accepted P0 scheme — adding it requires a revision of ADR-Q1 and this

        spec.

        '
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: 'Idempotency key per `B1 shared-conventions-codified §3.4` (24h TTL). Required by

        side-effect endpoints listed in spec D-6, except `POST /auth/email/start`

        (rate-limited per ADR-Q1) and `POST /practice/sessions/{sessionId}/messages`

        (uses `clientMessageId` instead).

        '
      schema:
        type: string
        format: uuid
    XRequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Client-supplied correlation id; the server echoes it back via the X-Request-ID response header and `error.requestId`.
      schema:
        type: string
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C Trace Context header.
      schema:
        type: string
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: 'UI-locale hint per `B1 shared-conventions-codified §3.5`. Affects display defaults only;

        does **not** override persisted business fields such as `targetLanguage`.

        '
      schema:
        type: string
    XClientVersion:
      name: X-Client-Version
      in: header
      required: false
      description: Client build version reported by the frontend shell.
      schema:
        type: string
  headers:
    XRequestID:
      description: Server-confirmed correlation id; matches `error.requestId` on error responses.
      schema:
        type: string
    XIdempotencyReplay:
      description: Set to `true` when the response was replayed from a completed idempotency record.
      schema:
        type: string
        enum:
        - 'true'
  responses:
    ApiErrorResponse:
      description: Error envelope per `ApiError` schema.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
  schemas:
    ApiErrorCode:
      type: string
      description: 'Documented error codes synced from

        `shared/conventions.yaml#errors[].code`; B1 owns the literal set.

        P0 export exceptions such as `PRIVACY_EXPORT_NOT_AVAILABLE` and

        `RESUME_EXPORT_NOT_AVAILABLE` are included here so the OpenAPI

        contract is self-contained for 501 export responses.

        '
      enum:
      - AUTH_UNAUTHORIZED
      - TARGET_IMPORT_FAILED
      - TARGET_JOB_NOT_FOUND
      - TARGET_INVALID_STATE_TRANSITION
      - PRACTICE_SESSION_CONFLICT
      - PRACTICE_PLAN_NOT_FOUND
      - PRACTICE_SESSION_NOT_FOUND
      - REPORT_NOT_FOUND
      - REPORT_NOT_READY
      - REPORT_CONTEXT_TOO_LARGE
      - REPORT_INVALID_STATE_TRANSITION
      - RESUME_EXPORT_NOT_AVAILABLE
      - VALIDATION_FAILED
      - RESOURCE_NOT_FOUND
      - IDEMPOTENCY_KEY_MISMATCH
      - RATE_LIMITED
      - AI_PROVIDER_TIMEOUT
      - AI_OUTPUT_INVALID
      - AI_FALLBACK_EXHAUSTED
      - AI_UNSUPPORTED_CAPABILITY
      - AI_PROVIDER_CONFIG_INVALID
      - AI_PROVIDER_SECRET_MISSING
      - PRIVACY_EXPORT_NOT_AVAILABLE
    ApiError:
      type: object
      required:
      - code
      - message
      - requestId
      - retryable
      description: 'Canonical error object per B1 `structures.ApiError`. B2 wraps it in

        `ApiErrorResponse` for the wire body `{error: ...}`.

        '
      properties:
        code:
          $ref: '#/components/schemas/ApiErrorCode'
        message:
          type: string
          description: Human-readable summary; safe to surface to operators (no secrets, per A4 redaction rules).
        requestId:
          type: string
          description: Request correlation id; equals the X-Request-ID response header for the same request.
        retryable:
          type: boolean
          description: Hint to the client whether retry is safe, as defined by B1 shared-conventions-codified.
        details:
          type: object
          description: Optional structured diagnostic. Must not contain provider, prompt, or secret material per A4 redaction
            rules.
          additionalProperties: true
    ApiErrorResponse:
      type: object
      required:
      - error
      description: Wire error response envelope defined by B1 shared-conventions-codified.
      properties:
        error:
          $ref: '#/components/schemas/ApiError'
    PageInfo:
      type: object
      required:
      - pageSize
      - hasMore
      description: Cursor pagination envelope per spec D-5. Mirrors B1 `structures.PageInfo`.
      properties:
        nextCursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; `null` on the last page.
        pageSize:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
        hasMore:
          type: boolean
    JobStatus:
      type: string
      description: Synced from `shared/conventions.yaml#jobStatuses`.
      enum:
      - queued
      - running
      - succeeded
      - failed
      - cancelled
      - dead
    TargetJobStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[TargetJobStatus]` sourceSection 5.1.
      enum:
      - draft
      - preparing
      - applied
      - interviewing
      - offer
      - rejected
      - archived
    TargetJobParseStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[TargetJobParseStatus]` sourceSection 5.2.
      enum:
      - queued
      - processing
      - ready
      - failed
    PracticeGoal:
      type: string
      description: Synced from `shared/conventions.yaml#enums[PracticeGoal]` sourceSection 5.4.
      enum:
      - baseline
      - retry_current_round
      - next_round
    InterviewerRole:
      type: string
      description: Synced from `shared/conventions.yaml#enums[InterviewerRole]` sourceSection 5.5.
      enum:
      - generalist
      - hr
      - hiring_manager
      - technical_manager
      - peer
    SessionStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[SessionStatus]` sourceSection 5.6.
      enum:
      - queued
      - running
      - waiting_user_input
      - completing
      - completed
      - failed
      - cancelled
    ReportStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[ReportStatus]` sourceSection 5.7.
      enum:
      - queued
      - generating
      - ready
      - failed
    ReadinessTier:
      type: string
      description: Synced from `shared/conventions.yaml#enums[ReadinessTier]` sourceSection 5.8.
      enum:
      - not_ready
      - needs_practice
      - basically_ready
      - well_prepared
    DimensionStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[DimensionStatus]` sourceSection 5.9.
      enum:
      - strong
      - meets_bar
      - needs_work
    Confidence:
      type: string
      description: Synced from `shared/conventions.yaml#enums[Confidence]` sourceSection 5.10.
      enum:
      - high
      - medium
      - low
    PrivacyRequestType:
      type: string
      description: Synced from `shared/conventions.yaml#enums[PrivacyRequestType]` sourceSection 5.13.
      enum:
      - export
      - delete
    PrivacyRequestStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[PrivacyRequestStatus]` sourceSection 5.13.
      enum:
      - queued
      - processing
      - completed
      - failed
      - cancelled
    ResourceType:
      type: string
      description: 'Resource type referenced by `Job.resourceType` and outbox events.

        Locked here per spec §3.2 待确认事项. Adding a value is additive but

        requires a B2 spec revision so consumers can update mock fixtures.

        '
      enum:
      - target_job
      - feedback_report
      - resume_asset
      - resume_tailor_run
      - privacy_request
    JobType:
      type: string
      description: 'Async job type catalogue evidenced by `B2 openapi-v1-contract` examples

        (target_import, resume_parse, report_generate, resume_tailor,

        privacy_export, privacy_delete).

        '
      enum:
      - target_import
      - resume_parse
      - report_generate
      - resume_tailor
      - privacy_export
      - privacy_delete
    GenerationProvenance:
      type: object
      description: 'AI-generation provenance per spec §4.6. Every AI-generated schema

        listed in spec §4.6 must either embed this object as `provenance` or

        be reachable from a `*WithJob.job.provenance`.


        `rubricVersion` is **required** for every generation. Non-scoring

        generations (for example AssistantAction follow-up choices) must

        explicitly emit the literal `not_applicable` rather than omitting the

        field — the Phase 1.4 inventory check enforces this contract via this

        description.

        '
      required:
      - promptVersion
      - rubricVersion
      - modelId
      - language
      - featureFlag
      - dataSourceVersion
      properties:
        promptVersion:
          type: string
          description: Prompt registry key/version (e.g., `feedback_report.v3`).
        rubricVersion:
          type: string
          description: 'Rubric registry key/version. Non-scoring generations emit the

            literal `not_applicable` (not the empty string, not omitted).

            '
        modelId:
          type: string
          description: Provider profile / model id; never includes secret material.
        language:
          type: string
          description: BCP 47 language tag used for this generation.
        featureFlag:
          type: string
          description: Feature flag / variant that influenced the generation path; emit `none` if no flag applied.
        dataSourceVersion:
          type: string
          description: Snapshot id or version of the input data set (e.g., `target_job.v17`).
    PaginatedEnvelope:
      type: object
      required:
      - items
      - pageInfo
      description: 'Base envelope for cursor-paginated list responses. Concrete

        `PaginatedFoo` schemas extend this via `allOf` and override `items`

        with a typed array, keeping the field order (`items`, `pageInfo`)

        consistent across endpoints.

        '
      properties:
        items:
          type: array
          items: {}
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
    UserContext:
      type: object
      additionalProperties: false
      required:
      - id
      - email
      - displayName
      - profileCompletionRequired
      - displayPreferences
      description: Current-user context returned by `GET /me` and `PATCH /me`.
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          description: Complete account email returned only to the authenticated user for account settings.
        displayName:
          type: string
        profileCompletionRequired:
          type: boolean
          description: True when the signed-in account still needs first-login display name and terms completion before business
            actions can resume.
        displayPreferences:
          $ref: '#/components/schemas/AccountDisplayPreferences'
    AuthEmailStartRequest:
      type: object
      required:
      - email
      description: Single-entry email-code challenge request per ADR-Q1. No `Idempotency-Key`; rate-limited per ADR-Q1.
      properties:
        email:
          type: string
          format: email
        returnTo:
          type: string
          description: Optional post-verify redirect path on the same origin.
    AccountTheme:
      type: string
      enum:
      - ocean
      - plum
    CustomAccent:
      type: object
      additionalProperties: false
      required:
      - h
      - c
      properties:
        h:
          type: number
          minimum: 0
          exclusiveMaximum: 360
        c:
          type: number
          minimum: 0
          maximum: 0.28
    AccountDisplayPreferences:
      type: object
      additionalProperties: false
      required:
      - theme
      - customAccent
      properties:
        theme:
          $ref: '#/components/schemas/AccountTheme'
        customAccent:
          oneOf:
          - $ref: '#/components/schemas/CustomAccent'
          - type: 'null'
    UpdateMeRequest:
      type: object
      additionalProperties: false
      description: At least one complete update group is required. displayName and acceptedTerms must appear together; acceptedTerms
        must be true.
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120
          description: Non-unique display name shown in the app.
        acceptedTerms:
          type: boolean
          description: Must be true to record first-login terms acceptance.
        displayPreferences:
          $ref: '#/components/schemas/AccountDisplayPreferences'
    Session:
      type: object
      required:
      - userId
      - sessionExpiresAt
      description: '`verifyAuthEmailChallenge` response body. The actual session cookie is

        delivered via the `Set-Cookie` response header per ADR-Q1; this body

        only conveys non-secret hints (user id and expiry) so the client can

        schedule renewal. The opaque cookie value never appears in the body.

        '
      properties:
        userId:
          type: string
          format: uuid
        sessionExpiresAt:
          type: string
          format: date-time
    RuntimeConfig:
      type: object
      required:
      - defaultUiLanguage
      - featureFlags
      - appVersion
      - analyticsEnabled
      - contentLimits
      description: 'Public runtime configuration returned by `GET /runtime-config`.

        Contains only the allowlisted public fields per A4 D-2; secret /

        operator-only flags are never exposed. When the request carries a

        valid session, `analyticsEnabled` must reflect `user_settings.analytics_opt_in`

        and `postHogPublicKey` is omitted on opt-out.

        '
      properties:
        defaultUiLanguage:
          type: string
        featureFlags:
          type: object
          description: Public feature flags only (`public=true` per A4 D-2). Operator-only flags must not appear here.
          additionalProperties:
            type: boolean
        appVersion:
          type: string
        analyticsEnabled:
          type: boolean
        postHogPublicKey:
          type: string
          description: Optional; omitted when `analyticsEnabled == false`.
        contentLimits:
          $ref: '#/components/schemas/ContentLimits'
    ContentLimits:
      type: object
      additionalProperties: false
      required:
      - resumeUploadBytes
      - resumePasteTextBytes
      - targetJobRawTextBytes
      - practiceMessageBytes
      - practiceSessionTextBytes
      description: Public UTF-8 byte limits used for client-side preflight; backend validation remains authoritative.
      properties:
        resumeUploadBytes:
          type: integer
          format: int64
          minimum: 1
        resumePasteTextBytes:
          type: integer
          format: int64
          minimum: 1
        targetJobRawTextBytes:
          type: integer
          format: int64
          minimum: 1
        practiceMessageBytes:
          type: integer
          format: int64
          minimum: 1
        practiceSessionTextBytes:
          type: integer
          format: int64
          minimum: 1
    UploadPresignRequest:
      type: object
      required:
      - purpose
      - fileName
      - contentType
      - byteSize
      properties:
        purpose:
          type: string
          enum:
          - resume
          - privacy_export
        fileName:
          type: string
        contentType:
          type: string
        byteSize:
          type: integer
          format: int64
          minimum: 1
    UploadPresign:
      type: object
      required:
      - fileObjectId
      - uploadUrl
      - method
      - headers
      - expiresAt
      properties:
        fileObjectId:
          type: string
          format: uuid
        uploadUrl:
          type: string
          format: uri
        method:
          type: string
          enum:
          - PUT
          - POST
        headers:
          type: object
          additionalProperties:
            type: string
        expiresAt:
          type: string
          format: date-time
    RegisterResumeRequest:
      type: object
      required:
      - title
      - language
      properties:
        fileObjectId:
          type: string
          format: uuid
          nullable: true
          description: Required only when `sourceType` is `upload`; omitted/null for paste intake.
        title:
          type: string
        language:
          type: string
        sourceType:
          type: string
          enum:
          - upload
          - paste
          description: Source discriminator. `upload` requires `fileObjectId`; `paste` requires `rawText`.
        rawText:
          type: string
          description: Required only when `sourceType` is `paste`.
    ResumeSummary:
      type: object
      additionalProperties: false
      required:
      - id
      - title
      - displayName
      - language
      - sourceType
      - parseStatus
      - summaryHeadline
      - hasReadableContent
      - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        displayName:
          type: string
        language:
          type: string
        sourceType:
          type: string
          enum:
          - upload
          - paste
        parseStatus:
          $ref: '#/components/schemas/TargetJobParseStatus'
        summaryHeadline:
          oneOf:
          - type: string
          - type: 'null'
        hasReadableContent:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    Resume:
      type: object
      required:
      - id
      - title
      - displayName
      - language
      - parseStatus
      - createdAt
      - updatedAt
      description: Flat resume asset (product-scope v2.1 D-20). Carries the read-only source snapshot plus the editable structured
        profile; AI-extracted profile fields carry GenerationProvenance.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        displayName:
          type: string
        language:
          type: string
        parseStatus:
          $ref: '#/components/schemas/TargetJobParseStatus'
        status:
          type: string
          enum:
          - active
          - archived
          description: Archive projection; `archived` resumes are soft-hidden.
        sourceType:
          type: string
          enum:
          - upload
          - paste
        fileObjectId:
          type: string
          format: uuid
          nullable: true
          description: Upload-backed resumes keep a file object; paste resumes are fileless.
        originalText:
          oneOf:
          - type: string
          - type: 'null'
        parsedTextSnapshot:
          oneOf:
          - type: string
          - type: 'null'
        parsedSummary:
          oneOf:
          - type: object
            additionalProperties: true
          - type: 'null'
          description: AI-extracted summary; reachable from a resource that carries `GenerationProvenance`.
        structuredProfile:
          type: object
          additionalProperties: true
          description: Editable structured resume content. AI-extracted fields carry GenerationProvenance via `provenance`.
          properties:
            headline:
              type: string
            summary:
              type: string
            skills:
              type: array
              items:
                type: string
            sections:
              type: array
              items:
                type: object
                additionalProperties: true
            provenance:
              $ref: '#/components/schemas/GenerationProvenance'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          oneOf:
          - type: string
            format: date-time
          - type: 'null'
    ResumeWithJob:
      type: object
      required:
      - resumeId
      - job
      properties:
        resumeId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'
    PaginatedResume:
      allOf:
      - $ref: '#/components/schemas/PaginatedEnvelope'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ResumeSummary'
    UpdateResumeRequest:
      type: object
      properties:
        displayName:
          type: string
        structuredProfile:
          type: object
          additionalProperties: true
          description: Replacement structured profile (overwrites the existing one). AI-extracted fields carry GenerationProvenance
            via `provenance`.
          properties:
            headline:
              type: string
            summary:
              type: string
            skills:
              type: array
              items:
                type: string
            sections:
              type: array
              items:
                type: object
                additionalProperties: true
            provenance:
              $ref: '#/components/schemas/GenerationProvenance'
    DuplicateResumeRequest:
      type: object
      properties:
        displayName:
          type: string
        structuredProfile:
          type: object
          additionalProperties: true
          description: Structured profile for the new resume (applies accepted rewrites). AI-extracted fields carry GenerationProvenance
            via `provenance`.
          properties:
            headline:
              type: string
            summary:
              type: string
            skills:
              type: array
              items:
                type: string
            sections:
              type: array
              items:
                type: object
                additionalProperties: true
            provenance:
              $ref: '#/components/schemas/GenerationProvenance'
    ImportTargetJobRequest:
      type: object
      additionalProperties: false
      required:
      - rawText
      - targetLanguage
      - resumeId
      properties:
        rawText:
          type: string
          minLength: 1
          pattern: \S
        targetLanguage:
          type: string
        resumeId:
          type: string
          format: uuid
          description: Resume selected for this target job at import time. The backend persists this target job-level binding
            for workspace re-entry before any practice plan exists.
    TargetJobWithJob:
      type: object
      required:
      - targetJobId
      - job
      properties:
        targetJobId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'
    TargetJobRequirement:
      type: object
      required:
      - id
      - kind
      - label
      - evidenceLevel
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum:
          - must_have
          - nice_to_have
          - hidden_signal
          - interview_focus
        label:
          type: string
        evidenceLevel:
          type: string
          enum:
          - explicit
          - implicit
          - inferred
    TargetJobInterviewRound:
      type: object
      required:
      - sequence
      - type
      - name
      - durationMinutes
      - focus
      description: AI-generated interview round inferred from JD evidence, role seniority, company or industry nature, team
        or business context, and hiring-process hints. A ready TargetJob summary carries 2 to 5 rounds.
      properties:
        sequence:
          type: integer
          format: int32
          minimum: 1
          maximum: 2147483647
          description: One-based round order inferred from the likely interview process.
        type:
          type: string
          enum:
          - hr
          - technical
          - manager
          - cross_functional
          - culture
          - final
          - other
          description: Stable round category inferred from the JD.
        name:
          type: string
          description: Candidate-facing round name in the target job language.
        durationMinutes:
          type: integer
          format: int32
          minimum: 10
          maximum: 180
          description: Estimated interview duration in minutes inferred from the JD and round category.
        focus:
          type: string
          description: Concise likely focus for this round, grounded in the JD and inferred company, industry, seniority,
            and role context.
    TargetJobSummary:
      type: object
      required:
      - provenance
      description: 'AI-generated target-job summary. Per spec §4.6, AI-generated schemas

        must carry `provenance` (or be reachable from a wrapper carrying it);

        we colocate `provenance` here so the standalone object is auditable.

        '
      properties:
        coreThemes:
          type: array
          items:
            type: string
        interviewRounds:
          type: array
          minItems: 2
          maxItems: 5
          items:
            $ref: '#/components/schemas/TargetJobInterviewRound'
        provenance:
          $ref: '#/components/schemas/GenerationProvenance'
    TargetJobFitSummary:
      type: object
      required:
      - provenance
      description: AI-generated fit summary (spec §4.6). Carries `provenance`.
      properties:
        strengths:
          type: array
          items:
            type: string
        gaps:
          type: array
          items:
            type: string
        riskSignals:
          type: array
          items:
            type: string
        provenance:
          $ref: '#/components/schemas/GenerationProvenance'
    PracticeRoundRef:
      type: object
      required:
      - roundId
      - roundSequence
      additionalProperties: false
      description: Stable logical identity for one structured TargetJob interview round. The identifier is deterministic and
        is not a UUID.
      properties:
        roundId:
          type: string
          pattern: ^round-[1-9][0-9]{0,9}-(hr|technical|manager|cross_functional|culture|final|other)$
          description: Deterministic logical key derived from the one-based sequence and TargetJob round type.
        roundSequence:
          type: integer
          format: int32
          minimum: 1
          maximum: 2147483647
          description: One-based sequence of the structured TargetJob interview round.
    PracticeProgress:
      type: object
      required:
      - status
      - completedRounds
      - currentRound
      description: Backend read-side projection derived from completed practice-session ledger facts. It is not a mutable
        TargetJob lifecycle field.
      properties:
        status:
          type: string
          enum:
          - not_started
          - in_progress
          - completed
        completedRounds:
          type: array
          uniqueItems: true
          description: Ordered, deduplicated completed rounds in TargetJob interview-round sequence.
          items:
            $ref: '#/components/schemas/PracticeRoundRef'
        currentRound:
          description: First incomplete structured round, or null after every round is complete.
          oneOf:
          - $ref: '#/components/schemas/PracticeRoundRef'
          - type: 'null'
    TargetJob:
      type: object
      required:
      - id
      - status
      - analysisStatus
      - title
      - companyName
      - targetLanguage
      - requirements
      - openQuestionIssueCount
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TargetJobStatus'
        analysisStatus:
          $ref: '#/components/schemas/TargetJobParseStatus'
        title:
          type: string
        companyName:
          type: string
        locationText:
          oneOf:
          - type: string
          - type: 'null'
        targetLanguage:
          type: string
        summary:
          oneOf:
          - $ref: '#/components/schemas/TargetJobSummary'
          - type: 'null'
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/TargetJobRequirement'
        fitSummary:
          oneOf:
          - $ref: '#/components/schemas/TargetJobFitSummary'
          - type: 'null'
        currentPracticePlanId:
          oneOf:
          - type: string
            format: uuid
          - type: 'null'
          description: Latest ready practice plan whose persisted resume and exact round pair match this TargetJob's bound
            resume and backend-projected currentRound; null when progress is completed, invalid, or has no matching ready
            plan.
        practiceProgress:
          $ref: '#/components/schemas/PracticeProgress'
          description: Completed/current practice rounds projected by the backend from persisted session facts. TargetJob
            lifecycle status is not a round cursor.
        resumeId:
          oneOf:
          - type: string
            format: uuid
          - type: 'null'
          description: Resume selected and persisted for this target job at import time. This target job-level binding is
            returned even before a practice plan exists.
        openQuestionIssueCount:
          type: integer
          format: int32
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateTargetJobRequest:
      type: object
      description: All fields optional — only supplied fields are updated.
      properties:
        status:
          $ref: '#/components/schemas/TargetJobStatus'
        locationText:
