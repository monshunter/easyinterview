openapi: 3.1.0
info:
  title: easyinterview API
  version: 1.0.0
  summary: HTTP contract for easyinterview P0 — JD onboarding, mock interview, evidence-based review.
  description: |-
    BASELINE — DO NOT EDIT.
    本文件是 openapi-v1-contract spec v1.9 / product-scope spec v1.2 锁定的 v1.0.0 freeze 快照。
    任何 breaking change 必须走 ADR + 本 spec 修订流程，新版本写入 openapi/baseline/openapi-v<MAJOR>.<MINOR>.<PATCH>.yaml。
  contact:
    name: easyinterview engineering
    url: https://github.com/monshunter/easyinterview

servers:
  - url: /api/v1
    description: API v1 base path. All endpoints in this document are mounted under this prefix.

tags:
  - name: Auth
    description: Session bootstrap (magic link), session teardown, runtime user context, and public runtime config.
  - name: Uploads
    description: Pre-signed object-storage URLs for resume / JD attachment uploads.
  - name: Profile
    description: Candidate profile (CandidateProfile) and experience cards.
  - name: Resumes
    description: Resume asset registration and retrieval.
  - name: TargetJobs
    description: JD import, target-job workspace state, and per-target metadata.
  - name: PracticePlans
    description: Practice plans created from target-job rounds, report retry plans, or debrief replay.
  - name: PracticeSessions
    description: Mock-interview sessions, session events, and session completion.
  - name: Reports
    description: Evidence-based feedback reports.
  - name: ResumeTailor
    description: Resume tailoring runs (per-target customised resumes).
  - name: Debriefs
    description: Real-interview debrief intake and follow-up.
  - name: Jobs
    description: Async job status polling for `202 Accepted` workflows.
  - name: Privacy
    description: Privacy export / deletion requests (P0 export returns 501 per ADR-Q5).

# Document-level security: every endpoint requires a valid first-party session
# cookie unless the operation overrides with `security: []` (public endpoints).
security:
  - sessionCookie: []

paths:
  /me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Get current user context
      description: Returns minimal context for the authenticated user (id, masked email, display name, language preferences).
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Current user context.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContext'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    delete:
      tags: [Auth]
      operationId: deleteMe
      summary: Request account deletion for the current user
      description: |
        Protected endpoint per ADR-Q5. Equivalent to requesting a privacy
        deletion for the current user and must dedupe repeated active requests
        by `Idempotency-Key`, returning the same active `privacy_delete` job or
        an equivalent terminal result.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '202':
          description: Account deletion request accepted; asynchronous privacy deletion job created or reused.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyRequestWithJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /auth/email/start:
    post:
      tags: [Auth]
      operationId: startAuthEmailChallenge
      summary: Issue a passwordless email magic-link challenge
      description: |
        Public endpoint per ADR-Q1. Sends a single-use magic link to the
        supplied email. Rate limited per ADR-Q1 risk-control baseline; does
        **not** carry an `Idempotency-Key` (rate-limit + challenge TTL handle
        deduplication).
      security: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthEmailStartRequest'
      responses:
        '202':
          description: Challenge accepted; verification email is being dispatched asynchronously.
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /auth/email/verify:
    get:
      tags: [Auth]
      operationId: verifyAuthEmailChallenge
      summary: Verify magic-link challenge and mint a session cookie
      description: |
        Public endpoint per ADR-Q1. Consumes the single-use magic-link token
        and, on success, sets the first-party session cookie via `Set-Cookie`.
        The response body conveys non-secret hints; the cookie value never
        appears in the JSON body.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: One-shot challenge token issued by `startAuthEmailChallenge`.
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Token valid; session cookie set on the response.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Set-Cookie:
              description: First-party session cookie per ADR-Q1 (`HttpOnly; Secure; SameSite=Lax`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Invalidate the current session
      description: Revokes the active session and clears the session cookie.
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '204':
          description: Session revoked.
          headers:
            Set-Cookie:
              description: Session cookie cleared (`Max-Age=0`).
              schema:
                type: string
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /uploads/presign:
    post:
      tags: [Uploads]
      operationId: createUploadPresign
      summary: Issue a pre-signed object-storage upload URL
      description: |
        Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Returns
        a short-lived URL the client uploads to directly; the server never
        proxies the file body.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadPresignRequest'
      responses:
        '201':
          description: Pre-signed URL issued.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadPresign'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /profiles/me:
    get:
      tags: [Profile]
      operationId: getMyProfile
      summary: Get my candidate profile
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Candidate profile.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateProfile'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    patch:
      tags: [Profile]
      operationId: updateMyProfile
      summary: Update my candidate profile (Lite)
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateProfile'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /profiles/me/experience-cards:
    get:
      tags: [Profile]
      operationId: listExperienceCards
      summary: List my experience cards (cursor-paginated)
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Paginated experience cards.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedExperienceCard'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags: [Profile]
      operationId: createExperienceCard
      summary: Create an experience card
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExperienceCardRequest'
      responses:
        '201':
          description: Experience card created.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperienceCard'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /profiles/me/experience-cards/{cardId}:
    patch:
      tags: [Profile]
      operationId: updateExperienceCard
      summary: Update an experience card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExperienceCardRequest'
      responses:
        '200':
          description: Updated experience card.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperienceCard'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes:
    post:
      tags: [Resumes]
      operationId: registerResume
      summary: Register an uploaded resume file and trigger parsing
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Long-running parse → 202 + Job (`resume_parse`).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterResumeRequest'
      responses:
        '202':
          description: Resume registered; parse job dispatched.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeAssetWithJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes/{resumeAssetId}:
    get:
      tags: [Resumes]
      operationId: getResume
      summary: Get a resume asset and parse status
      parameters:
        - name: resumeAssetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Resume asset.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeAsset'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /targets/import:
    post:
      tags: [TargetJobs]
      operationId: importTargetJob
      summary: Import a target job from URL / text / file / manual form
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Long-running parse → 202 + Job (`target_import`).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportTargetJobRequest'
      responses:
        '202':
          description: Target-job import accepted; parse job dispatched.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetJobWithJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /targets:
    get:
      tags: [TargetJobs]
      operationId: listTargetJobs
      summary: List target jobs (cursor-paginated)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TargetJobStatus'
        - name: analysisStatus
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TargetJobParseStatus'
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Paginated target jobs.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTargetJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /targets/{targetJobId}:
    get:
      tags: [TargetJobs]
      operationId: getTargetJob
      summary: Get a target-job workspace
      parameters:
        - name: targetJobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Target-job workspace.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    patch:
      tags: [TargetJobs]
      operationId: updateTargetJob
      summary: Update target-job lifecycle status or metadata
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`.
      parameters:
        - name: targetJobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTargetJobRequest'
      responses:
        '200':
          description: Updated target job.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /practice/plans:
    post:
      tags: [PracticePlans]
      operationId: createPracticePlan
      summary: Create a practice plan
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePracticePlanRequest'
      responses:
        '201':
          description: Practice plan created.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticePlan'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /practice/plans/{planId}:
    get:
      tags: [PracticePlans]
      operationId: getPracticePlan
      summary: Get a practice plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Practice plan detail.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticePlan'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /practice/sessions:
    post:
      tags: [PracticeSessions]
      operationId: startPracticeSession
      summary: Start a practice session
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Returns 201 with the session and the first turn.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartPracticeSessionRequest'
      responses:
        '201':
          description: Practice session created with first turn.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticeSession'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /practice/sessions/{sessionId}:
    get:
      tags: [PracticeSessions]
      operationId: getPracticeSession
      summary: Get a practice session (refresh / resume)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Practice session.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticeSession'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /practice/sessions/{sessionId}/events:
    post:
      tags: [PracticeSessions]
      operationId: appendSessionEvent
      summary: Append a session event and get the next assistant action
      description: |
        Idempotency for this endpoint is enforced by `clientEventId` in the
        request body (spec D-6); the request must NOT carry an
        `Idempotency-Key` header.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PracticeSessionEventRequest'
      responses:
        '200':
          description: Event accepted; next assistant action returned.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEventResult'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /practice/sessions/{sessionId}/complete:
    post:
      tags: [PracticeSessions]
      operationId: completePracticeSession
      summary: Complete a practice session and trigger report generation
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Long-running → 202 + Job (`report_generate`).
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletePracticeSessionRequest'
      responses:
        '202':
          description: Session marked completing; report generation dispatched.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportWithJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /reports/{reportId}:
    get:
      tags: [Reports]
      operationId: getFeedbackReport
      summary: Get a feedback report (still-generating reports return 200 with placeholder)
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Feedback report (placeholder shape while status != ready).
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackReport'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /targets/{targetJobId}/reports:
    get:
      tags: [Reports]
      operationId: listTargetJobReports
      summary: List feedback reports for a target job (cursor-paginated)
      parameters:
        - name: targetJobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - $ref: '#/components/parameters/XRequestID'
