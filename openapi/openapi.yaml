          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: JD-match recommendation detail.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobMatchRecommendation'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /jd-match/recommendations/{jobMatchId}/dismiss:
    post:
      tags: [JobMatch]
      operationId: markJobNotRelevant
      summary: Mark a recommendation as not relevant
      description: |
        Hides the recommendation from the candidate view and feeds the agent
        learning loop owned by the future backend subspec.
      parameters:
        - name: jobMatchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkNotRelevantRequest'
      responses:
        '200':
          description: Dismiss accepted.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkNotRelevantResult'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /jd-match/watchlist:
    get:
      tags: [JobMatch]
      operationId: listWatchlist
      summary: List the candidate watchlist
      description: |
        Returns the candidate watchlist; each item carries `linkedJobMatchId`
        for the chevron handoff back to the Recommended tab.
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Watchlist items.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags: [JobMatch]
      operationId: addToWatchlist
      summary: Save a recommendation to the watchlist
      description: Adds the referenced recommendation to the candidate watchlist.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToWatchlistRequest'
      responses:
        '200':
          description: Watchlist item created or refreshed.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistItem'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /jd-match/watchlist/{jobMatchId}:
    delete:
      tags: [JobMatch]
      operationId: removeFromWatchlist
      summary: Remove a recommendation from the watchlist
      description: Drops the watchlist entry that links to the given recommendation id.
      parameters:
        - name: jobMatchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '204':
          description: Watchlist entry removed.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /jd-match/search:
    post:
      tags: [JobMatch]
      operationId: searchJobs
      summary: Run a natural-language web search for JD matches
      description: |
        Triggers a backend search run; response carries the materialized result
        list (no `progress` field per plan D-12). Frontend renders the static
        5-step AGENT panel locally during in-flight requests.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchJobsRequest'
      responses:
        '200':
          description: Search run completed.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchJobsResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /jd-match/saved-searches:
    get:
      tags: [JobMatch]
      operationId: listSavedSearches
      summary: List the candidate's saved searches
      description: Returns saved searches the candidate has previously stored.
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Saved searches collection.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedSearchesResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags: [JobMatch]
      operationId: createSavedSearch
      summary: Save the current search query as a recurring saved search
      description: Stores the current query / filters under a candidate label.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSavedSearchRequest'
      responses:
        '200':
          description: Saved search created.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedSearch'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /jd-match/market-signals:
    get:
      tags: [JobMatch]
      operationId: getMarketSignals
      summary: Get aggregated market signals for the watchlist tab
      description: Returns the 4-card market signals grid for the watchlist view.
      parameters:
        - name: window
          in: query
          required: false
          description: Look-back window for the aggregation; defaults to `7d`.
          schema:
            type: string
            enum: [7d, 14d, 30d]
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Market signals snapshot.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketSignalsResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: ei_session
      description: |
        First-party session cookie minted by `GET /api/v1/auth/email/verify`.
        ADR-Q1 locks the cookie attributes (HttpOnly, SameSite=Lax, Secure, ~30d
        sliding renewal). Cookie value is opaque; the server-side `sessions`
        table is the source of truth. `Authorization: Bearer` is **not** an
        accepted P0 scheme — adding it requires a revision of ADR-Q1 and this
        spec.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Idempotency key per `B1 shared-conventions-codified §3.4` (24h TTL). Required by
        side-effect endpoints listed in spec D-6, except `POST /auth/email/start`
        (rate-limited per ADR-Q1) and `POST /practice/sessions/{sessionId}/events`
        (uses `clientEventId` instead).
      schema:
        type: string
        format: uuid
    XRequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Client-supplied correlation id; the server echoes it back via the X-Request-ID response header and `error.requestId`.
      schema:
        type: string
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C Trace Context header.
      schema:
        type: string
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: |
        UI-locale hint per `B1 shared-conventions-codified §3.5`. Affects display defaults only;
        does **not** override persisted business fields such as `targetLanguage`.
      schema:
        type: string
    XClientVersion:
      name: X-Client-Version
      in: header
      required: false
      description: Client build version reported by the frontend shell.
      schema:
        type: string

  headers:
    XRequestID:
      description: Server-confirmed correlation id; matches `error.requestId` on error responses.
      schema:
        type: string

  responses:
    ApiErrorResponse:
      description: Error envelope per `ApiError` schema.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    # === B1-AUTO-START: synced from shared/conventions.yaml by `make codegen-openapi` ===
    # Hand edits inside this block will be overwritten. To extend the contract,
    # update `shared/conventions.yaml` (B1 truth source) and re-run codegen.
    # The block tracks: ApiError inner object, ApiErrorResponse envelope,
    # ApiErrorCode, PageInfo, JobStatus, and the 19 enums catalogued in
    # `shared/conventions.yaml#enums`.
    ApiErrorCode:
      type: string
      description: |
        Documented error codes synced from
        `shared/conventions.yaml#errors[].code`; B1 owns the literal set.
        P0 export exceptions such as `PRIVACY_EXPORT_NOT_AVAILABLE` and
        `RESUME_EXPORT_NOT_AVAILABLE` are included here so the OpenAPI
        contract is self-contained for 501 export responses.
      enum:
        - AUTH_UNAUTHORIZED
        - TARGET_IMPORT_FAILED
        - TARGET_JOB_NOT_FOUND
        - TARGET_IMPORT_SOURCE_INVALID
        - TARGET_IMPORT_SOURCE_UNAVAILABLE
        - TARGET_INVALID_STATE_TRANSITION
        - PRACTICE_SESSION_CONFLICT
        - PRACTICE_PLAN_NOT_FOUND
        - PRACTICE_SESSION_NOT_FOUND
        - REPORT_NOT_FOUND
        - REPORT_NOT_READY
        - DEBRIEF_NOT_FOUND
        - RESUME_EXPORT_NOT_AVAILABLE
        - VALIDATION_FAILED
        - IDEMPOTENCY_KEY_MISMATCH
        - RATE_LIMITED
        - AI_PROVIDER_TIMEOUT
        - AI_OUTPUT_INVALID
        - AI_FALLBACK_EXHAUSTED
        - AI_UNSUPPORTED_CAPABILITY
        - AI_PROVIDER_CONFIG_INVALID
        - AI_PROVIDER_SECRET_MISSING
        - PRIVACY_EXPORT_NOT_AVAILABLE

    ApiError:
      type: object
      required: [code, message, requestId, retryable]
      description: |
        Canonical error object per B1 `structures.ApiError`. B2 wraps it in
        `ApiErrorResponse` for the wire body `{error: ...}`.
      properties:
        code:
          $ref: '#/components/schemas/ApiErrorCode'
        message:
          type: string
          description: Human-readable summary; safe to surface to operators (no secrets, per A4 redaction rules).
        requestId:
          type: string
          description: Request correlation id; equals the X-Request-ID response header for the same request.
        retryable:
          type: boolean
          description: Hint to the client whether retry is safe, as defined by B1 shared-conventions-codified.
        details:
          type: object
          description: Optional structured diagnostic. Must not contain provider, prompt, or secret material per A4 redaction rules.
          additionalProperties: true

    ApiErrorResponse:
      type: object
      required: [error]
      description: Wire error response envelope defined by B1 shared-conventions-codified.
      properties:
        error:
          $ref: '#/components/schemas/ApiError'

    PageInfo:
      type: object
      required: [pageSize, hasMore]
      description: Cursor pagination envelope per spec D-5. Mirrors B1 `structures.PageInfo`.
      properties:
        nextCursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; `null` on the last page.
        pageSize:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
        hasMore:
          type: boolean

    JobStatus:
      type: string
      description: Synced from `shared/conventions.yaml#jobStatuses`.
      enum:
        - queued
        - running
        - succeeded
        - failed
        - cancelled
        - dead

    TargetJobStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[TargetJobStatus]` sourceSection 5.1.
      enum: [draft, preparing, applied, interviewing, offer, rejected, archived]

    TargetJobParseStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[TargetJobParseStatus]` sourceSection 5.2.
      enum: [queued, processing, ready, failed]

    PracticeMode:
      type: string
      description: Synced from `shared/conventions.yaml#enums[PracticeMode]` sourceSection 5.3.
      enum: [assisted, strict]

    PracticeGoal:
      type: string
      description: Synced from `shared/conventions.yaml#enums[PracticeGoal]` sourceSection 5.4.
      enum: [baseline, retry_current_round, next_round, debrief]

    InterviewerRole:
      type: string
      description: Synced from `shared/conventions.yaml#enums[InterviewerRole]` sourceSection 5.5.
      enum: [generalist, hr, hiring_manager, technical_manager, peer]

    SessionStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[SessionStatus]` sourceSection 5.6.
      enum: [queued, running, waiting_user_input, completing, completed, failed, cancelled]

    ReportStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[ReportStatus]` sourceSection 5.7.
      enum: [queued, generating, ready, failed]

    ReadinessTier:
      type: string
      description: Synced from `shared/conventions.yaml#enums[ReadinessTier]` sourceSection 5.8.
      enum: [not_ready, needs_practice, basically_ready, well_prepared]

    DimensionStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[DimensionStatus]` sourceSection 5.9.
      enum: [strong, meets_bar, needs_work]

    Confidence:
      type: string
      description: Synced from `shared/conventions.yaml#enums[Confidence]` sourceSection 5.10.
      enum: [high, medium, low]

    QuestionReviewStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[QuestionReviewStatus]` sourceSection 5.11.
      enum: [open, queued_for_retry, resolved]

    DebriefStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[DebriefStatus]` sourceSection 5.12.
      enum: [draft, completed]

    DebriefRoundType:
      type: string
      description: Synced from `shared/conventions.yaml#enums[DebriefRoundType]` sourceSection 5.12.
      enum: [hr_screen, hiring_manager, behavioral, technical, culture, custom]

    DebriefQuestionSource:
      type: string
      description: Synced from `shared/conventions.yaml#enums[DebriefQuestionSource]` sourceSection 5.12.
      enum: [jd, resume, mock_report, manual]

    PrivacyRequestType:
      type: string
      description: Synced from `shared/conventions.yaml#enums[PrivacyRequestType]` sourceSection 5.13.
      enum: [export, delete]

    PrivacyRequestStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[PrivacyRequestStatus]` sourceSection 5.13.
      enum: [queued, processing, completed, failed, cancelled]

    ResumeVersionType:
      type: string
      description: Synced from `shared/conventions.yaml#enums[ResumeVersionType]` sourceSection 5.14.
      enum: [structured_master, targeted]

    ResumeSeedStrategy:
      type: string
      description: Synced from `shared/conventions.yaml#enums[ResumeSeedStrategy]` sourceSection 5.15.
      enum: [copy_master, blank, ai_select]

    ResumeTailorSuggestionStatus:
      type: string
      description: Synced from `shared/conventions.yaml#enums[ResumeTailorSuggestionStatus]` sourceSection 5.16.
      enum: [pending, accepted, rejected]
    # === B1-AUTO-END ===

    ResourceType:
      type: string
      description: |
        Resource type referenced by `Job.resourceType` and outbox events.
        Locked here per spec §3.2 待确认事项. Adding a value is additive but
        requires a B2 spec revision so consumers can update mock fixtures.
      enum:
        - target_job
        - feedback_report
        - resume_asset
        - resume_tailor_run
        - debrief
        - privacy_request

    JobType:
      type: string
      description: |
        Async job type catalogue evidenced by `B2 openapi-v1-contract` examples
        (target_import, resume_parse, report_generate, resume_tailor,
        debrief_generate, privacy_export, privacy_delete).
      enum:
        - target_import
        - resume_parse
        - report_generate
        - resume_tailor
        - debrief_generate
        - privacy_export
        - privacy_delete

    GenerationProvenance:
      type: object
      description: |
        AI-generation provenance per spec §4.6. Every AI-generated schema
        listed in spec §4.6 must either embed this object as `provenance` or
        be reachable from a `*WithJob.job.provenance`.

        `rubricVersion` is **required** for every generation. Non-scoring
        generations (for example AssistantAction follow-up choices) must
        explicitly emit the literal `not_applicable` rather than omitting the
        field — the Phase 1.4 inventory check enforces this contract via this
        description.
      required:
        - promptVersion
        - rubricVersion
        - modelId
        - language
        - featureFlag
        - dataSourceVersion
      properties:
        promptVersion:
          type: string
          description: Prompt registry key/version (e.g., `feedback_report.v3`).
        rubricVersion:
          type: string
          description: |
            Rubric registry key/version. Non-scoring generations emit the
            literal `not_applicable` (not the empty string, not omitted).
        modelId:
          type: string
          description: Provider profile / model id; never includes secret material.
        language:
          type: string
          description: BCP 47 language tag used for this generation.
        featureFlag:
          type: string
          description: Feature flag / variant that influenced the generation path; emit `none` if no flag applied.
        dataSourceVersion:
          type: string
          description: Snapshot id or version of the input data set (e.g., `target_job.v17`).

    PaginatedEnvelope:
      type: object
      required: [items, pageInfo]
      description: |
        Base envelope for cursor-paginated list responses. Concrete
        `PaginatedFoo` schemas extend this via `allOf` and override `items`
        with a typed array, keeping the field order (`items`, `pageInfo`)
        consistent across endpoints.
      properties:
        items:
          type: array
          items: {}
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    # ----- Auth / runtime -----
    UserContext:
      type: object
      required: [id, emailMasked, displayName, uiLanguage, preferredPracticeLanguage]
      description: Minimal current-user context returned by `GET /me`.
      properties:
        id:
          type: string
          format: uuid
        emailMasked:
          type: string
          description: Masked email address (e.g., `ali***@example.com`); raw email never leaves the server.
        displayName:
          type: string
        uiLanguage:
          type: string
          description: BCP 47 UI language preference.
        preferredPracticeLanguage:
          type: string
          description: BCP 47 preferred practice language.

    AuthEmailStartRequest:
      type: object
      required: [email]
      description: Magic-link challenge request per ADR-Q1. No `Idempotency-Key`; rate-limited per ADR-Q1.
      properties:
        email:
          type: string
          format: email
        returnTo:
          type: string
          description: Optional post-verify redirect path on the same origin.

    Session:
      type: object
      required: [userId, sessionExpiresAt]
      description: |
        `verifyAuthEmailChallenge` response body. The actual session cookie is
        delivered via the `Set-Cookie` response header per ADR-Q1; this body
        only conveys non-secret hints (user id and expiry) so the client can
        schedule renewal. The opaque cookie value never appears in the body.
      properties:
        userId:
          type: string
          format: uuid
        sessionExpiresAt:
          type: string
          format: date-time

    RuntimeConfig:
      type: object
      required: [defaultUiLanguage, featureFlags, appVersion, analyticsEnabled]
      description: |
        Public runtime configuration returned by `GET /runtime-config`.
        Contains only the allowlisted public fields per A4 D-2; secret /
        operator-only flags are never exposed. When the request carries a
        valid session, `analyticsEnabled` must reflect `user_settings.analytics_opt_in`
        and `postHogPublicKey` is omitted on opt-out.
      properties:
        defaultUiLanguage:
          type: string
        featureFlags:
          type: object
          description: Public feature flags only (`public=true` per A4 D-2). Operator-only flags must not appear here.
          additionalProperties:
            type: boolean
        appVersion:
          type: string
        analyticsEnabled:
          type: boolean
        postHogPublicKey:
          type: string
          description: Optional; omitted when `analyticsEnabled == false`.

    # ----- Uploads -----
    UploadPresignRequest:
      type: object
      required: [purpose, fileName, contentType, byteSize]
      properties:
        purpose:
          type: string
          enum: [resume, target_job_attachment, privacy_export]
        fileName:
          type: string
        contentType:
          type: string
        byteSize:
          type: integer
          format: int64
          minimum: 1

    UploadPresign:
      type: object
      required: [fileObjectId, uploadUrl, method, headers, expiresAt]
      properties:
        fileObjectId:
          type: string
          format: uuid
        uploadUrl:
          type: string
          format: uri
        method:
          type: string
          enum: [PUT, POST]
        headers:
          type: object
          additionalProperties:
            type: string
        expiresAt:
          type: string
          format: date-time

    # ----- Profile -----
    CandidateProfile:
      type: object
      required: [headline, yearsOfExperience, currentRole, preferredPracticeLanguage, uiLanguage, region]
      properties:
        headline:
          type: string
        yearsOfExperience:
          type: integer
          format: int32
          minimum: 0
        currentRole:
          type: string
        preferredPracticeLanguage:
          type: string
        uiLanguage:
          type: string
        region:
          type: string

    UpdateProfileRequest:
      type: object
      description: All fields optional — only supplied fields are updated.
      properties:
        headline:
          type: string
        yearsOfExperience:
          type: integer
          format: int32
          minimum: 0
        currentRole:
          type: string
        preferredPracticeLanguage:
          type: string
        uiLanguage:
          type: string
        region:
          type: string

    ExperienceCard:
      type: object
      required: [id, title, companyName, situation, task, action, result, skills, language, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        companyName:
          type: string
        situation:
          type: string
        task:
          type: string
        action:
          type: string
        result:
          type: string
        skills:
          type: array
          items:
            type: string
        language:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateExperienceCardRequest:
      type: object
      required: [title, companyName, situation, task, action, result, language]
      properties:
        title:
          type: string
        companyName:
          type: string
        situation:
          type: string
        task:
          type: string
        action:
          type: string
        result:
          type: string
        skills:
          type: array
          items:
            type: string
        language:
          type: string

    UpdateExperienceCardRequest:
      type: object
      properties:
        title:
          type: string
        companyName:
          type: string
        situation:
          type: string
        task:
          type: string
        action:
          type: string
        result:
          type: string
        skills:
          type: array
          items:
            type: string
        language:
          type: string

    PaginatedExperienceCard:
      allOf:
        - $ref: '#/components/schemas/PaginatedEnvelope'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ExperienceCard'

    # ----- Resumes -----
    RegisterResumeRequest:
      type: object
      required: [title, language]
      properties:
        fileObjectId:
          type: string
          format: uuid
          nullable: true
          description: Required only when `sourceType` is `upload`; omitted/null for paste and guided intake.
        title:
          type: string
        language:
          type: string
        sourceType:
          type: string
          enum: [upload, paste, guided]
          description: Optional additive source discriminator for Resume Workshop.
        rawText:
          type: string
          description: Optional paste-mode source text.
        guidedAnswers:
          type: object
          additionalProperties: true
          description: Optional guided-answer JSON object persisted in `resume_assets.guided_answers`.

    ResumeAsset:
      type: object
      required: [id, title, language, parseStatus, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        language:
          type: string
        parseStatus:
          $ref: '#/components/schemas/TargetJobParseStatus'
        status:
          type: string
          enum: [active, archived]
          description: Additive archive projection; omitted by legacy fixtures before D-18.
        sourceType:
          type: string
          enum: [upload, paste, guided]
        fileObjectId:
          type: string
          format: uuid
          nullable: true
          description: Upload-backed assets keep a file object; paste and guided assets are fileless.
        originalText:
          oneOf:
            - type: string
            - type: 'null'
        guidedAnswers:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        parsedTextSnapshot:
          oneOf:
            - type: string
            - type: 'null'
        parsedSummary:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
          description: AI-extracted summary; reachable from a job/resource that carries `GenerationProvenance`.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'

    ResumeAssetWithJob:
      type: object
      required: [resumeAssetId, job]
      properties:
        resumeAssetId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'

    PaginatedResumeAsset:
      allOf:
        - $ref: '#/components/schemas/PaginatedEnvelope'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ResumeAsset'

    ResumeVersion:
      type: object
      required: [id, resumeAssetId, versionType, displayName, structuredProfile, provenance, suggestions, createdAt, updatedAt]
      description: Resume Workshop version snapshot. AI-generated profile and suggestion fields carry GenerationProvenance.
      properties:
        id:
          type: string
          format: uuid
        resumeAssetId:
          type: string
          format: uuid
        parentVersionId:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        versionType:
          $ref: '#/components/schemas/ResumeVersionType'
        targetJobId:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        displayName:
          type: string
        seedStrategy:
          oneOf:
            - $ref: '#/components/schemas/ResumeSeedStrategy'
            - type: 'null'
        focusAngle:
          oneOf:
            - type: string
            - type: 'null'
        structuredProfile:
          type: object
          required: [provenance]
          additionalProperties: true
          properties:
            headline:
              type: string
            summary:
              type: string
            skills:
              type: array
              items:
                type: string
            sections:
              type: array
              items:
                type: object
                additionalProperties: true
            provenance:
              $ref: '#/components/schemas/GenerationProvenance'
        matchScore:
          oneOf:
            - type: number
            - type: 'null'
        promptVersion:
          oneOf:
            - type: string
            - type: 'null'
        rubricVersion:
          oneOf:
            - type: string
            - type: 'null'
        modelId:
          oneOf:
            - type: string
            - type: 'null'
        provider:
          oneOf:
            - type: string
            - type: 'null'
        provenance:
          $ref: '#/components/schemas/GenerationProvenance'
        suggestions:
          type: array
          items:
            type: object
            required: [id, status, originalBullet, suggestedBullet, provenance, createdAt]
            properties:
              id:
                type: string
                format: uuid
              tailorRunId:
                oneOf:
                  - type: string
                    format: uuid
                  - type: 'null'
              originalBullet:
                type: string
              suggestedBullet:
                type: string
              reason:
                oneOf:
                  - type: string
                  - type: 'null'
              status:
                $ref: '#/components/schemas/ResumeTailorSuggestionStatus'
              provenance:
                $ref: '#/components/schemas/GenerationProvenance'
              decidedAt:
                oneOf:
                  - type: string
                    format: date-time
                  - type: 'null'
              createdAt:
                type: string
                format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'

    BranchResumeVersionAccepted:
      type: object
      required: [resumeVersionId, version, job]
      description: Async branch response for `seedStrategy=ai_select`; callers poll `job` while rendering the provisional version.
      properties:
        resumeVersionId:
          type: string
          format: uuid
        version:
          $ref: '#/components/schemas/ResumeVersion'
        job:
          $ref: '#/components/schemas/Job'

    PaginatedResumeVersion:
      allOf:
        - $ref: '#/components/schemas/PaginatedEnvelope'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ResumeVersion'

    BranchResumeVersionRequest:
      type: object
      required: [parentVersionId, targetJobId, seedStrategy]
      properties:
        parentVersionId:
          type: string
          format: uuid
        targetJobId:
          type: string
          format: uuid
        seedStrategy:
          $ref: '#/components/schemas/ResumeSeedStrategy'
        displayName:
          type: string
        focusAngle:
          type: string

    UpdateResumeVersionRequest:
      type: object
      properties:
        displayName:
          type: string
        focusAngle:
          oneOf:
            - type: string
            - type: 'null'
        structuredProfile:
          type: object
          additionalProperties: true
        matchScore:
          oneOf:
            - type: number
            - type: 'null'

    # ----- TargetJobs -----
    TargetJobImportSourceURL:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          const: url
        url:
          type: string
          format: uri

    TargetJobImportSourceManualText:
      type: object
      required: [type, rawText]
      properties:
        type:
          type: string
          const: manual_text
        rawText:
          type: string

    TargetJobImportSourceFile:
      type: object
      required: [type, fileObjectId]
      properties:
        type:
          type: string
          const: file
        fileObjectId:
          type: string
          format: uuid

    TargetJobImportSourceManualForm:
      type: object
      required: [type, title, rawDescription]
      properties:
        type:
          type: string
          const: manual_form
        title:
          type: string
        companyName:
          type: string
        rawDescription:
          type: string

    TargetJobImportSource:
      oneOf:
        - $ref: '#/components/schemas/TargetJobImportSourceURL'
        - $ref: '#/components/schemas/TargetJobImportSourceManualText'
        - $ref: '#/components/schemas/TargetJobImportSourceFile'
        - $ref: '#/components/schemas/TargetJobImportSourceManualForm'
      discriminator:
        propertyName: type
        mapping:
          url: '#/components/schemas/TargetJobImportSourceURL'
          manual_text: '#/components/schemas/TargetJobImportSourceManualText'
          file: '#/components/schemas/TargetJobImportSourceFile'
          manual_form: '#/components/schemas/TargetJobImportSourceManualForm'

    ImportTargetJobRequest:
      type: object
      required: [source, targetLanguage]
      properties:
        source:
          $ref: '#/components/schemas/TargetJobImportSource'
        titleHint:
          type: string
        companyNameHint:
          type: string
        targetLanguage:
          type: string

    TargetJobWithJob:
      type: object
      required: [targetJobId, job]
      properties:
        targetJobId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'

    TargetJobRequirement:
      type: object
      required: [id, kind, label, evidenceLevel]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [must_have, nice_to_have, hidden_signal, interview_focus]
        label:
          type: string
        evidenceLevel:
          type: string
          enum: [explicit, implicit, inferred]

    TargetJobSummary:
      type: object
      required: [provenance]
      description: |
        AI-generated target-job summary. Per spec §4.6, AI-generated schemas
        must carry `provenance` (or be reachable from a wrapper carrying it);
        we colocate `provenance` here so the standalone object is auditable.
      properties:
        coreThemes:
          type: array
          items:
            type: string
        interviewHypotheses:
          type: array
          items:
            type: string
        provenance:
          $ref: '#/components/schemas/GenerationProvenance'

    TargetJobFitSummary:
      type: object
      required: [provenance]
      description: AI-generated fit summary (spec §4.6). Carries `provenance`.
      properties:
        strengths:
          type: array
          items:
            type: string
        gaps:
          type: array
          items:
            type: string
        riskSignals:
          type: array
          items:
            type: string
        provenance:
          $ref: '#/components/schemas/GenerationProvenance'

    TargetJob:
      type: object
      required: [id, status, analysisStatus, title, companyName, targetLanguage, sourceType, requirements, openQuestionIssueCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TargetJobStatus'
        analysisStatus:
          $ref: '#/components/schemas/TargetJobParseStatus'
        title:
          type: string
        companyName:
          type: string
        locationText:
          oneOf:
            - type: string
            - type: 'null'
        targetLanguage:
          type: string
        sourceType:
          type: string
          enum: [manual_text, url, file, manual_form]
        sourceUrl:
          oneOf:
            - type: string
              format: uri
            - type: 'null'
        summary:
          oneOf:
            - $ref: '#/components/schemas/TargetJobSummary'
            - type: 'null'
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/TargetJobRequirement'
        fitSummary:
          oneOf:
            - $ref: '#/components/schemas/TargetJobFitSummary'
            - type: 'null'
        latestReportId:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        openQuestionIssueCount:
          type: integer
          format: int32
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpdateTargetJobRequest:
      type: object
      description: All fields optional — only supplied fields are updated.
      properties:
        status:
          $ref: '#/components/schemas/TargetJobStatus'
        locationText:
          oneOf:
            - type: string
            - type: 'null'
        notes:
          type: string
        titleHint:
          type: string
        companyNameHint:
          type: string

    PaginatedTargetJob:
      allOf:
        - $ref: '#/components/schemas/PaginatedEnvelope'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/TargetJob'

    # ----- Practice Plans / Sessions -----
    CreatePracticePlanRequest:
      type: object
      required: [targetJobId, goal, mode, interviewerPersona, difficulty, language, questionBudget, timeBudgetMinutes, resumeAssetId]
      properties:
        targetJobId:
          type: string
          format: uuid
        goal:
          $ref: '#/components/schemas/PracticeGoal'
        mode:
          $ref: '#/components/schemas/PracticeMode'
        interviewerPersona:
          $ref: '#/components/schemas/InterviewerRole'
        difficulty:
          type: string
          enum: [easy, standard, stretch]
        language:
          type: string
        questionBudget:
          type: integer
          format: int32
          minimum: 1
        timeBudgetMinutes:
          type: integer
          format: int32
          minimum: 1
        resumeAssetId:
          type: string
          format: uuid
        sourceReportId:
          type: string
          format: uuid
          nullable: true
          description: Required for retry_current_round and next_round practice goals.
        sourceDebriefId:
          type: string
          format: uuid
          nullable: true
          description: Required for debrief practice goals.
        focusCompetencyCodes:
          type: array
          items:
            type: string

    PracticePlan:
      type: object
      required: [id, targetJobId, goal, mode, interviewerPersona, difficulty, language, timeBudgetMinutes, questionBudget, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        targetJobId:
          type: string
          format: uuid
        goal:
          $ref: '#/components/schemas/PracticeGoal'
        mode:
          $ref: '#/components/schemas/PracticeMode'
        interviewerPersona:
          $ref: '#/components/schemas/InterviewerRole'
        difficulty:
          type: string
          enum: [easy, standard, stretch]
        language:
          type: string
        timeBudgetMinutes:
          type: integer
          format: int32
          minimum: 1
        questionBudget:
          type: integer
          format: int32
          minimum: 1
        sourceReportId:
          type: string
          format: uuid
          nullable: true
        sourceDebriefId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [draft, ready, archived]
        createdAt:
          type: string
          format: date-time

    StartPracticeSessionRequest:
      type: object
      required: [planId]
      properties:
        planId:
          type: string
          format: uuid
        hintsEnabled:
          type: boolean

    PracticeTurn:
      type: object
      required: [id, turnIndex, questionText, status]
      properties:
        id:
          type: string
          format: uuid
        turnIndex:
          type: integer
          format: int32
          minimum: 1
        questionText:
          type: string
        questionIntent:
          type: string
        status:
          type: string
          enum: [asked, answered, follow_up_requested, assessed, skipped]
        askedAt:
          type: string
          format: date-time

    PracticeSession:
      type: object
      required: [id, planId, targetJobId, status, language, hintsEnabled, turnCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        targetJobId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/SessionStatus'
        language:
          type: string
        hintsEnabled:
          type: boolean
        turnCount:
          type: integer
          format: int32
          minimum: 0
        currentTurn:
          oneOf:
            - $ref: '#/components/schemas/PracticeTurn'
            - type: 'null'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePracticeVoiceTurnRequest:
      type: object
      required: [clientVoiceTurnId, turnId, audio, language, practiceMode]
      description: |
        Client-submitted audio turn for the cascaded STT -> chat -> TTS practice
        voice MVP. Audio is a small request payload for immediate processing,
        not a persisted file object.
      properties:
        clientVoiceTurnId:
          type: string
          format: uuid
          description: Client-generated voice turn id used with Idempotency-Key replay.
        turnId:
          type: string
          format: uuid
          description: Current practice turn receiving the voice answer.
        audio:
          $ref: '#/components/schemas/PracticeVoiceAudioInput'
        language:
          type: string
          description: BCP 47 language hint for STT and TTS profiles.
        practiceMode:
          $ref: '#/components/schemas/PracticeMode'
        manualTranscriptFallback:
          type: string
          description: Optional user-entered transcript when capture is unavailable.

    PracticeVoiceAudioInput:
      type: object
      required: [contentBase64, contentType, durationMs]
      properties:
        contentBase64:
          type: string
          format: byte
          description: Base64 encoded short audio payload for immediate STT processing.
        contentType:
          type: string
          enum: [audio/webm, audio/wav, audio/mpeg]
        durationMs:
          type: integer
          format: int32
          minimum: 1
          maximum: 60000
        byteLength:
          type: integer
          format: int32
          minimum: 1
          description: Optional decoded byte length for request sanity checks.

    PracticeVoiceTurnResult:
      type: object
      required: [voiceTurnId, userTranscriptFinal, assistantTextDraft, ttsChunks, providerMetaSummary, session, ttsError]
      properties:
        voiceTurnId:
          type: string
          format: uuid
        userTranscriptFinal:
          type: string
        assistantTextDraft:
          type: string
        ttsChunks:
          type: array
          items:
            $ref: '#/components/schemas/PracticeVoiceTTSChunk'
        providerMetaSummary:
          $ref: '#/components/schemas/PracticeVoiceProviderMetaSummary'
        session:
          $ref: '#/components/schemas/PracticeSession'
        ttsError:
          oneOf:
            - $ref: '#/components/schemas/PracticeVoiceTTSError'
            - type: 'null'

    PracticeVoiceTTSChunk:
      type: object
      required: [chunkId, sequence, contentType, durationMs, byteLength, textHash, audioRef]
      description: |
        TTS playback metadata. `audioRef` is an opaque temporary playback
        reference or fixture handle; this schema does not expose raw audio
        bytes or provider secrets.
      properties:
        chunkId:
          type: string
        sequence:
          type: integer
          format: int32
          minimum: 0
        contentType:
          type: string
          enum: [audio/mpeg, audio/wav, audio/ogg]
        durationMs:
          type: integer
          format: int32
          minimum: 0
        byteLength:
          type: integer
          format: int32
          minimum: 0
        textHash:
          type: string
          description: Hash of synthesized text, never the text itself.
        audioRef:
          type: string
          description: Opaque playback reference or fixture handle for the frontend player.

    PracticeVoiceProviderMetaSummary:
      type: object
      required: [sttProfile, chatProfile, ttsProfile, sttProvider, chatProvider, ttsProvider]
      description: Provider-neutral profile summary for UI/debug display; no secrets or raw prompts.
      properties:
        sttProfile:
          type: string
        chatProfile:
          type: string
        ttsProfile:
          type: string
        sttProvider:
          type: string
        chatProvider:
          type: string
        ttsProvider:
          type: string
        sttLatencyMs:
          type: integer
          format: int32
          minimum: 0
        chatLatencyMs:
          type: integer
          format: int32
          minimum: 0
        ttsLatencyMs:
          type: integer
          format: int32
          minimum: 0

    PracticeVoiceTTSError:
      type: object
      required: [code, message, retryable]
      description: Non-fatal TTS failure. Transcript and assistant text remain usable.
      properties:
        code:
          type: string
          enum: [TTS_CONFIG_MISSING, TTS_PROVIDER_FAILED, TTS_SYNTHESIS_FAILED]
        message:
          type: string
        retryable:
          type: boolean

    PracticeSessionEventRequest:
      type: object
      required: [clientEventId, kind, occurredAt]
      description: |
        Practice-session event. Idempotency for this endpoint is enforced via
        `clientEventId` (spec D-6); the request must NOT carry an
        `Idempotency-Key` header. `clientEventId` is unique per session.
      properties:
        clientEventId:
          type: string
          description: Client-generated event id; unique per session.
        kind:
          type: string
          enum: [answer_submitted, hint_requested, turn_skipped, session_paused, session_resumed, tts_chunk_started, tts_chunk_played, barge_in_detected, assistant_context_committed]
        occurredAt:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
          description: Event-kind-specific payload (e.g., `{ turnId, answerText }` for `answer_submitted`).

    AssistantAction:
      type: object
      required: [type, sessionStatus, provenance]
      description: |
        AI-generated next assistant action. Spec §4.6 requires `provenance`.
        Non-scoring actions emit `provenance.rubricVersion = "not_applicable"`.
      properties:
        type:
          type: string
          enum: [ask_question, ask_follow_up, show_hint, session_wait, session_completed]
        turnId:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        questionText:
          oneOf:
            - type: string
            - type: 'null'
        hint:
          oneOf:
            - type: string
            - type: 'null'
        sessionStatus:
          $ref: '#/components/schemas/SessionStatus'
        provenance:
          $ref: '#/components/schemas/GenerationProvenance'

    SessionEventResult:
      type: object
      required: [acknowledged, session, assistantAction]
      properties:
        acknowledged:
          type: boolean
        session:
          $ref: '#/components/schemas/PracticeSession'
        assistantAction:
          $ref: '#/components/schemas/AssistantAction'

    CompletePracticeSessionRequest:
      type: object
      required: [clientCompletedAt]
      properties:
        clientCompletedAt:
          type: string
          format: date-time

    ReportWithJob:
      type: object
      required: [reportId, job]
      properties:
        reportId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'

    # ----- Reports / question review -----
    DimensionResult:
      type: object
      required: [status, confidence]
      properties:
        status:
          $ref: '#/components/schemas/DimensionStatus'
        confidence:
          $ref: '#/components/schemas/Confidence'

    ReportHighlight:
      type: object
      required: [dimension, evidence, confidence]
      properties:
        dimension:
          type: string
        evidence:
          type: string
        confidence:
          $ref: '#/components/schemas/Confidence'

    ReportIssue:
      type: object
      required: [dimension, evidence, confidence]
      properties:
        dimension:
          type: string
        evidence:
          type: string
        confidence:
          $ref: '#/components/schemas/Confidence'

    ReportNextAction:
      type: object
      required: [type, label]
      properties:
        type:
          type: string
          enum: [retry_current_round, next_round, review_evidence]
        label:
          type: string

    QuestionAssessment:
      type: object
      required: [turnId, questionIntent, dimensionResults, reviewStatus, includedInRetryPlan]
      properties:
        turnId:
          type: string
          format: uuid
        questionIntent:
          type: string
        dimensionResults:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DimensionResult'
        reviewStatus:
          $ref: '#/components/schemas/QuestionReviewStatus'
        includedInRetryPlan:
          type: boolean

    FeedbackReport:
      type: object
      required: [id, sessionId, targetJobId, status, createdAt, updatedAt]
      description: |
        Evidence-based feedback report. AI-generated; `provenance` is required
        once `status == ready` per spec §4.6. While generating, the placeholder
        record still returns 200 (per `B2 openapi-v1-contract §11.1`).
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        targetJobId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ReportStatus'
        errorCode:
          oneOf:
            - $ref: '#/components/schemas/ApiErrorCode'
            - type: 'null'
          description: |
            Populated only when `status == failed`. Carries the B1 error code
            (typically the `AI_*` family) so clients can render a failure state.
        preparednessLevel:
          oneOf:
            - $ref: '#/components/schemas/ReadinessTier'
            - type: 'null'
        highlights:
          type: array
          items:
            $ref: '#/components/schemas/ReportHighlight'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ReportIssue'
        nextActions:
          type: array
          items:
            $ref: '#/components/schemas/ReportNextAction'
        questionAssessments:
          type: array
          items:
            $ref: '#/components/schemas/QuestionAssessment'
        retryFocusTurnIds:
          type: array
          items:
            type: string
            format: uuid
        provenance:
          oneOf:
            - $ref: '#/components/schemas/GenerationProvenance'
            - type: 'null'
          description: Required once `status == ready` per spec §4.6.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedFeedbackReport:
      allOf:
        - $ref: '#/components/schemas/PaginatedEnvelope'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/FeedbackReport'

    # ----- Resume tailor -----
    RequestResumeTailorRequest:
      type: object
      required: [targetJobId, resumeAssetId, mode]
      properties:
        targetJobId:
          type: string
          format: uuid
        resumeAssetId:
          type: string
          format: uuid
        mode:
          type: string
          enum: [gap_review, bullet_suggestions]

    ResumeTailorBulletSuggestion:
      type: object
      required: [originalBullet, suggestedBullet, reason]
      properties:
        originalBullet:
          type: string
        suggestedBullet:
          type: string
        reason:
          type: string

    ResumeTailorMatchSummary:
      type: object
      description: AI-generated; `provenance` reachable from the parent `ResumeTailorRun`.
      properties:
        strengths:
          type: array
          items:
            type: string
        gaps:
          type: array
          items:
            type: string

    ResumeTailorRun:
      type: object
      required: [id, status, targetJobId, resumeAssetId, createdAt, updatedAt]
      description: |
        AI resume-tailoring run. Per spec §4.6 must carry `provenance` once
        `status == ready`.
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, generating, ready, failed]
        targetJobId:
          type: string
          format: uuid
        resumeAssetId:
          type: string
          format: uuid
        matchSummary:
          oneOf:
            - $ref: '#/components/schemas/ResumeTailorMatchSummary'
            - type: 'null'
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/ResumeTailorBulletSuggestion'
        provenance:
          oneOf:
            - $ref: '#/components/schemas/GenerationProvenance'
            - type: 'null'
          description: Required once `status == ready` per spec §4.6.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ResumeTailorRunWithJob:
      type: object
      required: [tailorRunId, job]
      properties:
        tailorRunId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'

    # ----- Debriefs -----
    DebriefQuestionInput:
      type: object
      required: [questionText, myAnswerSummary]
      properties:
        questionText:
          type: string
        myAnswerSummary:
          type: string
        interviewerReaction:
          type: string

    DebriefQuestion:
      type: object
      required: [questionText, myAnswerSummary]
      properties:
        questionText:
          type: string
        myAnswerSummary:
          type: string
        interviewerReaction:
          type: string
        aiAnalysis:
          oneOf:
            - type: string
            - type: 'null'

    DebriefRiskItem:
      type: object
      required: [label, severity]
      properties:
        label:
          type: string
        severity:
          type: string
          enum: [low, medium, high]

    DebriefNextRoundChecklistItem:
      type: object
      required: [label]
      properties:
        label:
          type: string
        rationale:
          type: string

    CreateDebriefRequest:
      type: object
      required: [targetJobId, roundType, language, questions]
      properties:
        targetJobId:
          type: string
          format: uuid
        roundType:
          $ref: '#/components/schemas/DebriefRoundType'
        interviewerRole:
          $ref: '#/components/schemas/InterviewerRole'
        language:
          type: string
        questions:
          type: array
          items:
            $ref: '#/components/schemas/DebriefQuestionInput'
        notes:
          type: string

    Debrief:
      type: object
      required: [id, targetJobId, status, roundType, createdAt, updatedAt]
      description: |
        Real-interview debrief. P0 keeps the real-interview reconstruction and
        review surface focused on questions, risks and next practice signals.
        Full follow-up suggestions and thank-you drafts are P1 optional/hidden
        fields and must not be required for P0 clients. Spec §4.6: when
        `status == completed`, must carry `GenerationProvenance`.
      properties:
        id:
          type: string
          format: uuid
        targetJobId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/DebriefStatus'
        roundType:
          $ref: '#/components/schemas/DebriefRoundType'
        interviewerRole:
          oneOf:
            - $ref: '#/components/schemas/InterviewerRole'
            - type: 'null'
        questions:
          type: array
          items:
            $ref: '#/components/schemas/DebriefQuestion'
        riskItems:
          type: array
          items:
            $ref: '#/components/schemas/DebriefRiskItem'
        nextRoundChecklist:
          type: array
          description: P1 optional/hidden full follow-up suggestions; not required for P0.
          items:
            $ref: '#/components/schemas/DebriefNextRoundChecklistItem'
        thankYouDraft:
          description: P1 optional/hidden thank-you draft; not required for P0.
          oneOf:
            - type: string
            - type: 'null'
        provenance:
          oneOf:
            - $ref: '#/components/schemas/GenerationProvenance'
            - type: 'null'
          description: Required once `status == completed` per spec §4.6.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DebriefWithJob:
      type: object
      required: [debriefId, job]
      properties:
        debriefId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'

    SuggestedDebriefQuestion:
      type: object
      required: [questionText, whyLikelyAsked, source]
      properties:
        stage:
          oneOf:
            - type: string
            - type: 'null'
        questionText:
          type: string
        whyLikelyAsked:
          type: string
        source:
          $ref: '#/components/schemas/DebriefQuestionSource'

    SuggestDebriefQuestionsRequest:
      type: object
      required: [targetJobId, language]
      properties:
        targetJobId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        resumeVersionId:
          type: string
          format: uuid
        language:
          type: string
        count:
          type: integer
          format: int32
          minimum: 1
          maximum: 10
          default: 6

    SuggestDebriefQuestionsResponse:
      type: object
      required: [suggestions]
      properties:
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/SuggestedDebriefQuestion'

    # ----- Async Job -----
    Job:
      type: object
      required: [id, jobType, status, resourceType, resourceId, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        jobType:
          $ref: '#/components/schemas/JobType'
        status:
          $ref: '#/components/schemas/JobStatus'
        resourceType:
          $ref: '#/components/schemas/ResourceType'
        resourceId:
          type: string
          format: uuid
        errorCode:
          oneOf:
            - $ref: '#/components/schemas/ApiErrorCode'
            - type: 'null'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ----- Privacy -----
    PrivacyRequest:
      type: object
      required: [id, type, status, requestedAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/PrivacyRequestType'
        status:
          $ref: '#/components/schemas/PrivacyRequestStatus'
        requestedAt:
          type: string
          format: date-time
        completedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        artifactUrl:
          oneOf:
            - type: string
              format: uri
            - type: 'null'
          description: Object-storage download URL; null until status == completed.

    PrivacyRequestWithJob:
      type: object
      required: [privacyRequestId, job]
      properties:
        privacyRequestId:
          type: string
          format: uuid
        job:
          $ref: '#/components/schemas/Job'

    # ----- JobMatch (jd_match) -----
    JobMatchProfileSourceCounts:
      type: object
      required: [resumes, jds, mocks, debriefs]
      description: |
        Aggregated counts of inputs that fed the JD-match profile snapshot.
        Driven by the future `backend-jobs-recommendations` subspec.
      properties:
        resumes:
          type: integer
          format: int32
          minimum: 0
        jds:
          type: integer
          format: int32
          minimum: 0
        mocks:
          type: integer
          format: int32
          minimum: 0
        debriefs:
          type: integer
          format: int32
          minimum: 0

    JobMatchProfile:
      type: object
      required: [displayName, skills, sources]
      description: |
        Candidate profile snapshot used by the JD-match agent. Returned by
        `getJobMatchProfile`. Aggregated server-side; the frontend never derives
        the snapshot from individual resumes.
      properties:
        displayName:
          type: string
          description: Candidate display name; never the raw email.
        avatarUrl:
          oneOf:
            - type: string
              format: uri
            - type: 'null'
        headline:
          oneOf:
            - type: string
            - type: 'null'
        yearsOfExperience:
          oneOf:
            - type: integer
              format: int32
              minimum: 0
            - type: 'null'
        locationText:
          oneOf:
            - type: string
            - type: 'null'
        compensationText:
          oneOf:
            - type: string
            - type: 'null'
        skills:
          type: array
          items:
            type: string
        sources:
          $ref: '#/components/schemas/JobMatchProfileSourceCounts'

    JobMatchAgentStatus:
      type: string
      description: |
        Agent scan status. `idle` = no scan running; `scanning` = scan in
        progress; `error` = last scan failed and operator action is needed.
      enum: [idle, scanning, error]

    AgentScanStatus:
      type: object
      required: [status]
      description: |
        Background JD-match agent status returned by `getAgentScanStatus`.
        Frontend reads only on JD-match entry and tab returns; no SSE/WebSocket
        per plan D-10.
      properties:
        status:
          $ref: '#/components/schemas/JobMatchAgentStatus'
        lastScanAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        nextScanAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        message:
          oneOf:
            - type: string
            - type: 'null'
          description: Optional human-readable hint (only used when status == error).

    JobMatchFitFooter:
      type: object
      required: [must, total, plus, totalPlus]
      description: |
        Mirrors `ui-design/src/screen-jd-match.jsx::JobMatchCard` fit footer:
        "must X/Y · plus X/Y". Backend-only computed.
      properties:
        must:
          type: integer
          format: int32
          minimum: 0
        total:
          type: integer
          format: int32
          minimum: 0
        plus:
          type: integer
          format: int32
          minimum: 0
        totalPlus:
          type: integer
          format: int32
          minimum: 0

    JobMatchRecommendation:
      type: object
      required: [id, title, company, location, score, fit, reasons, risks, highlights, posted, seen, saved, provenance]
      description: |
        AI-generated JD-match recommendation per spec §4.6. `score`, `reasons`,
        `risks`, `highlights`, `interviewHypotheses`, and `networkNote` are all
        backend-derived; the frontend never computes them. `provenance` is
        required and follows the GenerationProvenance contract.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        company:
          type: string
        companyTag:
          oneOf:
            - type: string
            - type: 'null'
        level:
          oneOf:
            - type: string
            - type: 'null'
        location:
          type: string
        comp:
          oneOf:
            - type: string
            - type: 'null'
        posted:
          type: string
          description: Backend-rendered relative time (e.g., "2 days ago" / "2 天前").
        score:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        fit:
          $ref: '#/components/schemas/JobMatchFitFooter'
        reasons:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        seen:
          type: boolean
        saved:
          type: boolean
        sourceUrl:
          oneOf:
            - type: string
              format: uri
            - type: 'null'
        sourceLabel:
          oneOf:
            - type: string
            - type: 'null'
          description: Display label for the source (e.g., "linkedin.com/jobs/123").
        networkNote:
          oneOf:
            - type: string
            - type: 'null'
        similarInterviewers:
          oneOf:
            - type: integer
              format: int32
              minimum: 0
            - type: 'null'
        interviewHypotheses:
          type: array
          items:
            type: string
        provenance:
          $ref: '#/components/schemas/GenerationProvenance'

    PaginatedJobMatchRecommendation:
      allOf:
        - $ref: '#/components/schemas/PaginatedEnvelope'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/JobMatchRecommendation'

    AddToWatchlistRequest:
      type: object
      required: [jobMatchId]
      properties:
        jobMatchId:
          type: string
          format: uuid

    WatchlistItemTone:
      type: string
      description: Visual tone driving watchlist row colour per ui-design tone tokens.
      enum: [ok, warn, muted]

    WatchlistItem:
      type: object
      required: [id, linkedJobMatchId, title, company, tone, addedAt]
      description: |
        A single watchlist row. `linkedJobMatchId` powers the chevron handoff to
        the Recommended tab; the frontend must read it from the schema rather
        than string-matching ids.
      properties:
        id:
          type: string
          format: uuid
        linkedJobMatchId:
          type: string
          format: uuid
        label:
          oneOf:
            - type: string
            - type: 'null'
          description: Optional candidate-supplied label; never logged.
        title:
          type: string
        company:
          type: string
        tone:
          $ref: '#/components/schemas/WatchlistItemTone'
        addedAt:
          type: string
          format: date-time
        change:
          oneOf:
            - type: string
            - type: 'null'
          description: Backend-rendered change signal (e.g., "JD updated · check diff").

    WatchlistResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistItem'

    MarkNotRelevantReason:
      type: string
      description: |
        Reason enum for `markJobNotRelevant`. ui-design does not surface a
        reason picker, so the frontend transmits `not_relevant` by default and
        backend mapping treats unknown values as `other` per spec §4.4
        additive-only.
      enum: [not_relevant, wrong_level, wrong_location, wrong_compensation, other]

    MarkNotRelevantRequest:
      type: object
      required: [reason]
      properties:
        reason:
          $ref: '#/components/schemas/MarkNotRelevantReason'
        freeNote:
          oneOf:
            - type: string
            - type: 'null'
          description: Optional candidate note; never logged or surfaced in URLs.

    MarkNotRelevantResult:
      type: object
      required: [jobMatchId, dismissedAt]
      properties:
        jobMatchId:
          type: string
          format: uuid
        dismissedAt:
          type: string
          format: date-time

    SearchJobsFilters:
      type: object
      description: |
        Optional structured search filters. Backend may ignore unknown keys per
        additive-only rules; frontend currently exposes only client-side chip
        filters for the result list (see plan §3.7).
      properties:
        location:
          oneOf:
            - type: string
            - type: 'null'
        remote:
          oneOf:
            - type: boolean
            - type: 'null'
        minScore:
          oneOf:
            - type: integer
              format: int32
              minimum: 0
              maximum: 100
            - type: 'null'

    SearchJobsRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: Natural-language candidate query; never logged or persisted in URL/localStorage.
        filters:
          oneOf:
            - $ref: '#/components/schemas/SearchJobsFilters'
            - type: 'null'
        profileSnapshotId:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
          description: Optional snapshot id; the actual profile is fetched server-side.

    SearchJobsResponse:
      type: object
      required: [searchRunId, items]
      properties:
        searchRunId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobMatchRecommendation'

    SavedSearch:
      type: object
      required: [id, label, query, createdAt]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          description: Candidate-supplied label; never logged or surfaced in URLs.
        query:
          type: string
        filters:
          oneOf:
            - $ref: '#/components/schemas/SearchJobsFilters'
            - type: 'null'
        newJobsCount:
          oneOf:
            - type: integer
              format: int32
              minimum: 0
            - type: 'null'
        lastRunAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        createdAt:
          type: string
          format: date-time

    SavedSearchesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SavedSearch'

    CreateSavedSearchRequest:
      type: object
      required: [label, query]
      properties:
        label:
          type: string
        query:
          type: string
        filters:
          oneOf:
            - $ref: '#/components/schemas/SearchJobsFilters'
            - type: 'null'

    MarketSignalTone:
      type: string
      description: Tone token driving the market-signal card colour.
      enum: [ok, warn, muted]

    MarketSignal:
      type: object
      required: [k, v, tone]
      description: |
        Single market-signal card per ui-design 4-card grid. `k` is the metric
        label, `v` is the headline value, `d` is an optional delta annotation.
      properties:
        k:
          type: string
        v:
          type: string
        d:
          oneOf:
            - type: string
            - type: 'null'
        tone:
          $ref: '#/components/schemas/MarketSignalTone'

    MarketSignalsResponse:
      type: object
      required: [signals]
      properties:
        signals:
          type: array
          items:
            $ref: '#/components/schemas/MarketSignal'
        asOf:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
