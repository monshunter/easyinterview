openapi: 3.1.0
info:
  title: easyinterview API
  version: 1.0.0
  summary: HTTP contract for easyinterview P0 — JD onboarding, mock interview, evidence-based review.
  description: |
    Single source of truth for all easyinterview HTTP endpoints. Owned by spec
    `docs/spec/openapi-v1-contract/spec.md` (B2). Any change must follow the
    additive-only / breaking-change rules locked in spec §4.4 and ADR review flow.

    Auth path follows ADR-Q1: first-party session cookie minted by
    `GET /api/v1/auth/email/verify` after the magic-link challenge issued by
    `POST /api/v1/auth/email/start`. `Authorization: Bearer` is **not** a P0
    default scheme.
  contact:
    name: easyinterview engineering
    url: https://github.com/monshunter/easyinterview

servers:
  - url: /api/v1
    description: API v1 base path. All endpoints in this document are mounted under this prefix.

tags:
  - name: Auth
    description: Session bootstrap (magic link), session teardown, runtime user context, and public runtime config.
  - name: Uploads
    description: Pre-signed object-storage URLs for resume / JD attachment uploads.
  - name: Profile
    description: Candidate profile (CandidateProfile) and experience cards.
  - name: Resumes
    description: Resume asset registration and retrieval.
  - name: TargetJobs
    description: JD import, target-job workspace state, and per-target metadata.
  - name: PracticePlans
    description: Practice plans created from target-job rounds, report retry plans, or debrief replay.
  - name: PracticeSessions
    description: Mock-interview sessions, session events, and session completion.
  - name: Reports
    description: Evidence-based feedback reports.
  - name: ResumeTailor
    description: Resume tailoring runs (per-target customised resumes).
  - name: Debriefs
    description: Real-interview debrief intake and follow-up.
  - name: Jobs
    description: Async job status polling for `202 Accepted` workflows.
  - name: Privacy
    description: Privacy export / deletion requests (P0 export returns 501 per ADR-Q5).
  - name: JobMatch
    description: |
      JD Match recommendations, natural-language web search, watchlist, saved
      searches, market signals, profile snapshot, and background agent scan
      status. Frontend-first contract per spec D-1: real backend handlers /
      candidate-pool fetchers / search runtime are owned by the future
      `backend-jobs-recommendations` subspec; v1.0.0 freeze ships fixture-backed
      operationId schemas only.

# Document-level security: every endpoint requires a valid first-party session
# cookie unless the operation overrides with `security: []` (public endpoints).
security:
  - sessionCookie: []

paths:
  /me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Get current user context
      description: Returns minimal context for the authenticated user (id, masked email, display name, language preferences).
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Current user context.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContext'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    delete:
      tags: [Auth]
      operationId: deleteMe
      summary: Request account deletion for the current user
      description: |
        Protected endpoint per ADR-Q5. Equivalent to requesting a privacy
        deletion for the current user and must dedupe repeated active requests
        by `Idempotency-Key`, returning the same active `privacy_delete` job or
        an equivalent terminal result.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '202':
          description: Account deletion request accepted; asynchronous privacy deletion job created or reused.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyRequestWithJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /auth/email/start:
    post:
      tags: [Auth]
      operationId: startAuthEmailChallenge
      summary: Issue a passwordless email magic-link challenge
      description: |
        Public endpoint per ADR-Q1. Sends a single-use magic link to the
        supplied email. Rate limited per ADR-Q1 risk-control baseline; does
        **not** carry an `Idempotency-Key` (rate-limit + challenge TTL handle
        deduplication).
      security: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthEmailStartRequest'
      responses:
        '202':
          description: Challenge accepted; verification email is being dispatched asynchronously.
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /auth/email/verify:
    get:
      tags: [Auth]
      operationId: verifyAuthEmailChallenge
      summary: Verify magic-link challenge and mint a session cookie
      description: |
        Public endpoint per ADR-Q1. Consumes the single-use magic-link token
        and, on success, sets the first-party session cookie via `Set-Cookie`.
        The response body conveys non-secret hints; the cookie value never
        appears in the JSON body.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: One-shot challenge token issued by `startAuthEmailChallenge`.
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Token valid; session cookie set on the response.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Set-Cookie:
              description: First-party session cookie per ADR-Q1 (`HttpOnly; Secure; SameSite=Lax`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Invalidate the current session
      description: Revokes the active session and clears the session cookie.
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '204':
          description: Session revoked.
          headers:
            Set-Cookie:
              description: Session cookie cleared (`Max-Age=0`).
              schema:
                type: string
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /uploads/presign:
    post:
      tags: [Uploads]
      operationId: createUploadPresign
      summary: Issue a pre-signed object-storage upload URL
      description: |
        Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Returns
        a short-lived URL the client uploads to directly; the server never
        proxies the file body.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadPresignRequest'
      responses:
        '201':
          description: Pre-signed URL issued.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadPresign'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /profiles/me:
    get:
      tags: [Profile]
      operationId: getMyProfile
      summary: Get my candidate profile
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Candidate profile.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateProfile'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    patch:
      tags: [Profile]
      operationId: updateMyProfile
      summary: Update my candidate profile (Lite)
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateProfile'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /profiles/me/experience-cards:
    get:
      tags: [Profile]
      operationId: listExperienceCards
      summary: List my experience cards (cursor-paginated)
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Paginated experience cards.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedExperienceCard'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags: [Profile]
      operationId: createExperienceCard
      summary: Create an experience card
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExperienceCardRequest'
      responses:
        '201':
          description: Experience card created.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperienceCard'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /profiles/me/experience-cards/{cardId}:
    patch:
      tags: [Profile]
      operationId: updateExperienceCard
      summary: Update an experience card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExperienceCardRequest'
      responses:
        '200':
          description: Updated experience card.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperienceCard'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes:
    get:
      tags: [Resumes]
      operationId: listResumes
      summary: List resume assets
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Resume assets.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResumeAsset'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

    post:
      tags: [Resumes]
      operationId: registerResume
      summary: Register an uploaded resume file and trigger parsing
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Long-running parse → 202 + Job (`resume_parse`).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterResumeRequest'
      responses:
        '202':
          description: Resume registered; parse job dispatched.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeAssetWithJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resume-versions:
    post:
      tags: [Resumes]
      operationId: branchResumeVersion
      summary: Branch a resume version
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. `seedStrategy=ai_select` may dispatch a resume-tailor async job.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchResumeVersionRequest'
      responses:
        '201':
          description: Resume version branch created synchronously.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeVersion'
        '202':
          description: Resume version branch accepted; AI seed job dispatched.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResumeVersionAccepted'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resume-versions/{resumeVersionId}:
    get:
      tags: [Resumes]
      operationId: getResumeVersion
      summary: Get a resume version
      parameters:
        - name: resumeVersionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Resume version.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeVersion'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

    patch:
      tags: [Resumes]
      operationId: updateResumeVersion
      summary: Update editable resume version fields
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`.
      parameters:
        - name: resumeVersionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResumeVersionRequest'
      responses:
        '200':
          description: Resume version updated.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeVersion'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resume-versions/{resumeVersionId}/exports:
    post:
      tags: [Resumes]
      operationId: exportResumeVersion
      summary: Export a resume version
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. P0 is intentionally unavailable and returns 501 with `RESUME_EXPORT_NOT_AVAILABLE`.
      parameters:
        - name: resumeVersionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '501':
          description: Resume version export disabled in P0 (`RESUME_EXPORT_NOT_AVAILABLE`).
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resume-versions/{resumeVersionId}/suggestions/{suggestionId}/accept:
    post:
      tags: [Resumes]
      operationId: acceptResumeTailorSuggestion
      summary: Accept a resume-tailor suggestion
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`.
      parameters:
        - name: resumeVersionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: suggestionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Suggestion accepted and version snapshot updated.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeVersion'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resume-versions/{resumeVersionId}/suggestions/{suggestionId}/reject:
    post:
      tags: [Resumes]
      operationId: rejectResumeTailorSuggestion
      summary: Reject a resume-tailor suggestion
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`.
      parameters:
        - name: resumeVersionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: suggestionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Suggestion rejected and version snapshot updated.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeVersion'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes/{resumeAssetId}:
    get:
      tags: [Resumes]
      operationId: getResume
      summary: Get a resume asset and parse status
      parameters:
        - name: resumeAssetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Resume asset.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeAsset'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes/{resumeAssetId}/archive:
    post:
      tags: [Resumes]
      operationId: archiveResumeAsset
      summary: Archive a resume asset
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Archives are soft-hide actions, not privacy deletion jobs.
      parameters:
        - name: resumeAssetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '202':
          description: Resume asset archived.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeAsset'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes/{resumeAssetId}/versions:
    get:
      tags: [Resumes]
      operationId: listResumeVersions
      summary: List versions for a resume asset
      parameters:
        - name: resumeAssetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Resume versions.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResumeVersion'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /targets/import:
    post:
      tags: [TargetJobs]
      operationId: importTargetJob
      summary: Import a target job from URL / text / file / manual form
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Long-running parse → 202 + Job (`target_import`).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportTargetJobRequest'
      responses:
        '202':
          description: Target-job import accepted; parse job dispatched.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetJobWithJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /targets:
    get:
      tags: [TargetJobs]
      operationId: listTargetJobs
      summary: List target jobs (cursor-paginated)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TargetJobStatus'
        - name: analysisStatus
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TargetJobParseStatus'
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
