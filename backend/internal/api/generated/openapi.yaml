  /privacy/exports:
    post:
      tags: [Privacy]
      operationId: requestPrivacyExport
      summary: Request a privacy data export (P0 not implemented — returns 501)
      description: |
        Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. **P0
        explicit exception per ADR-Q5 + spec D-12**: this endpoint must return
        `501 Not Implemented` with `error.code = "PRIVACY_EXPORT_NOT_AVAILABLE"`.
        The endpoint shape is locked at v1.0.0 so the P1 switch to
        `202 + PrivacyRequestWithJob` is treated as additive (per spec §4.4).
        This is one of the two explicit P0 501 export exceptions in the
        v1.0.0 contract.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
