openapi: 3.1.0
info:
  title: easyinterview API
  version: 1.0.0
  summary: HTTP contract for easyinterview P0 — JD onboarding, mock interview, evidence-based review.
  description: |
    Single source of truth for all easyinterview HTTP endpoints. Owned by spec
    `docs/spec/openapi-v1-contract/spec.md` (B2). Any change must follow the
    additive-only / breaking-change rules locked in spec §4.4 and ADR review flow.

    Auth path follows ADR-Q1: first-party session cookie minted by
    `GET /api/v1/auth/email/verify` after the email-code challenge issued by
    `POST /api/v1/auth/email/start`. `Authorization: Bearer` is **not** a P0
    default scheme.
  contact:
    name: easyinterview engineering
    url: https://github.com/monshunter/easyinterview

servers:
  - url: /api/v1
    description: API v1 base path. All endpoints in this document are mounted under this prefix.

tags:
  - name: Auth
    description: Session bootstrap (email code), session teardown, runtime user context, and public runtime config.
  - name: Uploads
    description: Pre-signed object-storage URLs for resume / JD attachment uploads.
  - name: Resumes
    description: Resume asset registration and retrieval.
  - name: TargetJobs
    description: JD import, target-job workspace state, and per-target metadata.
  - name: PracticePlans
    description: Practice plans created from target-job rounds or report retry plans.
  - name: PracticeSessions
    description: Mock-interview sessions, session events, and session completion.
  - name: Reports
    description: Evidence-based feedback reports.
  - name: ResumeTailor
    description: Resume tailoring runs (per-target customised resumes).
  - name: Jobs
    description: Async job status polling for `202 Accepted` workflows.
  - name: Privacy
    description: Privacy export / deletion requests (P0 export returns 501 per ADR-Q5).

# Document-level security: every endpoint requires a valid first-party session
# cookie unless the operation overrides with `security: []` (public endpoints).
security:
  - sessionCookie: []

paths:
  /me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Get current user context
      description: Returns minimal context for the authenticated user (id, masked email, display name, language preferences, profile completion state).
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Current user context.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContext'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    patch:
      tags: [Auth]
      operationId: completeMyProfile
      summary: Complete first-login profile setup
      description: |
        Protected endpoint for first-login profile setup only. Stores the
        user's non-unique display name and terms acceptance, then returns the
        updated current-user context. Candidate profile, resume, JD, and
        interview preferences are managed by their own domain endpoints.
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteProfileRequest'
      responses:
        '200':
          description: First-login profile setup completed.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContext'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    delete:
      tags: [Auth]
      operationId: deleteMe
      summary: Request account deletion for the current user
      description: |
        Protected endpoint per ADR-Q5. Equivalent to requesting a privacy
        deletion for the current user and must dedupe repeated active requests
        by `Idempotency-Key`, returning the same active `privacy_delete` job or
        an equivalent terminal result.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '202':
          description: Account deletion request accepted; asynchronous privacy deletion job created or reused.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyRequestWithJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /auth/email/start:
    post:
      tags: [Auth]
      operationId: startAuthEmailChallenge
      summary: Issue an email-code challenge
      description: |
        Public endpoint per ADR-Q1. Sends a single-use 6-digit code to the
        supplied email. This is the only sign-in entry: existing emails log in
        to the existing account, and new emails create an account after code
        verification. The start response must not reveal whether the email is
        already registered. Rate limited per ADR-Q1 risk-control baseline; does
        **not** carry an `Idempotency-Key` (rate-limit + challenge TTL handle
        deduplication).
      security: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthEmailStartRequest'
      responses:
        '202':
          description: Challenge accepted; verification email is being dispatched asynchronously.
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /auth/email/verify:
    get:
      tags: [Auth]
      operationId: verifyAuthEmailChallenge
      summary: Verify email-code challenge and mint a session cookie
      description: |
        Public endpoint per ADR-Q1. Consumes the single-use 6-digit email code
        and, on success, sets the first-party session cookie via `Set-Cookie`.
        The response body conveys non-secret hints; the cookie value never
        appears in the JSON body. The wire query name remains `token` for B2
        operation stability, but the value is the 6-digit code shown in email.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            minLength: 6
            maxLength: 6
            pattern: '^[0-9]{6}$'
          description: Six-digit one-shot email code issued by `startAuthEmailChallenge`.
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Token valid; session cookie set on the response.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Set-Cookie:
              description: First-party session cookie per ADR-Q1 (`HttpOnly; Secure; SameSite=Lax`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Invalidate the current session
      description: Revokes the active session and clears the session cookie.
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '204':
          description: Session revoked.
          headers:
            Set-Cookie:
              description: Session cookie cleared (`Max-Age=0`).
              schema:
                type: string
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /uploads/presign:
    post:
      tags: [Uploads]
      operationId: createUploadPresign
      summary: Issue a pre-signed object-storage upload URL
      description: |
        Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Returns
        a short-lived URL the client uploads to directly; the server never
        proxies the file body.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadPresignRequest'
      responses:
        '201':
          description: Pre-signed URL issued.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadPresign'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes:
    get:
      tags: [Resumes]
      operationId: listResumes
      summary: List resumes
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Resumes.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResume'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

    post:
      tags: [Resumes]
      operationId: registerResume
      summary: Register an uploaded or pasted resume and trigger parsing
      description: Side-effect endpoint per spec D-6 - requires `Idempotency-Key`. Long-running parse leads to 202 + Job (`resume_parse`).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterResumeRequest'
      responses:
        '202':
          description: Resume registered; parse job dispatched.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeWithJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes/{resumeId}:
    get:
      tags: [Resumes]
      operationId: getResume
      summary: Get a resume and parse status
      parameters:
        - name: resumeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Resume.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resume'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

    patch:
      tags: [Resumes]
      operationId: updateResume
      summary: Update editable resume fields (overwrite this resume)
      description: Side-effect endpoint per spec D-6 - requires `Idempotency-Key`. Overwrites `structuredProfile` / `displayName` on the existing resume (D-20 save accepted rewrites by overwrite).
      parameters:
        - name: resumeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResumeRequest'
      responses:
        '200':
          description: Resume updated.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resume'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes/{resumeId}/duplicate:
    post:
      tags: [Resumes]
      operationId: duplicateResume
      summary: Duplicate a resume (save as a new resume)
      description: Side-effect endpoint per spec D-6 - requires `Idempotency-Key`. Copies the source resume read-only snapshot and applies the supplied `structuredProfile`, saving a new resume (D-20 save accepted rewrites as new).
      parameters:
        - name: resumeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicateResumeRequest'
      responses:
        '201':
          description: New resume created from the source resume.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resume'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes/{resumeId}/source:
    get:
      tags: [Resumes]
      operationId: getResumeSource
      summary: Get the uploaded PDF source for inline resume preview
      description: Read-only endpoint for upload-backed PDF resumes. Paste, Markdown, text, missing, archived, or cross-user resumes return 404.
      parameters:
        - name: resumeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Uploaded PDF source.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes/{resumeId}/archive:
    post:
      tags: [Resumes]
      operationId: archiveResume
      summary: Archive a resume
      description: Side-effect endpoint per spec D-6 - requires `Idempotency-Key`. Archives are soft-hide actions, not privacy deletion jobs.
      parameters:
        - name: resumeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '202':
          description: Resume archived.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resume'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /resumes/{resumeId}/exports:
    post:
      tags: [Resumes]
      operationId: exportResume
      summary: Export a resume
      description: Side-effect endpoint per spec D-6 - requires `Idempotency-Key`. P0 is intentionally unavailable and returns 501 with `RESUME_EXPORT_NOT_AVAILABLE`.
      parameters:
        - name: resumeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '501':
          description: Resume export disabled in P0 (`RESUME_EXPORT_NOT_AVAILABLE`).
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /targets/import:
    post:
      tags: [TargetJobs]
      operationId: importTargetJob
      summary: Import a target job from URL / text / file / manual form
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Long-running parse → 202 + Job (`target_import`).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportTargetJobRequest'
      responses:
        '202':
          description: Target-job import accepted; parse job dispatched.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetJobWithJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /targets:
    get:
      tags: [TargetJobs]
      operationId: listTargetJobs
      summary: List target jobs (cursor-paginated)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TargetJobStatus'
        - name: analysisStatus
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TargetJobParseStatus'
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Paginated target jobs.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTargetJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /targets/{targetJobId}:
    get:
      tags: [TargetJobs]
      operationId: getTargetJob
      summary: Get a target-job workspace
      parameters:
        - name: targetJobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Target-job workspace.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    patch:
      tags: [TargetJobs]
      operationId: updateTargetJob
      summary: Update target-job lifecycle status or metadata
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`.
      parameters:
        - name: targetJobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTargetJobRequest'
      responses:
        '200':
          description: Updated target job.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /targets/{targetJobId}/archive:
    post:
      tags: [TargetJobs]
      operationId: archiveTargetJob
      summary: Archive a target job
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Soft-hides the target job from list/detail reads by setting `deleted_at`.
      parameters:
        - name: targetJobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '202':
          description: Target job archived.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetJob'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /practice/plans:
    post:
      tags: [PracticePlans]
      operationId: createPracticePlan
      summary: Create a practice plan
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePracticePlanRequest'
      responses:
        '201':
          description: Practice plan created.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticePlan'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /practice/plans/{planId}:
    get:
      tags: [PracticePlans]
      operationId: getPracticePlan
      summary: Get a practice plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Practice plan detail.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticePlan'
        default:
          $ref: '#/components/responses/ApiErrorResponse'

  /practice/sessions:
    get:
      tags: [PracticeSessions]
      operationId: listPracticeSessions
      summary: List practice sessions (cursor-paginated)
      description: |
        List practice sessions for the authenticated user, optionally filtered
        by `targetJobId` and `status`. Powers target-job session history and
        report replay entry points.
      parameters:
        - name: targetJobId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SessionStatus'
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - $ref: '#/components/parameters/XRequestID'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/XClientVersion'
      responses:
        '200':
          description: Paginated practice sessions.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPracticeSession'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags: [PracticeSessions]
      operationId: startPracticeSession
      summary: Start a practice session
      description: Side-effect endpoint per spec D-6 — requires `Idempotency-Key`. Returns 201 with the session and the first turn.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
