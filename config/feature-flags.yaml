# Feature flag baseline (P0) — current conversation/report flags
# §15.1, owned jointly by A4 secrets-and-config and F2 analytics-funnel.
#
# Schema: flags.<key>.{enabled, variant?, public}
# - enabled: dev default state. Prod overrides via PostHog (D-4).
# - variant: optional A/B label.
# - public:  whether runtime-config (D-2) may emit this flag to the frontend.
#            operator-only flags must stay public:false to avoid leaking
#            internal switches.

flags:
  report_evidence_v2_enabled:
    enabled: true
    public: true
  report_retry_plan_enabled:
    enabled: true
    variant: v1
    public: true
  readiness_signals_enabled:
    enabled: true
    public: true
  ai_fallback_model_enabled:
    enabled: true
    public: false
