feature_key: practice.session.follow_up
cases:
- id: practice.session.follow_up-zh-rag-no-direct-experience
  language: multi
  input: >-
    generation_kind=follow_up; language=zh-CN; last_question=请介绍一次 RAG
    系统实践；last_answer=我没有直接负责过 RAG，但做过检索 API 的召回率与延迟优化；
    question_intent=rag_evidence; attempt_mode=initial.
  output:
    questionText: 如果把你做过的检索 API 经验迁移到 RAG 场景，你会如何验证召回质量并控制延迟？
    questionIntent: 验证可迁移经验、质量指标与性能取舍
    branchDimension: 技术迁移与证据质量
    confidence: 0.92
  judge:
    scores:
    - dimension: followup_relevance
      value: 0.92
    - dimension: practice_depth
      value: 0.92
    - dimension: language_consistency
      value: 0.92
    reasoning:
      summary: 追问承认候选人没有直接 RAG 经历，并围绕其真实 API 经验继续深挖。
      evidence_quotes: []
- id: practice.session.follow_up-zh-next-question
  language: multi
  input: >-
    generation_kind=next_question; language=zh-CN; last_question=你如何处理过一次线上故障；
    last_answer=我说明了止损、回滚和复盘；question_intent=incident_ownership;
    follow_up_count=1; attempt_mode=initial.
  output:
    questionText: 请再介绍一次你推动跨团队技术决策的经历，重点说明分歧和最终结果。
    questionIntent: 转入跨团队影响力与决策质量
    branchDimension: 跨团队协作
    confidence: 0.78
  judge:
    scores:
    - dimension: followup_relevance
      value: 0.78
    - dimension: practice_depth
      value: 0.78
    - dimension: language_consistency
      value: 0.78
    reasoning:
      summary: 下一主问题与已覆盖的故障主题区分明确，语言和问题边界完整。
      evidence_quotes: []
- id: practice.session.follow_up-en-tradeoff
