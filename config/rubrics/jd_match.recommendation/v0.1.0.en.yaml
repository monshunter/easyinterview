feature_key: "jd_match.recommendation"
version: "v0.1.0"
language: "en"
dimensions:
  - name: "relevance_to_profile"
    weight: 0.4
    description: "Recommendations align with the candidate's profile signals and the internal jobs pool entries actually exist."
    score_levels:
      - label: "weak"
        threshold: 0.0
        description: "Off-topic suggestions, hallucinated entries, or roles unrelated to the candidate's profile."
      - label: "developing"
        threshold: 0.4
        description: "Partial alignment; a reviewer would still flag obvious mismatches in level, location, or function."
      - label: "proficient"
        threshold: 0.7
        description: "Most recommendations match the candidate's level / function / location preferences without major gaps."
      - label: "strong"
        threshold: 0.9
        description: "Recommendations feel curated; reviewers would highlight the calibration and risk callouts."
  - name: "risk_clarity"
    weight: 0.3
    description: "Risks and stretch markers are concrete, non-judgemental, and actionable for the candidate."
    score_levels:
      - label: "weak"
        threshold: 0.0
        description: "Risks are missing, vague, or read as judgemental about the candidate."
      - label: "developing"
        threshold: 0.4
        description: "Some risks named but generic; reviewer would request more specifics."
      - label: "proficient"
        threshold: 0.7
        description: "Risks are specific, sourced from the JD, and actionable."
      - label: "strong"
        threshold: 0.9
        description: "Risks read like a thoughtful peer review; candidate knows exactly how to prepare."
  - name: "actionability"
    weight: 0.3
    description: "`interviewHypotheses` and `networkNote` give the candidate a clear next step without inventing PII."
    score_levels:
      - label: "weak"
        threshold: 0.0
        description: "Empty hypotheses, or notes that name private individuals or fabricated network data."
      - label: "developing"
        threshold: 0.4
        description: "Some hypotheses exist but feel generic; aggregated network notes are inconsistent."
      - label: "proficient"
        threshold: 0.7
        description: "Most items have at least one concrete interview hypothesis grounded in the JD; notes stay aggregated."
      - label: "strong"
        threshold: 0.9
        description: "Hypotheses read like a senior coach's prep plan; notes are aggregated, non-PII, and actionable."
