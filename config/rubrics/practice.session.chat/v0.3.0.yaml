feature_key: "practice.session.chat"
version: "v0.3.0"
language: "multi"
status: "active"
dimensions:
  - name: "followup_relevance"
    weight: 0.25
    description: "The reply follows the actual conversation and the confirmed job context."
    score_levels:
      - {label: "weak", threshold: 0.0, description: "Ignores the conversation or asks an unrelated canned prompt."}
      - {label: "developing", threshold: 0.4, description: "Partly follows context but misses a material signal."}
      - {label: "proficient", threshold: 0.7, description: "Continues the conversation with relevant depth."}
      - {label: "strong", threshold: 0.9, description: "Uses the strongest available signal to move the interview forward."}
  - name: "practice_depth"
    weight: 0.2
    description: "The reply reads as a natural interviewer message without structural question metadata."
    score_levels:
      - {label: "weak", threshold: 0.0, description: "Exposes internal structure or sounds mechanical."}
      - {label: "developing", threshold: 0.4, description: "Understandable but noticeably templated."}
      - {label: "proficient", threshold: 0.7, description: "Natural, concise, and easy to answer."}
      - {label: "strong", threshold: 0.9, description: "Natural and precisely calibrated to the conversation moment."}
  - name: "language_consistency"
    weight: 0.15
    description: "The reply matches the requested language consistently."
    score_levels:
      - {label: "weak", threshold: 0.0, description: "Uses the wrong language."}
      - {label: "developing", threshold: 0.4, description: "Contains avoidable mixed-language output."}
      - {label: "proficient", threshold: 0.7, description: "Uses the requested language consistently."}
      - {label: "strong", threshold: 0.9, description: "Uses fluent, role-appropriate language throughout."}
  - name: "role_identity"
    weight: 0.4
    description: "The interviewer employer identity comes only from the persisted TargetJob and round, never from a Resume employer or assistant-authored claim."
    score_levels:
      - {label: "weak", threshold: 0.0, description: "Claims a Resume employer or another unsupported company as the interviewer's employer, or repeats an assistant-authored identity error."}
      - {label: "developing", threshold: 0.4, description: "Avoids a direct false claim but leaves the hiring-side identity ambiguous or treats Resume and TargetJob companies as interchangeable."}
      - {label: "proficient", threshold: 0.7, description: "Keeps the TargetJob hiring side separate from every Resume employer and omits the company name when the target employer is anonymous or generic."}
      - {label: "strong", threshold: 0.9, description: "Maintains the correct TargetJob role naturally and, when needed, corrects an assistant-authored identity drift without inventing a company name."}
