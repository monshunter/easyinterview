feature_key: "report.generate"
version: "v0.1.0"
language: "en"
dimensions:
  - name: "report_evidence"
    weight: 0.35
    description: "Conclusions are anchored in verbatim transcript quotes or recorded artifacts."
    score_levels:
      - label: "weak"
        threshold: 0.0
        description: "Falls clearly short of the dimension; the artifact would not satisfy the user goal."
      - label: "developing"
        threshold: 0.4
        description: "Partially satisfies the dimension; still has obvious gaps a reviewer would call out."
      - label: "proficient"
        threshold: 0.7
        description: "Meets the dimension at production-baseline quality with only minor refinements."
      - label: "strong"
        threshold: 0.9
        description: "Exceeds the dimension's expectation; an experienced reviewer would highlight the work."
