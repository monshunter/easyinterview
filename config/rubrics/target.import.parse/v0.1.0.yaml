feature_key: "target.import.parse"
version: "v0.1.0"
language: "multi"
dimensions:
  - name: "target_extraction_completeness"
    weight: 0.4
    description: "All major JD fields (role, seniority, skills, responsibilities) are captured."
    score_levels:
      - label: "weak"
        threshold: 0.0
        description: "Falls clearly short of the dimension; the artifact would not satisfy the user goal."
      - label: "developing"
        threshold: 0.4
        description: "Partially satisfies the dimension; still has obvious gaps a reviewer would call out."
      - label: "proficient"
        threshold: 0.7
        description: "Meets the dimension at production-baseline quality with only minor refinements."
