# easyinterview canonical default configuration (secrets-and-config spec §3.1.2).
# Layer 1 in the D-1 priority stack: lowest precedence; environment overrides
# (config/{APP_ENV}.yaml), env vars and runtime secrets win in that order.
#
# All secret fields here MUST stay empty strings; populate them at runtime
# through the SecretSource (env or future Vault/SOPS provider). Authoring
# real credentials in this file is blocked by the secret pre-commit hook.

app:
  env: dev
  listenAddr: ":8080"

runtime:
  appVersion: "0.0.0-dev"
  defaultUiLanguage: zh-CN

log:
  level: info

database:
  url: "postgres://easyinterview:dev@localhost:5432/easyinterview?sslmode=disable"

redis:
  url: "redis://localhost:6379/0"

objectStorage:
  provider: minio
  endpoint: "http://localhost:9000"
  bucket: "easyinterview-dev"
  accessKey: ""
  secretKey: ""

upload:
  presignTTLSeconds: 600
  maxBytes:
    resume: 10485760
    targetJobAttachment: 10485760
    privacyExport: 5242880

observability:
  otlpEndpoint: ""

auth:
  # Cookie name is fixed per ADR-Q1 §3 / spec D-8. Do not introduce env override.
  sessionCookieName: ei_session
  sessionCookieSecret: ""
  challengeTokenPepper: ""

email:
  provider: ""
  providerApiKey: ""
  smtpHost: "127.0.0.1"
  smtpPort: 1025
  fromAddress: "noreply@easyinterview.local"
  verifyBaseURL: "http://127.0.0.1:8080/api/v1/auth/email/verify"

ai:
  providerRegistryPath: "config/ai-providers.yaml"
  defaultProviderBaseURL: ""
  defaultProviderApiKey: ""
  modelProfilePath: "config/ai-profiles.yaml"
  debugPrintRawOutput: false

featureFlag:
  source: file
  filePath: "config/feature-flags.yaml"
  posthogHost: ""
  posthogSelfHosted: false
  posthogProjectApiKey: ""
  posthogPublicKey: ""

# async.* is config-only (spec D-9 / D-14). The backend internal runner reads typed config;
# do NOT add env overrides — keep the env dictionary limited to spec §3.1.1.
async:
  queueWeights:
    critical: 6
    default: 3
    low: 1
  # Runner kernel timings (spec D-14). All must be positive; the kernel fails
  # fast rather than falling back to code constants.
  leaseTimeoutSeconds: 300
  shutdownGraceSeconds: 10
  reaperIntervalSeconds: 60
  scanIntervalSeconds: 5
