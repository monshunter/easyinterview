# easyinterview canonical default configuration (secrets-and-config spec §3.1.2).
# Layer 1 in the D-1 priority stack: lowest precedence; environment overrides
# (config/{APP_ENV}.yaml), env vars and runtime secrets win in that order.
#
# All secret fields here MUST stay empty strings; populate them at runtime
# through the SecretSource (env or future Vault/SOPS provider). Authoring
# real credentials in this file is blocked by the secret pre-commit hook.

app:
  env: dev
  listenAddr: ":8080"

worker:
  listenAddr: ":8081"

runtime:
  appVersion: "0.0.0-dev"
  defaultUiLanguage: zh-CN

log:
  level: info

database:
  url: "postgres://easyinterview:dev@localhost:5432/easyinterview?sslmode=disable"

redis:
  url: "redis://localhost:6379/0"

objectStorage:
  endpoint: "http://localhost:9000"
  bucket: "easyinterview-dev"
  accessKey: ""
  secretKey: ""

observability:
  otlpEndpoint: ""

auth:
  # Cookie name is fixed per ADR-Q1 §3 / spec D-8. Do not introduce env override.
  sessionCookieName: ei_session
  sessionCookieSecret: ""
  challengeTokenPepper: ""

email:
  provider: ""
  providerApiKey: ""

ai:
  gatewayBaseURL: ""
  gatewayApiKey: ""
  modelProfilePath: "config/ai-profiles/"

featureFlag:
  source: file
  filePath: "config/feature-flags.yaml"
  posthogHost: ""
  posthogSelfHosted: false
  posthogProjectApiKey: ""
  posthogPublicKey: ""

# async.queueWeights is config-only (spec D-9). C8 worker reads typed config;
# do NOT add env overrides — keep the env dictionary at 24 keys.
async:
  queueWeights:
    critical: 6
    default: 3
    low: 1
