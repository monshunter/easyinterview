# A3 Provider Registry fixture.
# Checked-in values are provider refs and secret env names only; actual secrets
# are resolved by A4 SecretSource at runtime.
providers:
  - name: unit-test-stub
    protocol: stub
    capabilities:
      - chat
      - stt
    version: 1.0.0

  - name: deepseek
    protocol: openai_compatible
    base_url_env: AI_PROVIDER_BASE_URL
    api_key_env: AI_PROVIDER_API_KEY
    capabilities:
      - chat
    version: 1.0.0

  - name: speech-placeholder
    protocol: realtime_audio
    base_url_env: AI_PROVIDER_BASE_URL
    api_key_env: AI_PROVIDER_API_KEY
    capabilities:
      - realtime
    version: 0.1.0

  - name: judge-placeholder
    protocol: judge_compatible
    base_url_env: AI_PROVIDER_BASE_URL
    api_key_env: AI_PROVIDER_API_KEY
    capabilities:
      - judge
    version: 0.1.0
