# A3 Provider Registry fixture.
# Checked-in values are provider refs and secret env names only; actual secrets
# are resolved by A4 SecretSource at runtime.
providers:
  - name: unit-test-stub
    protocol: stub
    capabilities:
      - chat
      - stt
      - tts
    version: 1.0.0

  - name: deepseek
    protocol: openai_compatible
    base_url_env: AI_PROVIDER_BASE_URL
    api_key_env: AI_PROVIDER_API_KEY
    capabilities:
      - chat
    version: 1.0.0

  - name: doubao_speech
    protocol: doubao_speech
    base_url_env: DOUBAO_SPEECH_BASE_URL
    api_key_env: DOUBAO_SPEECH_API_KEY
    capabilities:
      - tts
      - stt
    version: 0.1.0

  - name: minimax_speech
    protocol: minimax_speech
    base_url_env: MINIMAX_SPEECH_BASE_URL
    api_key_env: MINIMAX_SPEECH_API_KEY
    capabilities:
      - tts
    version: 0.1.0

  - name: realtime_audio_disabled
    protocol: realtime_audio
    base_url_env: AI_PROVIDER_BASE_URL
    api_key_env: AI_PROVIDER_API_KEY
    capabilities:
      - realtime
    version: 0.1.0

  - name: judge-deepseek
    protocol: judge_compatible
    base_url_env: AI_PROVIDER_BASE_URL
    api_key_env: AI_PROVIDER_API_KEY
    capabilities:
      - judge
    version: 1.0.0
