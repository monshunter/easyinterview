# A3 Model Profile catalog.
# Schema uses capability + provider_ref; out-of-scope profile keys are
# rejected by backend/internal/ai/aiclient/profile loader tests.
profiles:
  - name: judge.default
    capability: judge
    status: active
    default:
      provider_ref: judge-deepseek
      model: deepseek-v4-pro
      params:
        temperature: 0.2
        thinking: disabled
        response_format: json_object
    fallback: []
    timeout_ms: 60000
    max_tokens: 6144
    rate_limit:
      rps: 3
      tpm: 60000
    route: judge.default
    version: 1.2.0

  - name: practice.voice.stt.default
    capability: stt
    status: disabled
    unsupported_reason: "Doubao speech STT adapter is implemented but awaiting secret provisioning and real-provider smoke test"
    default:
      provider_ref: doubao_speech
      model: stt-default
    fallback: []
    timeout_ms: 10000
    rate_limit:
      rps: 5
      tpm: 60000
    route: practice.voice.stt
    version: 0.1.0

  - name: practice.voice.tts.default
    capability: tts
    status: disabled
    unsupported_reason: "TTS adapter is implemented but awaiting secret provisioning and real-provider smoke test"
    default:
      provider_ref: doubao_speech
      model: tts-default
    fallback:
      - provider_ref: minimax_speech
        model: speech-02-turbo
        when:
          - timeout
          - AI_FALLBACK_EXHAUSTED
    timeout_ms: 15000
    rate_limit:
      rps: 3
      tpm: 60000
    route: practice.voice.tts
    version: 0.1.0

  - name: practice.chat.default
    capability: chat
    status: active
    default:
      provider_ref: deepseek
      model: deepseek-v4-flash
      params:
        temperature: 0.6
    fallback: []
    timeout_ms: 30000
    max_tokens: 1024
    rate_limit:
      rps: 5
      tpm: 60000
    route: practice.session.chat
    version: 1.1.0

  - name: practice.voice.realtime.default
    capability: realtime
    status: unsupported
    unsupported_reason: "realtime voice adapter is reserved for a future speech provider implementation"
    default:
      provider_ref: realtime_audio_disabled
      model: realtime-audio-disabled
    fallback: []
    timeout_ms: 10000
    rate_limit:
      rps: 5
      tpm: 60000
    route: practice.voice.realtime
    version: 0.1.0

  - name: report.generate.default
    capability: chat
    status: active
    default:
      provider_ref: deepseek
      model: deepseek-v4-pro
      params:
        temperature: 0.2
        thinking: disabled
    fallback: []
    timeout_ms: 60000
    context_window_tokens: 1000000
    max_tokens: 6144
    rate_limit:
      rps: 3
      tpm: 60000
    route: report.generate
    version: 1.2.0

  - name: resume.parse.default
    capability: chat
    status: active
    default:
      provider_ref: deepseek
      model: deepseek-v4-flash
      params:
        temperature: 0.1
    fallback: []
    timeout_ms: 30000
    max_tokens: 8192
    rate_limit:
      rps: 5
      tpm: 60000
    route: resume.parse
    version: 1.2.0

  - name: resume.tailor.default
    capability: chat
    status: active
    default:
      provider_ref: deepseek
      model: deepseek-v4-pro
      params:
        temperature: 0.4
    fallback: []
    timeout_ms: 20000
    max_tokens: 2048
    rate_limit:
      rps: 5
      tpm: 60000
    route: resume.tailor
    version: 1.1.0

  - name: target.import.default
    capability: chat
    status: active
    default:
      provider_ref: deepseek
      model: deepseek-v4-flash
      params:
        temperature: 0.1
    fallback: []
    timeout_ms: 30000
    max_tokens: 2048
    rate_limit:
      rps: 5
      tpm: 60000
    route: target.import
    version: 1.1.0

  - name: target.intel.default
    capability: chat
    status: disabled
    unsupported_reason: "company/source intelligence data source is outside current P0 implementation"
    default:
      provider_ref: deepseek
      model: deepseek-v4-flash
    fallback: []
    timeout_ms: 15000
    max_tokens: 2048
    rate_limit:
      rps: 3
      tpm: 60000
    route: target.intel
    version: 0.2.0
