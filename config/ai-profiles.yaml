# A3 Model Profile catalog.
# Schema uses capability + provider_ref; retired task_type/default.provider keys
# are rejected by backend/internal/ai/aiclient/profile loader tests.
profiles:
  - name: debrief.generate.default
    capability: chat
    status: active
    default:
      provider_ref: default-openai-compatible
      model: default-chat
      params:
        temperature: 0.3
    fallback: []
    timeout_ms: 20000
    max_tokens: 2048
    rate_limit:
      rps: 5
      tpm: 60000
    route: debrief.generate
    version: 1.0.0

  - name: debrief.voice.extract.default
    capability: stt
    status: unsupported
    unsupported_reason: "voice debrief extraction requires STT activation in 002 tools-streaming-and-stt"
    default:
      provider_ref: speech-placeholder
      model: stt-placeholder-1
    fallback: []
    timeout_ms: 10000
    rate_limit:
      rps: 5
      tpm: 60000
    route: debrief.voice.extract
    version: 0.1.0

